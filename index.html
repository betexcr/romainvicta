{id:"eco7",cat:"economy",name:"Taxation & the Publicani",y1:-200,y2:400,desc:"Tax farming: private companies bid for collection rights — hated but essential.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Senate auctioned provincial tax contracts.",wiki:"The publicani were private tax collectors who bid for the right to collect taxes in Roman provinces. They paid the state upfront, then extracted what they could from provincials — keeping the surplus. Equestrian families grew fabulously wealthy. The system was ripe for abuse: Cicero's prosecution of Verres exposed how governors and publicani could strip a province bare."},{n:"Ephesus",lat:37.94,lng:27.34,info:"Asia Minor — richest tax province.",wiki:"The province of Asia (western Turkey) was Rome's most lucrative. When Mithridates VI invaded in 88 BC, he ordered the massacre of all Romans and Italians — 80,000 were killed in a single day, a measure of how deeply hated the tax collectors were."}],paths:[[41.9,12.5,37.94,27.34,"Publicani extract wealth from Asia"]],facts:["Private companies bid for tax rights","80,000 Romans massacred in Asia (88 BC)","Cicero prosecuted Verres for looting Sicily"]},
{id:"eco8",cat:"economy",name:"The Grain Dole (Annona)",y1:-123,y2:476,desc:"Free or subsidized grain for 200,000+ citizens monthly — 'bread and circuses.'",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"200,000 citizens received free grain.",wiki:"Gaius Gracchus introduced subsidized grain in 123 BC. By 58 BC (Clodius' law), it was free. Augustus fixed the rolls at 200,000 recipients. Monthly distributions of grain (later bread, oil, and pork) continued for 600 years. Politicians who controlled the grain supply controlled Rome — Pompey, Caesar, and Augustus all understood this."},{n:"Ostia",lat:41.76,lng:12.29,info:"Grain ships unloaded here.",wiki:"Massive granaries at Ostia and Portus stored the grain. Delays in the grain fleet could cause riots. Claudius built a new harbor at Portus specifically to handle the volume."},{n:"Alexandria",lat:31.2,lng:29.9,info:"Egypt supplied one-third of Rome's grain.",wiki:"Egypt's Nile flood produced enormous surplus grain. Controlling Egypt meant controlling Rome's food supply — one reason Augustus made it a personal province forbidden to senators."}],paths:[[31.2,29.9,41.76,12.29,"Grain fleets from Egypt to Ostia"],[41.76,12.29,41.9,12.5,"Grain distributed in Rome"]],facts:["200,000 recipients monthly","Gaius Gracchus started it (123 BC)","'Bread and circuses' — Juvenal"]},
{id:"eco9",cat:"economy",name:"Roman Banking & Credit",y1:-200,y2:400,desc:"Argentarii operated from tabernae in the Forum — deposits, loans, letters of credit, and currency exchange.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Forum: center of Roman banking.",wiki:"Roman bankers (argentarii) operated from shops (tabernae) lining the Forum. They accepted deposits, made loans, exchanged currency, and acted as auctioneers. The nummularii specialized in money-changing and testing coin purity. Letters of credit (permutationes) allowed merchants to transfer funds without carrying cash across dangerous roads. Interest rates were regulated — typically 6-12% per annum. Roman banking lacked modern institutions like central banks or deposit insurance, but the financial network was sophisticated enough to support Mediterranean-wide commerce."},{n:"Pompeii",lat:40.75,lng:14.49,info:"Banker Lucius Caecilius Jucundus' records survived.",wiki:"The wax tablets of the Pompeian banker Caecilius Jucundus, preserved by Vesuvius, provide the most detailed surviving records of Roman financial transactions: auction receipts, rental payments, and loan documents — a snapshot of daily commercial life."}],paths:[],facts:["Argentarii: Roman bankers","Letters of credit for cashless transfers","6-12% interest rates typical"]},
{id:"eco10",cat:"economy",name:"Diocletian's Price Edict",y1:301,y2:301,desc:"World's first attempt at price controls — maximum prices for 1,200+ goods, death penalty for violations.",locs:[{n:"Antioch",lat:36.2,lng:36.15,info:"Likely issued from here in 301 AD.",wiki:"Facing severe inflation after decades of currency debasement, Diocletian issued the Edictum de Pretiis Rerum Venalium (Edict on Maximum Prices) in 301 AD. It fixed ceiling prices for over 1,200 goods and services — from wheat and wine to haircuts and legal fees. Violations were punishable by death. The edict was an economic disaster: merchants withdrew goods from the market, black markets flourished, and the edict was quietly abandoned within years."},{n:"Aphrodisias",lat:37.71,lng:28.72,info:"Best-preserved copy of the edict.",wiki:"The most complete surviving copy of Diocletian's Price Edict is carved in stone at Aphrodisias in Turkey. The inscription lists prices in denarii communes — revealing both the range of goods in the Roman economy and the desperation of the government to control inflation."}],paths:[[36.2,36.15,37.71,28.72,"Edict distributed across the empire"]],facts:["1,200+ goods and services priced","Death penalty for violations","Quietly abandoned within years"]},
{id:"eco11",cat:"economy",name:"Latifundia & Roman Agriculture",y1:-200,y2:400,desc:"Large slave-worked estates that displaced small farmers — Pliny warned: 'Latifundia have ruined Italy.'",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Political debates over land reform.",wiki:"After the Punic Wars, wealthy Romans consolidated small farms into vast estates (latifundia) worked by slaves captured in wars of conquest. Displaced peasants flooded into Rome. The Gracchi brothers' attempts at land reform (133-121 BC) ended in their murders. Pliny the Elder wrote 'latifundia perdidere Italiam' (latifundia have ruined Italy). The system persisted throughout the Empire — large estates in North Africa, Spain, and Gaul produced the grain, olive oil, and wine that sustained the Roman world."},{n:"Sicily",lat:37.5,lng:14.0,info:"Massive grain estates — site of two slave revolts.",wiki:"Sicily was Rome's first province and its breadbasket. Giant latifundia worked by slaves produced enormous wealth — and sparked two massive slave revolts (135-132 BC and 104-100 BC). The exploitation was so severe that Cicero prosecuted the governor Verres for his depredations."},{n:"Volubilis",lat:34.07,lng:-5.55,info:"Roman olive oil production in North Africa.",wiki:"Volubilis in modern Morocco had over 60 olive presses — a vast industrial olive oil operation. North African estates produced enormous quantities of oil, grain, and wine for export to Rome. Africa Proconsularis became Rome's richest agricultural province."}],paths:[[41.9,12.5,37.5,14.0,"Sicilian grain to Rome"],[41.9,12.5,34.07,-5.55,"North African oil and grain"]],facts:["Pliny: 'Latifundia have ruined Italy'","Gracchi murdered for land reform","North Africa: Rome's richest agricultural region"]},
{id:"eco12",cat:"economy",name:"Roman Pottery Industry",y1:-200,y2:300,desc:"Terra sigillata mass production — brand stamps, standardized shapes. Found from Scotland to India.",locs:[{n:"Arezzo",lat:43.46,lng:11.88,info:"Arretium: original center of terra sigillata production.",wiki:"Arretine ware — glossy red-slipped pottery — was the first mass-produced Roman tableware. Large workshops using slave labor produced standardized vessels stamped with the maker's name. At its peak (30 BC - 30 AD), Arezzo's workshops employed hundreds and exported across the Mediterranean. Production then shifted to Gaul and the Rhineland."},{n:"La Graufesenque",lat:44.09,lng:3.07,info:"Gallic workshop that replaced Arezzo as main producer.",wiki:"La Graufesenque in southern Gaul became the dominant producer of terra sigillata from about 40-120 AD. Kiln records on pottery fragments show a single firing might contain 30,000 vessels. The site produced an estimated 60 million vessels. Distribution extended from Scotland to India — a remarkable ancient economy of scale."}],paths:[[43.46,11.88,44.09,3.07,"Production shifts from Arezzo to Gaul"]],facts:["First mass-produced Roman tableware","60 million vessels from La Graufesenque","Found from Scotland to India"]},
{id:"eco13",cat:"economy",name:"Third-Century Currency Crisis",y1:235,y2:284,desc:"Silver content plummeted from 50% to 2% — hyperinflation, barter, and near-economic collapse.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Imperial mints debased currency to fund the armies.",wiki:"During the Crisis of the Third Century (235-284 AD), emperors rapidly debased silver coinage to pay armies: the antoninianus went from 50% silver to less than 2%. Prices rose 1,000% over 50 years. Diocletian's Edict on Maximum Prices (301 AD) tried to cap inflation with death penalties — it failed. He reformed the coinage instead, but economic damage persisted for decades. Trust in currency was so low that many regions reverted to barter."}],paths:[],facts:["Silver content fell from 50% to 2%","Prices rose 1,000% in 50 years","Diocletian's price controls failed"]},
{id:"eco14",cat:"economy",name:"Maritime Trade to India",y1:-30,y2:200,desc:"Monsoon winds enabled direct Rome-India trade — pepper, spices, gems, silk. 120+ ships per year.",locs:[{n:"Alexandria",lat:31.2,lng:29.9,info:"Egyptian hub for eastern trade.",wiki:"After Augustus conquered Egypt (30 BC), Roman merchants exploited a Greek discovery: monsoon winds enabled direct sailing to India. Ships departed Red Sea ports in July and returned in December. The Periplus of the Erythraean Sea (c. 40-70 AD) is a merchant's guide describing the route, ports, and goods."},{n:"Berenice",lat:23.91,lng:35.47,info:"Red Sea port — departure point for India.",wiki:"Berenice was a major Roman port on the Red Sea. Excavations have revealed Indian pottery, South Asian peppercorns, and teak wood. Ships sailed from here to India carrying gold, silver, wine, and coral — returning with pepper, pearls, gems, silk, and spices."},{n:"Muziris",lat:10.16,lng:76.2,info:"Major trading port on India's Malabar Coast.",wiki:"Muziris (modern Pattanam, Kerala) was the primary destination for Roman merchants. The Muziris Papyrus describes a cargo worth 7 million sestertii — the price of an Italian estate. Archaeological excavations found Roman amphorae and coins. Pliny complained that India drained Rome of 50 million sestertii annually for luxury goods."}],paths:[[31.2,29.9,23.91,35.47,"Down the Nile to the Red Sea"],[23.91,35.47,10.16,76.2,"Monsoon sailing to India"]],facts:["120+ ships per year to India","Pliny: India drained 50 million sestertii annually","Muziris Papyrus: single cargo worth 7 million sestertii"]},
{id:"eco15",cat:"economy",name:"Roman Textile Industry",y1:-200,y2:400,desc:"Wool, linen, silk — fullonicae processed cloth. Pompeii had 13 fullonicae. Tyrian purple cost more than gold.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Center of demand for textiles.",wiki:"The Roman textile industry was vast and varied. Wool was the primary fabric, processed in fullonicae (laundries/fullers' workshops) using urine, fuller's earth, and sulfur. Linen from Egypt, cotton from India, and silk from China supplied luxury markets. The toga required 5-7 meters of wool and weighed 5 kg — wearing one was a mark of citizenship and a physical ordeal."},{n:"Pompeii",lat:40.75,lng:14.49,info:"13 fullonicae preserved — best evidence for the industry.",wiki:"Pompeii's 13 fullonicae give the best picture of Roman textile processing. The Fullonica of Stephanus is remarkably preserved: treading vats where workers stomped cloth in urine, rinsing basins, drying frames, and pressing devices. Frescoes show the process step by step. The guild of fullers was one of Pompeii's most powerful trade associations."},{n:"Tyre",lat:33.27,lng:35.2,info:"Source of Tyrian purple dye — more expensive than gold.",wiki:"Tyrian purple was extracted from murex sea snails — 12,000 snails produced 1.5 grams of dye. A pound of double-dipped Tyrian purple cost more than gold. The color became synonymous with imperial power: the emperor's robe was purple, and unauthorized wearing was a capital offense."}],paths:[[33.27,35.2,41.9,12.5,"Tyrian purple dye flows to Rome"],[40.75,14.49,41.9,12.5,"Textile processing for Roman markets"]],facts:["Toga: 5-7 meters of wool, weighing 5 kg","12,000 snails = 1.5 grams of Tyrian purple","Unauthorized wearing of purple was a capital offense"]},
{id:"eco16",cat:"economy",name:"Roman Construction Industry",y1:-200,y2:400,desc:"Largest employer in the ancient world — collegia of builders, brick-makers, marble-cutters. Brick stamps track the supply chain.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Constant building employed tens of thousands.",wiki:"The Roman construction industry was the largest organized employer in the ancient world. Specialized collegia (guilds) of builders (fabri), brick-makers, marble-cutters, mosaic-layers, and painters operated across the empire. Roman bricks were stamped with the producer's name, date, and consul year — providing an invaluable dating tool for archaeologists. The Monte Testaccio (a hill of 53 million broken amphorae) shows the scale of organized construction waste management."},{n:"Ostia",lat:41.76,lng:12.29,info:"Construction guilds had headquarters here.",wiki:"Ostia's Piazzale delle Corporazioni — a colonnade with 61 offices — shows mosaics identifying trade guilds: shipbuilders, rope-makers, grain measurers, and construction suppliers. The organization of the Roman construction industry was not matched in Europe until the Industrial Revolution."}],paths:[],facts:["Brick stamps provide exact dating for archaeologists","Construction guilds organized like modern unions","Scale not matched until the Industrial Revolution"]},
{id:"eco17",cat:"economy",name:"Shipbuilding & Maritime Industry",y1:-260,y2:400,desc:"1,200+ wrecks found. Grain freighters carried 1,000+ tons. Nemi ships had rotating platforms and plumbing.",locs:[{n:"Misenum",lat:40.79,lng:14.08,info:"Base of the Roman Mediterranean fleet.",wiki:"Rome's shipbuilding industry was enormous. The grain fleet alone required hundreds of large freighters (some carrying 1,000+ tons — rivaling 18th-century ships). The fleet at Misenum was the empire's largest naval base, housing warships including quinqueremes and triremes. Over 1,200 Roman shipwrecks have been found across the Mediterranean, providing evidence of trade routes, cargo, and construction techniques."},{n:"Lake Nemi",lat:41.71,lng:12.7,info:"Caligula's floating palaces — recovered in the 1930s.",wiki:"Two enormous ships were recovered from Lake Nemi in the 1930s — built for Emperor Caligula as floating palaces. They were 70m and 73m long, with heated baths, marble floors, rotating platforms, and lead plumbing. They represented the pinnacle of Roman ship technology. Tragically, both were destroyed by retreating German forces in 1944."},{n:"Ostia",lat:41.76,lng:12.29,info:"Commercial harbor — hundreds of ships at anchor.",wiki:"Ostia and the Claudian/Trajanic harbor complex at Portus handled the bulk of Rome's maritime commerce. Grain ships from Alexandria, oil tankers from Spain, and wine ships from Gaul all converged here. The harbor could accommodate 200+ ships simultaneously."}],paths:[[40.79,14.08,41.76,12.29,"Naval and commercial shipping hubs"],[41.71,12.7,41.9,12.5,"Caligula's pleasure barges at Lake Nemi"]],facts:["1,200+ Roman shipwrecks found","Grain ships carried 1,000+ tons","Nemi ships destroyed by Germans in 1944"]},
{id:"eco18",cat:"economy",name:"Urban Markets & Tabernae",y1:-200,y2:400,desc:"Trajan's Market (150+ shops), macellum food halls, tabernae on every street — Rome's consumer economy.",locs:[{n:"Rome/Trajan's Market",lat:41.895,lng:12.487,info:"World's first shopping mall — 150+ shops on 6 levels.",wiki:"Trajan's Market (Mercati di Traiano), built by Apollodorus of Damascus around 110 AD, is often called the world's first shopping mall. Its 150+ shops and offices rose on six levels, selling everything from spices and silk to fish and flowers. Individual tabernae (shops) lined virtually every Roman street — Ostia's excavations reveal bakeries, bars, laundries, and snack counters (thermopolia) at remarkable density."},{n:"Pompeii",lat:40.75,lng:14.49,info:"Preserved shops, bars, and thermopolia.",wiki:"Pompeii had over 150 thermopolia (fast-food counters with recessed jars for hot food), dozens of bakeries (with millstones and ovens intact), fulleries, dye-works, and the macellum (covered food market) at the Forum. One thermopolium preserved actual food: duck, goat, fish, snails, and fava beans."}],paths:[],facts:["Trajan's Market: 150+ shops on 6 levels","Pompeii: 150+ fast-food counters","Actual Roman food preserved at Pompeii"]},
{id:"eco19",cat:"economy",name:"Roman Slavery as Economic System",y1:-200,y2:400,desc:"2-3 million slaves in Italy alone — agricultural gangs, mine workers, household servants. Economic engine of the Republic.",locs:[{n:"Delos",lat:37.4,lng:25.27,info:"Largest slave market — 10,000 sold per day at peak.",wiki:"The slave economy was fundamental to Rome. At its peak, 2-3 million slaves worked in Italy alone — roughly one-third of the population. Delos was the Mediterranean's largest slave market: Strabo claimed 10,000 could be bought and sold in a single day. Sources of slaves: war captives, pirates' victims, exposed infants, and breeding. Agricultural latifundia used chained slave gangs. Mine slaves at Laurion or Spanish silver mines had life expectancies measured in months."},{n:"Rome",lat:41.9,lng:12.5,info:"Slaves performed every function in Roman society.",wiki:"In Rome, slaves served as household servants, tutors, accountants, doctors, secretaries, craftsmen, gladiators, sex workers, and imperial bureaucrats. The economic contribution was enormous: slaves built the infrastructure, worked the farms, manned the mines, and produced the goods. Freedmen (liberti) often became wealthy entrepreneurs — creating a paradox of social mobility within a slave system."},{n:"Laurion",lat:37.73,lng:24.05,info:"Silver mines worked by slaves in horrific conditions.",wiki:"Mining was the worst fate for a Roman slave. At Laurion (Greece), Carthago Nova (Spain), and other sites, slaves worked in tunnels as low as 1 meter, breathing toxic dust, in darkness. Life expectancy was measured in months. Diodorus Siculus described conditions at Spanish mines that make modern readers flinch."}],paths:[[37.4,25.27,41.9,12.5,"Slave trade from Delos to Rome"],[41.9,12.5,37.73,24.05,"Slaves sent to the mines"]],facts:["2-3 million slaves in Italy alone","10,000 sold per day at Delos","Mine slaves survived months, not years"]},
{id:"eco20",cat:"economy",name:"Roman Roads as Economic Infrastructure",y1:-312,y2:476,desc:"400,000 km of roads — reduced transport costs, enabled markets, connected the empire. 'All roads lead to Rome.'",locs:[{n:"Rome/Via Appia",lat:41.85,lng:12.52,info:"'Queen of Roads' — began 312 BC to support the Samnite Wars.",wiki:"The Roman road network totaled approximately 400,000 km, with 80,000-90,000 km of paved highways. Roads were primarily built for military purposes but had transformative economic effects: they reduced transport costs, enabled regular markets, facilitated tax collection, and connected producers to consumers across the empire. The Via Appia (begun 312 BC by the censor Appius Claudius Caecus) was the prototype — a 4.1-meter-wide paved road from Rome to Capua, later extended to Brindisi."},{n:"Brindisi",lat:40.64,lng:17.94,info:"Eastern terminus of the Via Appia — gateway to Greece.",wiki:"Brundisium (Brindisi) was the Via Appia's eastern terminus and Rome's main embarkation point for Greece and the East. The road was so important that milestones survive along its entire length. The Milliarium Aureum (Golden Milestone) in the Forum was the symbolic point from which all distances were measured — 'All roads lead to Rome.'"}],paths:[[41.85,12.52,40.64,17.94,"Via Appia: Rome to Brindisi"]],facts:["400,000 km of roads total","80,000-90,000 km paved highways","Milliarium Aureum: all distances measured from Rome"]},

{id:"law1",cat:"law",name:"Twelve Tables",y1:-451,y2:-449,desc:"First written law code — foundation of Western law.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Bronze tablets in the Forum.",wiki:"451-449 BC. Revolutionary: law should be written, public, equal. Basis of Roman law for 900 years."}],paths:[],facts:["First written law","Public in Forum","Foundation of Western law"]},
{id:"law2",cat:"law",name:"Pax Romana",y1:-27,y2:180,desc:"Two centuries of peace and prosperity.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"207 years of stability.",wiki:"Trade flourished, population 55-70 million. Gibbon: 'most happy and prosperous.'"},{n:"Londinium",lat:51.5,lng:-0.1,info:"Provincial cities flourished.",wiki:"Cities grew across the empire."},{n:"Antioch",lat:36.2,lng:36.15,info:"Eastern cities thrived.",wiki:"Greatest prosperity under imperial stability."}],paths:[[41.9,12.5,51.5,-0.1,"Peace to the provinces"],[41.9,12.5,36.2,36.15,"Trade enriches the East"]],facts:["207 years","55-70 million","Gibbon: 'most happy'"]},
{id:"law3",cat:"law",name:"Roman Slavery",y1:-300,y2:400,desc:"Up to 40% of Italy enslaved.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"500 slaves per wealthy Roman.",wiki:"2-3 million in Italy. Mine slaves lived months. Greek slaves became advisors."},{n:"Delos",lat:37.4,lng:25.27,info:"10,000 slaves/day.",wiki:"Largest slave market at its peak."}],paths:[[37.4,25.27,41.9,12.5,"Slave trade from Delos"]],facts:["35-40% enslaved","10,000/day at Delos","Caesar enslaved ~1M Gauls"]},
{id:"law4",cat:"law",name:"Edict of Caracalla",y1:212,y2:212,desc:"Universal citizenship for all free men — the most revolutionary legal act in Roman history.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Issued 212 AD by Emperor Caracalla.",wiki:"The Constitutio Antoniniana granted full Roman citizenship to all free men in the empire and equivalent rights to all free women. Before 212, citizenship was mostly limited to Italians and select provincials. Overnight, millions became citizens. Cynics noted it also massively expanded the tax base — citizens paid inheritance tax."},{n:"Alexandria",lat:31.2,lng:29.9,info:"Egyptians, Syrians, Gauls — all became citizens.",wiki:"For the first time, a farmer in Egypt had the same legal status as a senator's son in Rome. The edict transformed citizenship from an exclusive privilege into a universal right. It was found written on a papyrus (P. Giss. 40) in Egypt, our primary surviving copy."}],paths:[[41.9,12.5,31.2,29.9,"Citizenship extends to all corners of the empire"]],facts:["All free men became citizens","Expanded the tax base","Named Constitutio Antoniniana"]},
{id:"law5",cat:"law",name:"The Roman Senate",y1:-753,y2:476,desc:"From advisory council of kings to supreme power to imperial rubber stamp — 1,200 years.",locs:[{n:"Curia Julia",lat:41.894,lng:12.486,info:"Senate house in the Forum — still standing.",wiki:"The Senate met in the Curia, rebuilt by Caesar and Augustus (the current building dates to Diocletian's restoration). Originally 100 members under the kings, expanded to 300 in the Republic, 600 under Sulla, and 900 under Caesar. Senators wore the toga praetexta with a broad purple stripe. The phrase SPQR (Senatus Populusque Romanus) — 'The Senate and People of Rome' — appeared on standards, buildings, and coins."},{n:"Rome",lat:41.9,lng:12.5,info:"Peak power in the mid-Republic; declined under the emperors.",wiki:"The Senate's power peaked between the Punic Wars and the late Republic. It controlled foreign policy, finances, and provincial appointments. Under the emperors, it became increasingly ceremonial. Augustus maintained the fiction of senatorial authority; by Diocletian's time, it was irrelevant. Yet it survived — the last recorded meeting was in 603 AD."}],paths:[],facts:["300 senators (Republic), 900 under Caesar","SPQR: Senatus Populusque Romanus","Power peaked mid-Republic"]},
{id:"law6",cat:"law",name:"Cursus Honorum",y1:-180,y2:-27,desc:"The political career ladder — quaestor, aedile, praetor, consul — with strict age limits.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Every ambitious Roman's path to power.",wiki:"The cursus honorum ('course of honors') was the fixed sequence of offices for aspiring politicians. After 10 years of military service, a man could stand for quaestor (minimum age 30 after Sulla's reforms), then aedile, praetor (age 39), and finally consul (age 42). Holding each office 'in its year' (suo anno) — at the minimum age — was considered the mark of exceptional talent. Caesar, Cicero, and Augustus all achieved this. Two-year gaps between offices prevented power accumulation. The system broke down in the late Republic as strongmen like Pompey (consul at 35) bypassed the rules."}],paths:[],facts:["Quaestor at 30, Consul at 42","Sulla formalized the system","Strongmen bypassed the rules"]},
{id:"law7",cat:"law",name:"Provincial Administration",y1:-241,y2:476,desc:"Governors with near-absolute power — Cicero prosecuted Verres for looting Sicily.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Senate assigned provinces to ex-magistrates.",wiki:"Provincial governors (proconsuls or propraetors) held imperium — near-absolute military and judicial authority. The system invited abuse: Verres stripped Sicily of art, grain, and dignity. Cicero's prosecution (70 BC) in the In Verrem speeches exposed systematic corruption. Augustus reformed the system, dividing provinces into senatorial and imperial."},{n:"Syracuse",lat:37.07,lng:15.28,info:"Verres looted Sicily's greatest city.",wiki:"Verres stole artworks from temples, crucified a Roman citizen, and extorted fortunes. Cicero's speeches were so devastating that Verres fled into exile before the trial concluded. He took his stolen art with him."},{n:"Ephesus",lat:37.94,lng:27.34,info:"Capital of the richest province — Asia.",wiki:"The governor of Asia controlled the empire's wealthiest province. Ephesus served as the administrative capital. Provincial councils (koina) could send embassies to Rome to complain about bad governors — a limited check on power."}],paths:[[41.9,12.5,37.07,15.28,"Cicero prosecutes Verres in Sicily"],[41.9,12.5,37.94,27.34,"Governors rule Asia from Ephesus"]],facts:["Governors held near-absolute power","Cicero's In Verrem exposed corruption","Augustus divided provinces into senatorial and imperial"]},
{id:"law8",cat:"law",name:"Corpus Juris Civilis",y1:529,y2:534,desc:"Justinian's codification of all Roman law — foundation of European civil law, still cited today.",locs:[{n:"Constantinople",lat:41.0,lng:29.0,info:"Compiled under Justinian I.",wiki:"Emperor Justinian I ordered the jurist Tribonian to compile all Roman law into a single work. The result — the Corpus Juris Civilis — consists of the Codex (imperial constitutions), Digest (jurists' writings), Institutes (textbook), and Novellae (new laws). It preserved 1,000 years of Roman legal thought and became the foundation of European civil law. Concepts like 'innocent until proven guilty' and 'burden of proof on the accuser' trace directly to it."},{n:"Rome",lat:41.9,lng:12.5,info:"Culmination of 1,000 years of Roman legal tradition.",wiki:"Though compiled in Constantinople, the Corpus drew on centuries of Roman jurisprudence from the Twelve Tables through Gaius, Ulpian, and Papinian. Rediscovered in Italy in the 11th century, it became the basis of law in continental Europe. Napoleon's Civil Code was heavily influenced by it."}],paths:[[41.0,29.0,41.9,12.5,"Roman law's legacy returns to the West"]],facts:["Compiled 529-534 AD","Foundation of European civil law","Still cited in modern courts"]},
{id:"law9",cat:"law",name:"Tribune of the Plebs",y1:-494,y2:-44,desc:"Sacred and inviolable — veto power over any magistrate. Created in struggle, weaponized in crisis.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Created 494 BC during the First Secession of the Plebs.",wiki:"When the plebeians seceded to the Sacred Mount in 494 BC — effectively going on strike — the patricians were forced to create the tribune of the plebs. Tribunes were sacrosanct: harming one was a capital offense. They could veto (intercessio) any act by any magistrate, including consuls. Originally a defensive office protecting common citizens from patrician abuse, it became the most powerful political weapon in the late Republic. Tiberius Gracchus used it to pass land reform (133 BC). His brother Gaius expanded its reach. Clodius weaponized it against Cicero. Caesar held tribunician authority to shield himself. Augustus made tribunicia potestas the legal foundation of imperial power — without ever holding the office."}],paths:[],facts:["Created 494 BC in the Secession of the Plebs","Sacrosanct: harming a tribune = death","Augustus made it the basis of imperial power"]},
{id:"law10",cat:"law",name:"Roman Citizenship",y1:-753,y2:212,desc:"Grades from civis to peregrinus — rights to vote, trade, appeal, and marry. Culminated in Caracalla's universal edict.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Citizenship was Rome's most powerful tool of integration.",wiki:"Roman citizenship (civitas) was layered: full citizens (cives Romani) held voting, marriage, trade, and appeal rights. Latin rights (ius Latii) offered some privileges. Allies (socii) had fewer. Foreigners (peregrini) had almost none. Unlike Greek cities, Rome granted citizenship widely — to freed slaves, allied communities, and conquered peoples. This was Rome's genius: turning enemies into stakeholders. Paths to citizenship: birth, military service (25 years for auxiliaries), manumission, or imperial grant."},{n:"Delos",lat:37.4,lng:25.27,info:"Italian traders identified themselves proudly as 'Romani.'",wiki:"Inscriptions at Delos show Italian merchants calling themselves cives Romani (Roman citizens) — citizenship was a badge of prestige and legal protection across the Mediterranean. The 80,000 Romans massacred by Mithridates in 88 BC were targeted precisely because their citizen status marked them as privileged."}],paths:[],facts:["Full citizens: vote, trade, appeal, marry","Freed slaves could gain citizenship","Caracalla's edict (212 AD) made it universal"]},
{id:"law11",cat:"law",name:"Roman Courts & Trial System",y1:-149,y2:400,desc:"Quaestiones perpetuae (permanent jury courts), Cicero's courtroom brilliance, and imperial cognitio replaced juries.",locs:[{n:"Rome/Forum",lat:41.892,lng:12.485,info:"Trials held in the Forum — Rome's public stage.",wiki:"The Roman legal system evolved from early forms of private arbitration to sophisticated public courts. In 149 BC, the first quaestio perpetua (permanent jury court) was established for extortion cases. By the late Republic, eight courts handled different crimes. Juries of senators (later equestrians too) heard cases argued by orators like Cicero, whose courtroom speeches are masterpieces of rhetoric. Under the Empire, the cognitio system replaced juries: a single magistrate heard cases, examined witnesses, and rendered judgment — more efficient, but with less protection for the accused."}],paths:[],facts:["First permanent court: 149 BC for extortion","Cicero's courtroom speeches are literary masterpieces","Imperial cognitio replaced jury courts"]},
{id:"law12",cat:"law",name:"The Dictator: Emergency Powers",y1:-501,y2:-44,desc:"Constitutional office with 6-month limit — Cincinnatus returned to his plow. Sulla and Caesar broke the mold.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Dictators appointed during military emergencies.",wiki:"The Roman dictator was a constitutional office for existential crises. The Senate authorized the appointment; a consul nominated the dictator, who held supreme power for a maximum of 6 months or until the crisis ended. Cincinnatus (458 BC) famously returned to his plow after 16 days. The office was used about 85 times. Sulla broke the mold: appointed dictator in 82 BC 'for rewriting the constitution,' he held power for 2 years. Caesar went further: named dictator perpetuo (dictator in perpetuity) in February 44 BC. He was assassinated on March 15 — the Ides of March. The office was never revived."}],paths:[],facts:["Cincinnatus: resigned after 16 days","Sulla: dictator 'for rewriting the constitution'","Caesar: dictator perpetuo — assassinated in 44 days"]},
{id:"law13",cat:"law",name:"Censors & the Census",y1:-443,y2:22,desc:"Two censors every 5 years: conducted the census, revised the Senate rolls, let public contracts, policed morals.",locs:[{n:"Rome/Campus Martius",lat:41.9,lng:12.47,info:"Citizens assembled here for the census count.",wiki:"The censorship was Rome's most prestigious magistracy — held at the end of a career, after the consulship. Two censors, elected every 5 years, served for 18 months. Their duties: conduct the census (count citizens and their property), assign citizens to tribes and classes, revise the Senate roll (expelling unworthy members), let public contracts for roads, temples, and aqueducts, and conduct the lustrum (purification ceremony). The nota censoria (censor's mark of disapproval) could destroy a career. The office declined under Augustus, who absorbed its powers into the principate."}],paths:[],facts:["Most prestigious Roman magistracy","Nota censoria could destroy careers","Augustus absorbed the powers himself"]},
{id:"law14",cat:"law",name:"Roman Family Law",y1:-450,y2:400,desc:"Patria potestas, manus marriage, adoption, inheritance — the foundation of modern civil law concepts.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Roman family law shaped Western legal traditions.",wiki:"The Roman family (familia) was a legal unit under the absolute power (patria potestas) of the paterfamilias — who technically had the power of life and death over wife, children, and slaves. In practice, this was moderated by social custom. Women could marry 'with manus' (under husband's legal control) or 'without manus' (retaining legal independence). Adoption was a crucial political tool: Augustus, Tiberius, Trajan, and Hadrian were all adopted. Inheritance law became incredibly sophisticated, with rules on wills, intestate succession, and fideicommissa (trust-like devices) that directly influenced the Napoleonic Code."}],paths:[],facts:["Patria potestas: father's absolute legal power","Adoption was a political tool — most 'good emperors' were adopted","Directly influenced the Napoleonic Code"]},
{id:"law15",cat:"law",name:"Comitia & Popular Assemblies",y1:-509,y2:-27,desc:"Centuriate Assembly (war/elections), Tribal Assembly (legislation), Plebeian Council — the voice of the Roman people.",locs:[{n:"Rome/Campus Martius",lat:41.9,lng:12.47,info:"Assembly grounds — citizens voted here.",wiki:"The Roman Republic had multiple voting assemblies. The Comitia Centuriata (organized by wealth) elected consuls and praetors, declared war, and tried capital cases. The Comitia Tributa (organized by tribe) elected lower magistrates and passed laws. The Concilium Plebis (Plebeian Council, patricians excluded) elected tribunes and passed plebiscites — which after 287 BC had the force of law for all citizens. Voting was by group, not individual — wealthy centuries voted first and could determine the result before poorer citizens voted. Augustus preserved the forms but emptied them of real power."}],paths:[],facts:["Centuriate Assembly: organized by wealth","Plebiscites had force of law after 287 BC","Augustus preserved forms but emptied their power"]},
{id:"law16",cat:"law",name:"Praetor's Edict & Ius Honorarium",y1:-242,y2:130,desc:"Annual edict announcing legal innovations — created equity alongside rigid civil law. Hadrian codified it permanently.",locs:[{n:"Rome/Forum",lat:41.892,lng:12.485,info:"Praetors announced their edicts at the start of each year.",wiki:"The praetor urbanus (city praetor) was Rome's chief judicial magistrate. Each year, on taking office, he published an edictum — announcing the legal principles and remedies he would apply during his term. Over centuries, successive praetors built up a body of law (ius honorarium) that supplemented and corrected the rigid Twelve Tables. The edict introduced principles of equity, good faith, and fairness that the old civil law lacked. Around 130 AD, the jurist Salvius Julianus, on Hadrian's orders, codified the edict into a permanent, unchangeable form — the Edictum Perpetuum."}],paths:[],facts:["Annual edict created a flexible legal system","Ius honorarium supplemented the rigid Twelve Tables","Hadrian made it permanent c. 130 AD"]},
{id:"law17",cat:"law",name:"Ius Gentium (Law of Nations)",y1:-242,y2:400,desc:"Law applicable to all peoples — forerunner of international law. Based on natural reason rather than Roman custom.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Developed by the praetor peregrinus from 242 BC.",wiki:"From 242 BC, the praetor peregrinus (foreign praetor) administered justice in cases involving non-citizens. Since Roman civil law (ius civile) applied only to citizens, the foreign praetor developed the ius gentium — 'law of nations' — based on principles considered common to all peoples: natural reason, good faith, and fairness. This universal approach influenced the development of international law. Hugo Grotius (17th century), the 'father of international law,' drew heavily on Roman ius gentium concepts. The Stoic idea that all humans share reason provided the philosophical foundation."}],paths:[],facts:["Developed from 242 BC for non-citizen cases","Based on natural reason, not Roman custom","Foundation of modern international law"]},
{id:"law18",cat:"law",name:"Patron-Client Relations (Clientela)",y1:-753,y2:476,desc:"Foundation of Roman social structure — morning salutatio, sportula handouts. Political obligations binding all classes.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Every morning, clients thronged patrons' houses.",wiki:"The patron-client relationship (clientela) was the glue of Roman society. Wealthy patrons (patroni) provided legal protection, financial support, and political advancement for their clients (clientes). In return, clients provided political support, votes, and daily attendance at the morning salutatio — a ritual greeting at the patron's house. From the late Republic, patrons distributed the sportula — originally a basket of food, later a cash handout of 6.25 sestertii. Martial's poems are filled with bitter complaints about the indignities of the client's life: waking before dawn, trudging through rain, flattering a boor for a meager handout."}],paths:[],facts:["Salutatio: clients visited patrons each dawn","Sportula: 6.25 sestertii daily handout","Martial: 'What poet does not love the dole?'"]},
{id:"law19",cat:"law",name:"Roman Contracts & Commercial Law",y1:-200,y2:534,desc:"Stipulatio, emptio venditio, locatio conductio — Roman contract law underpins modern commercial law worldwide.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Roman jurists created the foundation of modern contract law.",wiki:"Roman contract law was remarkably sophisticated and forms the basis of modern civil law systems worldwide. Key contract types: stipulatio (formal verbal contract — 'Do you promise? I promise'), emptio venditio (sale), locatio conductio (hire/lease), mandatum (mandate/agency), and societas (partnership). Roman jurists like Gaius, Papinian, Ulpian, and Paul developed concepts still used today: bona fides (good faith), consensus (mutual agreement), vitium (defect), and dolus malus (fraud). Justinian's Digest collected 9,000 fragments of juristic writing, preserving this legal tradition for posterity."}],paths:[],facts:["Stipulatio: 'Do you promise? I promise'","Bona fides (good faith) is still a legal principle","Justinian's Digest: 9,000 juristic fragments"]},
{id:"law20",cat:"law",name:"Imperium & Auctoritas",y1:-509,y2:476,desc:"Imperium: executive command power. Auctoritas: moral authority. Augustus' genius was claiming only auctoritas while wielding imperium.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"The twin pillars of Roman political authority.",wiki:"Roman political power rested on two concepts. Imperium was legal executive authority — the power to command armies, administer justice, and execute citizens. It was held by consuls, praetors, and dictators, symbolized by the fasces (bundle of rods and axe) carried by lictors. Auctoritas was informal moral authority — influence derived from prestige, wisdom, and record of service. The Senate's power was largely auctoritas, not imperium. Augustus' political genius was claiming in his Res Gestae that he surpassed all in auctoritas while holding no office not held by his colleagues — a masterful fiction that disguised autocracy as Republic."}],paths:[],facts:["Imperium: legal power to command","Auctoritas: moral authority and prestige","Augustus: master of the fiction"]},
// MILITARY & LEGIONS
{id:"mil1",cat:"military",name:"The Roman Legion",y1:-107,y2:476,desc:"Century, cohort, legion — the most effective fighting force of the ancient world.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Center of military administration and training.",wiki:"The legion was Rome's signature military unit. After the Marian reforms (~107 BC), each legion comprised ~5,200 men organized into 10 cohorts of 6 centuries each. A century (80 men) was commanded by a centurion. Standard equipment: gladius (short sword), pilum (javelin), scutum (rectangular shield), and lorica segmentata (segmented armor). Legions marched 20 miles per day and built fortified camps every night."},{n:"Castra Praetoria",lat:41.91,lng:12.52,info:"Praetorian Guard barracks in Rome.",wiki:"Built by Sejanus under Tiberius. Concentrated the elite Praetorian Guard within Rome's walls — a politically dangerous move. The barracks' remains are still visible near Termini station."},{n:"Vindonissa",lat:47.48,lng:8.22,info:"Legionary fortress in Switzerland.",wiki:"Modern Windisch. One of the best-preserved legionary fortresses on the Rhine frontier. Home to Legio XIII Gemina and later Legio XXI Rapax. Excavations revealed hospitals, bathhouses, amphitheatre, and writing tablets."}],paths:[[41.9,12.5,41.91,12.52,"Praetorians guard the emperor"],[41.9,12.5,47.48,8.22,"Legions deployed to the frontiers"]],facts:["~5,200 men per legion","Gladius, pilum, scutum","Marched 20 miles/day, built camps nightly"]},
{id:"mil2",cat:"military",name:"Marian Reforms",y1:-107,y2:-107,desc:"Marius opened the army to the landless poor — creating professional soldiers loyal to their generals.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Transformed Roman military recruitment.",wiki:"Before 107 BC, only property-owning citizens could serve. Marius recruited the landless proletarii, equipping them at state expense. This created a professional army but shifted soldier loyalty from the Republic to their commander — who provided land and pay. The reform made possible every warlord from Sulla to Caesar to Augustus."},{n:"Aquae Sextiae",lat:43.53,lng:5.45,info:"102 BC: new-model army destroyed the Teutones.",wiki:"Marius' reformed legions proved devastating against the Germanic Teutones at Aquae Sextiae (modern Aix-en-Provence). The disciplined, standardized army crushed a vast Germanic horde."},{n:"Vercellae",lat:45.32,lng:8.42,info:"101 BC: Cimbri destroyed.",wiki:"The following year, Marius and Catulus annihilated the Cimbri at Vercellae. The twin victories validated the new military system and made Marius a national hero."}],paths:[[41.9,12.5,43.53,5.45,"New army defeats the Teutones"],[43.53,5.45,45.32,8.42,"Cimbri destroyed the following year"]],facts:["Opened army to the landless","Created professional soldiers","Loyalty shifted from state to commander"]},
{id:"mil3",cat:"military",name:"The Praetorian Guard",y1:-27,y2:312,desc:"Elite 5,000-man imperial bodyguard — made and unmade emperors for 300 years.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Castra Praetoria — their barracks near the Viminal Hill.",wiki:"Augustus formalized the Praetorian Guard as nine cohorts of elite soldiers, each 500 men, with triple legionary pay. Under Sejanus (Tiberius' prefect), all nine cohorts were concentrated in one barracks in Rome — making them a political force. They assassinated Caligula, auctioned the empire to Didius Julianus (193 AD), and made or broke dozens of emperors. Constantine disbanded them after the Battle of Milvian Bridge in 312."}],paths:[],facts:["Triple legionary pay","Assassinated Caligula","Auctioned the empire in 193 AD"]},
{id:"mil4",cat:"military",name:"Roman Navy & Classis",y1:-260,y2:400,desc:"From novice fleet to Mediterranean dominance — the corvus boarding bridge changed naval warfare.",locs:[{n:"Misenum",lat:40.79,lng:14.08,info:"Main naval base — Classis Misenensis.",wiki:"Rome had no navy before 260 BC. During the First Punic War, they copied a captured Carthaginian quinquereme and built 120 ships in 60 days. The corvus (boarding bridge) let Roman infantry fight at sea. By the empire, the Classis Misenensis at Misenum was the largest fleet, commanded by Pliny the Elder when Vesuvius erupted."},{n:"Ravenna",lat:44.42,lng:12.2,info:"Adriatic fleet base — Classis Ravennas.",wiki:"The second major imperial fleet protected the Adriatic and eastern Mediterranean. The suburb Classe preserves the name. The fleets also patrolled the Rhine (Classis Germanica) and Danube (Classis Pannonica)."},{n:"Actium",lat:38.95,lng:20.73,info:"31 BC: decisive naval battle of the ancient world.",wiki:"Agrippa's lighter warships defeated Antony and Cleopatra's heavier fleet. The victory made Octavian master of the Roman world and demonstrated that naval power could decide the fate of empires."}],paths:[[40.79,14.08,44.42,12.2,"Two main fleets guard the Mediterranean"],[41.9,12.5,38.95,20.73,"Decisive battle at Actium"]],facts:["Built 120 ships in 60 days","Corvus boarding bridge","Pliny the Elder commanded at Misenum"]},
{id:"mil5",cat:"military",name:"The Roman Triumph",y1:-753,y2:403,desc:"Greatest military honor — victorious general paraded through Rome as a living god.",locs:[{n:"Via Sacra",lat:41.892,lng:12.488,info:"Triumphal procession route through the Forum.",wiki:"The triumph was Rome's supreme military honor. The general rode a four-horse chariot, face painted red like Jupiter, wearing a purple toga. Before him: spoils, captives, paintings of battles. Behind him: his troops singing bawdy songs. A slave whispered 'Memento mori' — 'Remember, you are mortal.' The route ran from the Campus Martius through the Forum to the Temple of Jupiter on the Capitoline."},{n:"Capitoline Hill",lat:41.893,lng:12.483,info:"Triumphs ended at the Temple of Jupiter.",wiki:"The general climbed the Capitoline to sacrifice to Jupiter Optimus Maximus. Enemy leaders were sometimes executed in the adjacent Tullianum prison. Vercingetorix and Jugurtha both died there. The last traditional triumph was Honorius' in 403 AD."}],paths:[[41.892,12.488,41.893,12.483,"Procession climbs to Jupiter's temple"]],facts:["Face painted red like Jupiter","Slave whispered 'Remember, you are mortal'","Last triumph: 403 AD"]},
{id:"mil6",cat:"military",name:"Siege Warfare",y1:-396,y2:73,desc:"Circumvallation, battering rams, siege towers, testudo — Rome's mastery shown at Alesia, Masada, and Jerusalem.",locs:[{n:"Alesia",lat:47.54,lng:4.5,info:"Caesar's double circumvallation, 52 BC.",wiki:"Caesar trapped 80,000 Gauls under Vercingetorix inside Alesia by building 18 km of inner walls (circumvallation) and 21 km of outer walls (contravallation) to repel a relief army. When 250,000 Gauls attacked from outside, Caesar held both lines. It was the masterpiece of ancient siege warfare."},{n:"Masada",lat:31.32,lng:35.35,info:"Roman siege ramp: engineering vs desperation.",wiki:"Herod's mountaintop fortress in the Judean desert. After Jerusalem fell in 70 AD, 960 Jewish holdouts resisted for three years. Romans built a massive earthen ramp up the cliff face. On the night before the final assault, the defenders chose mass suicide rather than slavery."},{n:"Jerusalem",lat:31.78,lng:35.23,info:"Five-month siege destroyed the Second Temple, 70 AD.",wiki:"Titus besieged Jerusalem with 70,000 troops using siege towers, battering rams, and earthworks. The defenders fought with extraordinary ferocity. The Temple caught fire in August 70 AD. Josephus records 1.1 million dead and 97,000 enslaved."}],paths:[[47.54,4.5,31.78,35.23,"Roman siege expertise spans the empire"],[31.78,35.23,31.32,35.35,"From Jerusalem to Masada"]],facts:["Alesia: 39 km of walls","Masada: massive siege ramp","Jerusalem: Temple destroyed 70 AD"]},
{id:"mil7",cat:"military",name:"Auxilia: Non-Citizen Troops",y1:-200,y2:400,desc:"Half the Roman army were auxiliaries — cavalry, archers, slingers who earned citizenship after 25 years.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Auxiliaries supplemented legions from the Republic onward.",wiki:"Auxiliary units (auxilia) provided the specialized troops legions lacked: cavalry, archers, slingers, and light infantry. Recruited from non-citizen peoples across the empire — Batavian horsemen, Syrian archers, Balearic slingers, Numidian cavalry. By the imperial period, auxiliaries numbered roughly equal to legionaries (~150,000 each). After 25 years of service, auxiliaries received Roman citizenship recorded on a bronze diploma."},{n:"Vindolanda",lat:54.99,lng:-2.36,info:"Auxiliary fort on Hadrian's Wall.",wiki:"Vindolanda was garrisoned by Batavian and Tungrian auxiliary cohorts from the Low Countries. The famous Vindolanda tablets — thin wooden postcards — reveal daily life: requests for beer and socks, a birthday party invitation, and reports on the fighting ability of local 'Brittunculi' (wretched little Britons)."},{n:"Dura-Europos",lat:34.75,lng:40.73,info:"Garrison on the Euphrates — multicultural auxiliary base.",wiki:"A frontier fortress in Syria garrisoned by diverse auxiliary units. Excavations revealed a synagogue, Christian house-church, and Mithraic temple side by side — reflecting the multicultural nature of auxiliary forces."}],paths:[[41.9,12.5,54.99,-2.36,"Batavians serve on Hadrian's Wall"],[41.9,12.5,34.75,40.73,"Auxiliaries guard the Euphrates frontier"]],facts:["Half the Roman army were auxiliaries","Citizenship after 25 years","Vindolanda tablets: 'send more beer'"]},
{id:"mil8",cat:"military",name:"Roman Military Camps (Castra)",y1:-200,y2:400,desc:"Standardized layout built every night on the march — porta praetoria, via principalis, hospital, granary.",locs:[{n:"Caerleon",lat:51.61,lng:-2.95,info:"Isca Augusta — best-preserved legionary fortress in Britain.",wiki:"Home of Legio II Augusta. The entire standardized layout is traceable: barracks, baths, amphitheatre, hospital, granaries. Excavations revealed the only known legionary latrine block in Britain. A marching legion built a similar (temporary) camp every single night — ditch, rampart, and palisade — in about 3 hours."},{n:"Lambaesis",lat:35.49,lng:6.26,info:"Best-preserved legionary camp in Africa.",wiki:"Home of Legio III Augusta in Numidia (Algeria). Hadrian's address to the troops is inscribed on a column — the most complete surviving Roman military speech. The principia (headquarters), praetorium (commander's house), and barracks survive remarkably intact."},{n:"Carnuntum",lat:48.11,lng:16.86,info:"Major legionary base on the Danube — reconstructed.",wiki:"Legionary fortress and civilian town on the Danube frontier. Marcus Aurelius wrote portions of his Meditations here. The reconstructed gladiator school and military amphitheatre show the full infrastructure that supported a permanent legion."}],paths:[[41.9,12.5,51.61,-2.95,"Legion posted to Britain"],[41.9,12.5,35.49,6.26,"Legion guards Africa"],[41.9,12.5,48.11,16.86,"Danube frontier defense"]],facts:["Built a camp every night in ~3 hours","Standard layout replicated across the empire","Hadrian's speech to troops survives at Lambaesis"]},
{id:"mil9",cat:"military",name:"Late Roman Army Reforms",y1:284,y2:476,desc:"Diocletian and Constantine transformed the army — limitanei on borders, comitatenses as mobile reserve.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Army doubled under Diocletian to ~400,000.",wiki:"Diocletian doubled the army from ~300,000 to ~400,000 men. He split it into limitanei (border garrison troops) and comitatenses (mobile field armies that could respond to threats). Constantine further reorganized, creating elite palatini units and reducing legion sizes. Germanic foederati (allied barbarian units) became increasingly important — by the 5th century, they formed the core of western armies."},{n:"Adrianople",lat:41.68,lng:26.56,info:"378 AD: catastrophe proved the new army's limits.",wiki:"The disaster at Adrianople, where Gothic cavalry destroyed Valens' field army, exposed fatal weaknesses. The late Roman army relied increasingly on cavalry over infantry, and on barbarian recruits over Roman citizens."},{n:"Ravenna",lat:44.42,lng:12.2,info:"Last western capital — defended by foederati.",wiki:"By the 5th century, the western army was overwhelmingly Germanic. Odoacer, who deposed the last emperor in 476, was himself a Germanic officer in Roman service. The army that 'fell' was already barely Roman."}],paths:[[41.9,12.5,41.68,26.56,"Field army fails at Adrianople"],[41.9,12.5,44.42,12.2,"Germanic troops defend the last capital"]],facts:["Army doubled to ~400,000","Limitanei (border) + comitatenses (mobile)","By 476, western army was mostly Germanic"]},
{id:"mil10",cat:"military",name:"Military Decorations & Honors",y1:-500,y2:400,desc:"Corona civica, corona muralis, dona militaria — Rome's medals for valor.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Military honors displayed at funerals and on tombstones.",wiki:"Roman military decorations (dona militaria) rewarded specific acts of valor. The corona civica (oak wreath) was awarded for saving a fellow citizen's life in battle — the highest personal honor. The corona muralis (gold crown with battlements) went to the first man over an enemy wall. The corona navalis honored naval valor. Centurions and officers received torques (neck rings), armillae (bracelets), and phalerae (medallion discs). These decorations were displayed on tombstones — many survive as our best evidence of Roman military life."}],paths:[],facts:["Corona civica: oak wreath for saving a citizen","Corona muralis: first over the enemy wall","Decorations displayed on tombstones"]},
{id:"mil11",cat:"military",name:"Legionary Training & Discipline",y1:-100,y2:400,desc:"'They trained as if in bloodless battles' — Vegetius. Route marches, weapons drill, camp building. Decimation.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Recruits trained on the Campus Martius.",wiki:"Roman military training was legendary. Recruits trained for 4 months: marching 20 Roman miles (30 km) in 5 hours with 27 kg of equipment, drilling with weighted wooden swords against posts, building fortified camps every night on the march, and swimming in armor. Vegetius (4th century AD) wrote: 'They trained as if in bloodless battles so that they fought as if in bloody training.' Discipline was brutal: decimation (executing every 10th man in a disgraced unit) was rare but real."},{n:"Lambaesis",lat:35.49,lng:6.26,info:"Legionary base in Numidia — Hadrian's speech survives.",wiki:"Lambaesis in North Africa was the base of Legio III Augusta. A remarkable inscription preserves Hadrian's speech to the legion in 128 AD — praising their drill, critiquing specific maneuvers, and setting standards. It's the most detailed surviving account of Roman military training expectations."}],paths:[[41.9,12.5,35.49,6.26,"Training standards enforced across the empire"]],facts:["30 km marches with 27 kg of equipment","Camps built every night on the march","Vegetius: 'bloodless battles, bloody training'"]},
{id:"mil12",cat:"military",name:"Roman Cavalry",y1:-300,y2:400,desc:"From citizen equites to auxiliary alae to cataphracti heavy lancers — cavalry evolved throughout Roman history.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Equites: Rome's original cavalry class.",wiki:"Roman cavalry evolved dramatically. In the Republic, citizen equites provided light cavalry — but Romans were mediocre horsemen. From the 2nd century BC, Rome increasingly relied on allied and auxiliary cavalry: Numidian light horse, Gallic heavy cavalry, and eventually Sarmatian cataphracti (fully armored lancers). By the late Empire, cavalry became the decisive arm. Key cavalry victories: Zama (202 BC), Pharsalus (48 BC); key defeat: Adrianople (378 AD), where Gothic cavalry destroyed the Roman infantry."},{n:"Ribchester",lat:53.87,lng:-2.52,info:"Roman cavalry fort in Britain — Sarmatian unit stationed here.",wiki:"Ribchester (Bremetennacum) in Lancashire housed a cavalry unit including Sarmatian horsemen — 5,500 were sent to Britain by Marcus Aurelius in 175 AD. The famous Ribchester helmet — a bronze cavalry sports helmet — is one of the finest Roman military artifacts ever found."}],paths:[[41.9,12.5,53.87,-2.52,"Sarmatian cavalry posted to Britain"]],facts:["Romans were mediocre horsemen — relied on allies","Cataphracti: fully armored lancers","Adrianople (378): cavalry destroyed the legions"]},
{id:"mil13",cat:"military",name:"Veterans & Military Colonies",y1:-200,y2:400,desc:"Discharged soldiers received land in coloniae — Romanizing frontiers from Cologne to Merida to Timgad.",locs:[{n:"Cologne",lat:50.94,lng:6.96,info:"Colonia Claudia Ara Agrippinensium — founded for veterans.",wiki:"Military colonies (coloniae) served dual purposes: rewarding veterans with land and Romanizing frontier regions. Cologne was founded as Colonia Claudia Ara Agrippinensium in 50 AD, becoming the capital of Germania Inferior. Veterans brought Roman law, language, architecture, and culture to the frontiers. Their families intermarried with locals, creating Romanized populations."},{n:"Merida",lat:38.92,lng:-6.34,info:"Emerita Augusta: colony for veterans of the Cantabrian Wars.",wiki:"Augustus founded Emerita Augusta (Merida) in 25 BC for veterans of Legions V and X after the Cantabrian Wars. It became the capital of Lusitania. Its theatre, amphitheatre, circus, aqueducts, and bridges survive — one of the best-preserved Roman cities in the west."},{n:"Timgad",lat:35.49,lng:6.47,info:"Trajan's perfect grid colony in North Africa.",wiki:"Trajan founded Thamugadi (Timgad) in 100 AD for veterans of Legio III Augusta. Laid out on a perfect grid, it included a forum, theatre, library, 14 bathhouses, and a triumphal arch. An inscription reads: 'To hunt, to bathe, to gamble, to laugh — that is to live.'"}],paths:[[41.9,12.5,50.94,6.96,"Veterans colonize the Rhine"],[41.9,12.5,38.92,-6.34,"Veterans settle in Iberia"],[41.9,12.5,35.49,6.47,"Veterans colonize North Africa"]],facts:["Colonies Romanized frontier regions","Veterans brought law, language, architecture","'To hunt, to bathe, to gamble, to laugh — that is to live'"]},
{id:"mil14",cat:"military",name:"Roman Military Medicine",y1:-100,y2:400,desc:"Valetudinaria (field hospitals), surgical instruments, medical corps — better trauma care than medieval Europe.",locs:[{n:"Vindonissa",lat:47.48,lng:8.22,info:"Legionary base with best-preserved valetudinarium.",wiki:"The Roman military had the ancient world's most advanced medical system. Each legion had a valetudinarium (field hospital) — a purpose-built facility with wards, operating rooms, and herb gardens. Vindonissa (Windisch, Switzerland) has the best-preserved example. Military doctors (medici) performed amputations, removed arrowheads, and treated wounds with vinegar (an antiseptic). Surgical instruments from Pompeii and Rimini rival 19th-century tools in sophistication."},{n:"Pompeii",lat:40.75,lng:14.49,info:"Surgical instruments found in the House of the Surgeon.",wiki:"The House of the Surgeon in Pompeii yielded over 40 surgical instruments: scalpels, forceps, bone levers, catheters, vaginal specula, and tools for trepanning (drilling the skull). The quality and variety demonstrate a sophisticated medical practice that was not matched again until the modern era."}],paths:[[47.48,8.22,40.75,14.49,"Military medical knowledge across the empire"]],facts:["Each legion had a field hospital (valetudinarium)","40+ surgical instruments found at Pompeii","Better trauma care than medieval Europe"]},
{id:"mil15",cat:"military",name:"The Foederati",y1:376,y2:476,desc:"Barbarian allied troops settled inside the empire — Alaric, Stilicho, and Odoacer were all foederati.",locs:[{n:"Adrianople",lat:41.68,lng:26.56,info:"378 AD: Visigoths destroyed the Roman army.",wiki:"After the Huns displaced them, the Visigoths crossed the Danube in 376 as foederati — allied settlers who would provide military service. Mistreatment led to rebellion. At Adrianople (378), Gothic cavalry destroyed Emperor Valens' army — the worst Roman defeat since Cannae. Theodosius settled the Goths as foederati within the empire, creating a precedent: barbarian groups would increasingly provide Rome's military manpower while maintaining their own identity and leadership."},{n:"Ravenna",lat:44.42,lng:12.2,info:"Odoacer — the last foederatus — deposed the last Western emperor.",wiki:"By the mid-5th century, the Western Roman army was largely composed of foederati under barbarian generals. Odoacer — a Germanic chieftain who was himself a foederatus — deposed the last Western emperor Romulus Augustulus in 476. He sent the imperial regalia to Constantinople. The defenders had become the conquerors."}],paths:[[41.68,26.56,44.42,12.2,"From Adrianople to Ravenna: foederati take over"]],facts:["Adrianople (378): worst defeat since Cannae","Foederati were barbarian settler-soldiers","Odoacer: the last foederatus deposed the last emperor"]},
{id:"mil16",cat:"military",name:"Roman Siege Engineers",y1:-200,y2:400,desc:"Ballistae, onagri, scorpiones — siege towers, battering rams, mining. Apollodorus designed Trajan's equipment.",locs:[{n:"Masada",lat:31.32,lng:35.35,info:"73 AD: Rome built a massive siege ramp up the cliff.",wiki:"Roman siege engineering was unmatched in the ancient world. Artillery included ballistae (bolt-shooters accurate to 300m), onagri (stone-throwers), and scorpiones (light anti-personnel weapons). At Masada, Flavius Silva built an enormous earth ramp 100 meters high up the cliff face to reach the fortress — an engineering feat visible today. At Alesia, Caesar built 18 km of walls facing in AND 21 km facing out. Apollodorus of Damascus designed siege equipment for Trajan's Dacian Wars."},{n:"Alesia",lat:47.54,lng:4.5,info:"52 BC: Caesar's double circumvallation — military engineering masterpiece.",wiki:"Caesar's siege of Alesia featured a double line of fortifications: 18 km of contravallation facing the besieged Gauls inside, and 21 km of circumvallation facing the relief army outside. Traps included sharpened stakes (lilia), iron-tipped caltrops (stimuli), and hidden pits. It was the most sophisticated siege engineering the ancient world had seen."},{n:"Rome",lat:41.9,lng:12.5,info:"Siege technology developed over centuries.",wiki:"Roman siege warfare evolved from simple escalade to complex engineering. Vitruvius (Book X) describes rams, siege towers, and protective screens (testudo). The key Roman advantage was patience and logistics — they could sustain sieges for years (Veii: 10 years, Numantia: 8 months of circumvallation, Jerusalem: 5 months)."}],paths:[[31.32,35.35,47.54,4.5,"Roman siege engineering across the empire"]],facts:["Masada ramp: 100 meters high","Alesia: double circumvallation (39 km total)","Ballistae accurate to 300 meters"]},
{id:"mil17",cat:"military",name:"Roman Military Standards & Eagles",y1:-104,y2:476,desc:"The aquila (eagle) was sacred to each legion — its loss was unforgivable. Augustus recovered Crassus' lost standards.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Standards kept in the legion's shrine (sacellum).",wiki:"Each Roman legion carried an aquila (eagle) — a gold or silver eagle standard that was the legion's soul. It was kept in the sacellum (shrine) of the camp and guarded by the first cohort. Losing an eagle was the ultimate disgrace — the legion might be disbanded. Marius made the eagle the sole legionary standard in 104 BC. When Crassus lost three eagles at Carrhae (53 BC), it haunted Rome for decades. Augustus recovered them through diplomacy in 20 BC — an event celebrated on coins and the Prima Porta statue."},{n:"Carrhae",lat:36.86,lng:39.03,info:"53 BC: Crassus' eagles captured by Parthia.",wiki:"The loss of Crassus' eagles at Carrhae was a national trauma. The Parthians paraded them in triumph. Augustus made their recovery a diplomatic priority — in 20 BC, the Parthian king returned them. Augustus built the Temple of Mars Ultor (Mars the Avenger) to house them. It was one of his greatest propaganda victories."}],paths:[[36.86,39.03,41.9,12.5,"Lost eagles recovered from Parthia"]],facts:["Marius made the eagle the sole standard (104 BC)","Loss of an eagle: legion might be disbanded","Augustus recovered Crassus' eagles (20 BC)"]},
{id:"mil18",cat:"military",name:"The Limes & Frontier Defense System",y1:83,y2:476,desc:"10,000+ km of frontier — watchtowers, signal stations, patrol roads, buffer zones. The empire's skin.",locs:[{n:"Saalburg",lat:50.27,lng:8.57,info:"Reconstructed fort on the Germanic Limes.",wiki:"The Roman frontier (limes) stretched over 10,000 km from Hadrian's Wall in Britain to the Euphrates in Syria. It was not a single wall but a system: observation towers (every 500m on the Germanic Limes), signal stations using fire and smoke, patrol roads, forts (every 10-15 km), and buffer zones. The Germanic Limes alone had 568 km of palisade/wall, 900 watchtowers, and 60 forts."},{n:"Hadrian's Wall",lat:55.0,lng:-1.53,info:"117 km wall with 80 milecastles and 160 turrets.",wiki:"Hadrian's Wall was the most elaborate frontier in the empire: a stone wall 3m wide and 4-5m tall, stretching 117 km coast to coast across Britain. It had a milecastle every Roman mile, two turrets between each milecastle, and a ditch (vallum) to the south. 15,000 troops garrisoned its forts."},{n:"Dura-Europos",lat:34.75,lng:40.73,info:"Eastern frontier garrison on the Euphrates.",wiki:"The eastern frontier along the Euphrates was defended differently — desert forts, allied Arab tribes, and mobile cavalry. Dura-Europos was a key garrison town whose destruction by Sasanids (c. 257 AD) preserved stunning archaeological evidence of frontier military life, including painted shields, religious buildings, and siege tunnels."}],paths:[[50.27,8.57,55.0,-1.53,"Northern Limes from Germany to Britain"],[50.27,8.57,34.75,40.73,"10,000 km of frontier"]],facts:["10,000+ km of frontier defenses","Germanic Limes: 900 watchtowers, 60 forts","Hadrian's Wall: 15,000 troops garrisoned"]},
{id:"mil19",cat:"military",name:"Roman Intelligence & Espionage",y1:-200,y2:400,desc:"Speculatores (scouts/spies), frumentarii (secret police), agentes in rebus. Caesar's intelligence won Gaul.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Intelligence networks operated from Rome across the empire.",wiki:"Rome maintained sophisticated intelligence operations throughout its history. Speculatores served as scouts, spies, and assassins attached to each legion. Under the Empire, the frumentarii (originally grain supply officers) became a secret police — gathering intelligence, delivering sensitive messages, and carrying out arrests and assassinations. They were so feared and hated that Diocletian disbanded them, replacing them with the agentes in rebus. Caesar was a master of intelligence: his Gallic Wars reveal systematic use of scouts, interrogation of prisoners, and bribery of local informants."}],paths:[],facts:["Speculatores: scouts, spies, and assassins","Frumentarii: secret police so hated they were disbanded","Caesar: master of military intelligence"]},
{id:"mil20",cat:"military",name:"Logistics & the Roman Supply Chain",y1:-200,y2:400,desc:"Feeding 300,000+ troops — grain, wine, oil, equipment. Horrea granaries. Vindolanda tablets reveal the details.",locs:[{n:"Vindolanda",lat:54.99,lng:-2.36,info:"Wooden tablets reveal the minutiae of Roman military supply.",wiki:"The Vindolanda writing tablets — found at a fort near Hadrian's Wall — are among the most important Roman finds in Britain. They reveal the everyday logistics of a frontier garrison: supply requests ('please send more beer'), strength reports, duty rosters, birthday party invitations, and letters home. They provide unparalleled insight into the Roman military supply chain."},{n:"Rome",lat:41.9,lng:12.5,info:"Central logistics hub for the Roman military.",wiki:"Supplying 300,000+ troops across 10,000 km of frontier required a logistics system unmatched until the modern era. Each legion consumed approximately 7,500 kg of grain daily. Horrea (granaries) at major bases could store an entire year's supply. The cursus publicus (imperial post) and the road network provided communication. Sea transport moved supplies in bulk — far cheaper than overland. The annona militaris (military supply tax) extracted grain, animals, leather, and recruits from provincial populations."},{n:"Carnuntum",lat:48.11,lng:16.86,info:"Major legionary base with extensive supply infrastructure.",wiki:"Carnuntum on the Danube was one of the empire's largest military bases — housing Legio XIV Gemina and later Legio XV Apollinaris. Excavations reveal enormous granaries, workshops producing weapons and armor, and a civilian settlement of 50,000 supporting the garrison. The amphitheatre, bath complex, and military museum survive."}],paths:[[54.99,-2.36,41.9,12.5,"Supply chain from frontier to Rome"],[41.9,12.5,48.11,16.86,"Logistics to the Danube frontier"]],facts:["Each legion consumed 7,500 kg of grain daily","Vindolanda tablets: 'please send more beer'","Supply system unmatched until modern era"]},
// CITIES & PROVINCES
{id:"cit1",cat:"cities",name:"Ephesus",y1:-129,y2:263,desc:"250,000 population, Library of Celsus, Temple of Artemis — jewel of Roman Asia.",locs:[{n:"Ephesus",lat:37.94,lng:27.34,info:"Third-largest city in the Roman Empire.",wiki:"Capital of the province of Asia with ~250,000 inhabitants. The Library of Celsus held 12,000 scrolls. The Theatre seated 24,000 — where a riot against St. Paul erupted (Acts 19). The Temple of Artemis was one of the Seven Wonders of the World. The city's harbor gradually silted up, leading to its decline."}],paths:[],facts:["250,000 population","Library of Celsus: 12,000 scrolls","Theatre: 24,000 seats"]},
{id:"cit2",cat:"cities",name:"Leptis Magna",y1:-46,y2:439,desc:"Birthplace of Septimius Severus — finest surviving Roman ruins in Africa.",locs:[{n:"Leptis Magna",lat:32.64,lng:14.29,info:"Modern Libya — UNESCO World Heritage Site.",wiki:"Originally a Phoenician colony, Leptis Magna flourished under Rome. When native son Septimius Severus became emperor (193 AD), he lavished the city with a new forum, basilica, and triumphal arch. The olive oil trade made it wealthy. Buried by sand for centuries, its ruins are among the best-preserved in the Roman world."}],paths:[],facts:["Birthplace of Emperor Septimius Severus","Olive oil wealth","Buried by sand — superbly preserved"]},
{id:"cit3",cat:"cities",name:"Pompeii & Herculaneum",y1:-80,y2:79,desc:"Frozen in time by Vesuvius — an unmatched window into Roman daily life.",locs:[{n:"Pompeii",lat:40.75,lng:14.49,info:"Population ~20,000. Buried under 4-6m of pumice and ash.",wiki:"Colonized by Sulla's veterans in 80 BC. A thriving commercial city with forums, baths, amphitheatre, brothels, bakeries, and fast-food counters (thermopolia). The eruption of August 24, 79 AD buried it under meters of volcanic material, preserving buildings, frescoes, graffiti, food, and even the shapes of victims."},{n:"Herculaneum",lat:40.81,lng:14.35,info:"Wealthier resort town — preserved by pyroclastic flows.",wiki:"Smaller and wealthier than Pompeii. Pyroclastic flows at 500°C carbonized and preserved wooden beams, furniture, food, and even a library of papyrus scrolls (Villa of the Papyri). Bodies found in boathouses showed people fleeing to the sea."}],paths:[[40.75,14.49,40.81,14.35,"Both buried by Vesuvius, 79 AD"]],facts:["20,000 population at Pompeii","Thermopolia: ancient fast food","Herculaneum: carbonized scrolls survive"]},
{id:"cit4",cat:"cities",name:"Antioch",y1:-64,y2:637,desc:"Third-largest Roman city (~500,000). Eastern capital. Where 'Christians' were first named.",locs:[{n:"Antioch",lat:36.2,lng:36.15,info:"Modern Antakya, Turkey.",wiki:"Founded 300 BC by Seleucus I. Pompey annexed it in 64 BC. With ~500,000 inhabitants, it was the empire's third city after Rome and Alexandria. Famous for its 6-km colonnaded main street, Olympic games, and pleasure gardens at Daphne. Acts 11:26 records that 'the disciples were first called Christians at Antioch.' Multiple devastating earthquakes struck the city."}],paths:[],facts:["~500,000 population","'Christians' first named here","Famous colonnaded main street"]},
{id:"cit5",cat:"cities",name:"Carthage Reborn",y1:-44,y2:698,desc:"Rebuilt by Caesar and Augustus — became the empire's 4th-largest city and Africa's capital.",locs:[{n:"Carthage",lat:36.85,lng:10.33,info:"Destroyed 146 BC, refounded 44 BC.",wiki:"Julius Caesar planned the colony; Augustus realized it. The refounded Colonia Julia Carthago grew rapidly into the empire's fourth-largest city with ~500,000 people. Capital of Africa Proconsularis, it exported vast quantities of grain, olive oil, and pottery. Tertullian, Cyprian, and Augustine all worked here. The Vandals captured it in 439 AD."}],paths:[],facts:["Destroyed 146 BC, refounded 44 BC","~500,000 population","Home of Augustine and Tertullian"]},
{id:"cit6",cat:"cities",name:"Constantinople: New Rome",y1:330,y2:476,desc:"Founded by Constantine 330 AD — triple walls, 500,000 people, survived when the West fell.",locs:[{n:"Constantinople",lat:41.0,lng:29.0,info:"Modern Istanbul — capital for 1,100 years.",wiki:"Constantine chose the ancient Greek city of Byzantium for his new capital in 324 AD. Dedicated May 11, 330 as 'New Rome.' Its triple Theodosian walls (built 413 AD) were the most formidable fortifications in the medieval world — not breached until 1204 (Crusaders) and 1453 (Ottomans). With 500,000 inhabitants, a hippodrome seating 100,000, the Hagia Sophia, and the accumulated treasures of the Roman world, it was the greatest city in Europe for a thousand years."}],paths:[],facts:["Dedicated May 11, 330 AD","Theodosian Walls: unbreached for 800 years","500,000 inhabitants"]},
{id:"cit7",cat:"cities",name:"Alexandria",y1:-30,y2:642,desc:"Second city of the empire — 500,000 people, the Great Library, and the Pharos Lighthouse.",locs:[{n:"Alexandria",lat:31.2,lng:29.9,info:"Founded by Alexander 331 BC. Roman from 30 BC.",wiki:"Alexandria was the Roman Empire's second city with ~500,000 inhabitants. The Great Library (and its daughter library at the Serapeum) held hundreds of thousands of scrolls — the ancient world's largest collection of knowledge. The Pharos Lighthouse, one of the Seven Wonders, guided ships into the double harbor. The Mouseion (Museum) was a state-funded research institute where Euclid, Eratosthenes, and Hero worked. The city was intensely multicultural — Greek, Jewish, and Egyptian quarters coexisted tensely. Egypt's grain surplus made Alexandria the key to feeding Rome."}],paths:[],facts:["~500,000 population","Great Library: largest ancient collection","Pharos Lighthouse: one of Seven Wonders"]},
{id:"cit8",cat:"cities",name:"Athens under Rome",y1:-146,y2:529,desc:"Intellectual capital — philosophy schools survived 900 years until Justinian closed them in 529 AD.",locs:[{n:"Athens",lat:37.98,lng:23.73,info:"Sacked by Sulla (86 BC), rebuilt by Hadrian.",wiki:"Rome conquered Athens in 146 BC and Sulla sacked it in 86 BC, but the city's intellectual prestige ensured its survival. It remained the Mediterranean's university town — Cicero, Horace, Brutus, and Marcus Aurelius all studied here. Hadrian lavished it with buildings: the Temple of Olympian Zeus, a new library, and an entire new quarter. In 176 AD, Marcus Aurelius endowed four chairs of philosophy (Platonic, Aristotelian, Stoic, Epicurean). The philosophy schools survived until Justinian closed them in 529 AD — ending 900 years of continuous teaching."}],paths:[],facts:["Sacked by Sulla, rebuilt by Hadrian","University town for Roman elites","Philosophy schools closed 529 AD"]},
{id:"cit9",cat:"cities",name:"Londinium",y1:47,y2:410,desc:"Founded after Claudius' invasion, burned by Boudicca, rebuilt to 60,000 people.",locs:[{n:"Londinium",lat:51.5,lng:-0.1,info:"Modern London — capital of Roman Britain.",wiki:"Londinium was founded around 47 AD as a trading settlement at the lowest bridging point of the Thames. Boudicca burned it to the ground in 60 AD — the destruction layer is visible in archaeological digs. Rebuilt, it grew to ~60,000 people by the 2nd century with a forum-basilica (larger than any in Rome), an amphitheatre, public baths, and a massive defensive wall (parts survive). The Mithraeum (temple of Mithras) was discovered in 1954. Roman London was abandoned around 410 when the legions withdrew."}],paths:[],facts:["Founded ~47 AD","Burned by Boudicca, 60 AD","Population ~60,000 at peak"]},
{id:"cit10",cat:"cities",name:"Mediolanum (Milan)",y1:-222,y2:402,desc:"Western imperial capital from 286 AD — where the Edict of Milan was issued and Ambrose defied an emperor.",locs:[{n:"Mediolanum",lat:45.46,lng:9.19,info:"Modern Milan — replaced Rome as western capital.",wiki:"Originally a Celtic settlement conquered in 222 BC, Mediolanum became the western empire's de facto capital under Maximian (286 AD). Closer to the Alpine frontiers than Rome, it was strategically vital. The Edict of Milan (313 AD) legalizing Christianity was issued here. Bishop Ambrose made it a center of Christian authority — in 390, he forced Emperor Theodosius to do public penance for the Thessalonica massacre, establishing the principle that even emperors were subject to moral law. The court moved to Ravenna in 402 after Alaric's invasion threatened."}],paths:[],facts:["Western capital from 286 AD","Edict of Milan issued here (313)","Ambrose forced Theodosius to do penance"]},
{id:"cit11",cat:"cities",name:"Trier (Augusta Treverorum)",y1:-16,y2:476,desc:"'Second Rome' north of the Alps — imperial capital with the Porta Nigra, Constantine's Basilica, and imperial baths.",locs:[{n:"Trier",lat:49.75,lng:6.64,info:"Imperial residence from Diocletian to Valentinian.",wiki:"Augusta Treverorum (Trier) was founded in the late 1st century BC. It became an imperial residence under the Tetrarchy, hosting Constantine I and his mother Helena. At its height, it had 80,000 inhabitants. The Porta Nigra — the largest surviving Roman city gate — is built from 7,200 stone blocks held without mortar. Constantine's Aula Palatina (Basilica) is the largest surviving Roman audience hall. The imperial baths, amphitheatre, and bridge survive. Trier has more Roman monuments than any city outside Italy — nine are UNESCO World Heritage Sites."}],paths:[],facts:["Largest surviving Roman city gate (Porta Nigra)","Constantine's audience hall still stands","9 UNESCO World Heritage Roman monuments"]},
