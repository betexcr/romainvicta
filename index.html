{id:"exp9",cat:"expansion",name:"Conquest of Hispania",y1:-218,y2:-19,desc:"200-year conquest from the Punic Wars to Augustus — Rome's longest provincial war.",locs:[{n:"Numantia",lat:41.81,lng:-2.44,info:"Resisted Rome for 20 years.",wiki:"Celtiberian fortress that defied Rome for two decades. In 133 BC, Scipio Aemilianus besieged it with 60,000 troops. The 4,000 defenders chose mass suicide over surrender."},{n:"Italica",lat:37.44,lng:-6.04,info:"First Roman settlement in Hispania, 206 BC.",wiki:"Founded by Scipio Africanus for wounded veterans. Birthplace of emperors Trajan and Hadrian. Spectacular amphitheatre seated 25,000."},{n:"Emerita Augusta",lat:38.92,lng:-6.34,info:"Modern Mérida — founded by Augustus for retired legionaries.",wiki:"Founded 25 BC as a colony for veterans of the Cantabrian Wars. Theatre, amphitheatre, aqueduct, and bridge survive. Called 'the Spanish Rome.'"},{n:"Carthago Nova",lat:37.6,lng:-0.99,info:"Captured by Scipio in 209 BC.",wiki:"Hannibal's base in Spain. Scipio Africanus captured it in a single day by exploiting low tide in the lagoon. Spain's richest silver mines were nearby."}],paths:[[41.9,12.5,37.6,-0.99,"Scipios invade Spain during the Punic Wars"],[37.6,-0.99,41.81,-2.44,"200 years of resistance in central Spain"],[41.81,-2.44,38.92,-6.34,"Augustus completes the conquest"]],facts:["200 years to conquer","Numantia: 20 years of resistance","Birthplace of Trajan and Hadrian"]},
{id:"exp10",cat:"expansion",name:"Conquest of Britannia",y1:43,y2:84,desc:"Claudius invaded with 40,000 troops — Boudicca nearly reversed it.",locs:[{n:"Richborough",lat:51.3,lng:1.33,info:"Landing site of the Roman invasion, 43 AD.",wiki:"Rutupiae — where four legions under Aulus Plautius landed. Claudius himself arrived with war elephants for the final push to Camulodunum."},{n:"Camulodunum",lat:51.89,lng:0.9,info:"Modern Colchester — first Roman capital of Britain.",wiki:"Capital of the Catuvellauni tribe. Claudius accepted the surrender of 11 British kings here. A huge temple to Claudius was built — later burned by Boudicca."},{n:"Londinium",lat:51.5,lng:-0.1,info:"Burned by Boudicca in 60 AD, rebuilt as provincial capital.",wiki:"Originally a small trading post. After Boudicca burned it, rebuilt as Britannia's largest city with ~60,000 inhabitants."},{n:"Mons Graupius",lat:57.5,lng:-3.0,info:"Agricola's northernmost battle, 84 AD.",wiki:"Agricola defeated the Caledonians under Calgacus. Tacitus records: 'They create a desert and call it peace.' The furthest north Rome ever fought in Britain."}],paths:[[51.3,1.33,51.89,0.9,"Legions advance to Camulodunum, 43 AD"],[51.89,0.9,51.5,-0.1,"Londinium becomes the hub of Roman Britain"],[51.5,-0.1,57.5,-3.0,"Agricola advances to the Scottish Highlands"]],facts:["40,000 troops invaded","Boudicca burned three cities","'They create a desert and call it peace'"]},
{id:"exp11",cat:"expansion",name:"Conquest of Greece & Macedonia",y1:-215,y2:-146,desc:"Four Macedonian Wars ended Greek independence — Flamininus declared Greek freedom, then Rome destroyed Corinth.",locs:[{n:"Cynoscephalae",lat:39.4,lng:22.6,info:"197 BC: Flamininus defeated Philip V's phalanx.",wiki:"The Battle of Cynoscephalae proved the Roman legion's superiority over the Macedonian phalanx. Philip V's rigid formation broke apart on uneven ground while the flexible Roman maniples exploited every gap. Flamininus then dramatically declared Greek freedom at the Isthmian Games of 196 BC — the crowd wept."},{n:"Pydna",lat:40.37,lng:22.59,info:"168 BC: decisive end of Macedonian kingdom.",wiki:"Aemilius Paullus crushed King Perseus at Pydna. The phalanx again proved fatally inflexible — once gaps opened, legionaries penetrated and slaughtered from within. 20,000 Macedonians killed. Perseus was paraded in Paullus' triumph."},{n:"Corinth",lat:37.9,lng:22.9,info:"146 BC: destroyed by Mummius — same year as Carthage.",wiki:"Consul Mummius razed Corinth to send a message: resistance was futile. Art treasures were shipped to Rome. The city lay abandoned for 100 years until Caesar refounded it in 44 BC. Greece became the Roman province of Achaea."}],paths:[[39.4,22.6,40.37,22.59,"Macedonian Wars: Cynoscephalae to Pydna"],[40.37,22.59,37.9,22.9,"Rome crushes the last resistance at Corinth"]],facts:["Flamininus declared Greek freedom (196 BC)","Pydna ended the Macedonian kingdom","Corinth destroyed same year as Carthage (146 BC)"]},
{id:"exp12",cat:"expansion",name:"Annexation of Egypt",y1:-30,y2:-30,desc:"Octavian seized Egypt after Actium — the richest province became the emperor's personal domain.",locs:[{n:"Alexandria",lat:31.2,lng:29.9,info:"Cleopatra and Antony died here, 30 BC.",wiki:"After defeating Antony and Cleopatra at Actium (31 BC), Octavian entered Alexandria in 30 BC. Both committed suicide. Egypt became a Roman province — but unlike any other, it was the emperor's personal property, forbidden to senators. Its grain surplus fed Rome; its taxes enriched the treasury. Egypt produced one-third of Rome's grain supply."},{n:"Rome",lat:41.9,lng:12.5,info:"Egyptian obelisks transported to adorn the capital.",wiki:"Augustus brought Egyptian obelisks to Rome, beginning a fashion that continued for centuries. Thirteen ancient obelisks still stand in Rome. Control of Egypt gave Augustus unmatched economic power — whoever held Egypt's grain held Rome by the throat."}],paths:[[31.2,29.9,41.9,12.5,"Grain and wealth flow from Egypt to Rome"]],facts:["Emperor's personal province — senators barred","One-third of Rome's grain supply","13 Egyptian obelisks still stand in Rome"]},
{id:"exp13",cat:"expansion",name:"Romanization",y1:-200,y2:400,desc:"How conquered peoples became Roman — roads, colonies, citizenship, Latin, and architecture transformed the Mediterranean.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Center of the Romanization process.",wiki:"Rome's genius was integration, not just conquest. Defeated peoples were gradually absorbed through a layered system: roads connected them, colonies settled among them, Latin became the language of law and trade, and citizenship was extended as a reward. Within generations, 'barbarians' became Romans — senators, emperors, and poets."},{n:"Nemausus",lat:43.84,lng:4.36,info:"Modern Nimes — a masterpiece of Romanization.",wiki:"Nemausus (Nimes) in southern Gaul exemplifies Romanization. The Maison Carree temple, amphitheatre, and Tour Magne show how a Celtic town transformed into a thoroughly Roman city. Emperor Antoninus Pius' family came from here — Gauls had become emperors."},{n:"Timgad",lat:35.49,lng:6.47,info:"Perfect Roman grid city in North Africa.",wiki:"Founded by Trajan in 100 AD for veterans. Built on a perfect grid plan with forum, theatre, baths, library, and triumphal arch. An inscription reads: 'To hunt, to bathe, to gamble, to laugh — this is living.' Buried by sand, it's one of the best-preserved Roman cities."}],paths:[[41.9,12.5,43.84,4.36,"Romanization transforms Gaul"],[41.9,12.5,35.49,6.47,"Roman grid cities planted in Africa"]],facts:["Roads, colonies, citizenship, Latin","Gauls became emperors within generations","Timgad: 'to hunt, bathe, gamble, laugh — this is living'"]},
{id:"exp14",cat:"expansion",name:"The Limes: Frontier Defenses",y1:83,y2:476,desc:"Rhine-Danube frontier with palisades, stone walls, watchtowers, and forts — the empire's skin.",locs:[{n:"Saalburg Fort",lat:50.27,lng:8.57,info:"Reconstructed Roman fort on the Germanic Limes.",wiki:"The Saalburg is a reconstructed auxiliary fort on the Upper Germanic Limes in Germany. Kaiser Wilhelm II rebuilt it in 1897-1907. The Limes Germanicus stretched 568 km from the Rhine to the Danube with 900 watchtowers and 60 forts. UNESCO World Heritage Site."},{n:"Carnuntum",lat:48.11,lng:16.86,info:"Major legionary base on the Danube Limes.",wiki:"Carnuntum guarded the Danube frontier with a legionary fortress and civilian town of 50,000. Marcus Aurelius wrote his Meditations here. The reconstructed gladiator school and Heidentor (pagan gate) are among the best-preserved frontier remains."},{n:"Dura-Europos",lat:34.75,lng:40.73,info:"Desert fortress on the eastern Euphrates frontier.",wiki:"A frontier garrison on the Euphrates in Syria. Excavations revealed a synagogue, Christian house-church, and Mithraeum side by side — reflecting the multicultural nature of frontier life. Destroyed by the Sasanians around 257 AD."}],paths:[[50.27,8.57,48.11,16.86,"Germanic and Danube Limes connect"],[41.9,12.5,34.75,40.73,"Eastern frontier on the Euphrates"]],facts:["568 km Germanic Limes with 900 watchtowers","Danube frontier: longest border","UNESCO World Heritage Site"]},
{id:"exp15",cat:"expansion",name:"Division of the Empire",y1:395,y2:395,desc:"Theodosius' death split the empire between his sons Arcadius and Honorius — never reunited.",locs:[{n:"Constantinople",lat:41.0,lng:29.0,info:"Capital of the Eastern Roman Empire under Arcadius.",wiki:"When Theodosius I died on January 17, 395 AD, the Roman Empire was divided between his two young sons. Arcadius (age 17) received the East, ruling from Constantinople. This division proved permanent — the two halves never reunited. The East thrived for another 1,058 years; the West fell in 81."},{n:"Ravenna",lat:44.42,lng:12.2,info:"Western capital under Honorius.",wiki:"Honorius (age 10) received the West, soon moving his capital from Milan to Ravenna — protected by marshes and a short sea crossing to Constantinople. From here, a succession of increasingly powerless emperors watched the Western empire crumble."},{n:"Milan",lat:45.46,lng:9.19,info:"Western capital before the move to Ravenna.",wiki:"Milan (Mediolanum) had served as the western capital since Diocletian's time. Honorius abandoned it for Ravenna in 402 after Alaric's Gothic forces threatened northern Italy. The move symbolized the West's retreat from active defense."}],paths:[[41.0,29.0,44.42,12.2,"Empire permanently divided"],[45.46,9.19,44.42,12.2,"Capital retreats to Ravenna"]],facts:["Theodosius died January 17, 395 AD","East survived 1,058 more years","West fell in 81 years"]},
{id:"exp16",cat:"expansion",name:"Conquest of Gaul",y1:-58,y2:-50,desc:"Caesar's 8-year campaign — 1 million killed, 1 million enslaved, 800 towns stormed. Gaul became Rome's richest western province.",locs:[{n:"Bibracte",lat:46.9,lng:4.04,info:"58 BC: Caesar defeated the Helvetii here.",wiki:"Caesar's first major battle in Gaul (58 BC). The Helvetii — 368,000 people migrating westward — were intercepted and defeated near the oppidum of Bibracte, capital of the Aedui. Caesar had entered Gaul with six legions, ostensibly to protect Roman allies. He would not leave for eight years."},{n:"Alesia",lat:47.54,lng:4.5,info:"52 BC: decisive siege ended Gallic resistance.",wiki:"Vercingetorix united the Gallic tribes and defeated Caesar at Gergovia, but was then trapped at Alesia with 80,000 warriors. Caesar built 18 km of siege walls facing inward AND 21 km facing outward against the 250,000-strong relief army. He defeated both. Vercingetorix surrendered personally. He was kept in a Roman dungeon for six years, paraded in Caesar's triumph, then strangled."},{n:"Gergovia",lat:45.72,lng:3.1,info:"52 BC: Caesar's only defeat in Gaul.",wiki:"Vercingetorix defeated Caesar at Gergovia — his only loss in the Gallic campaign. 700 Romans died in a botched assault on the hilltop fortress. The defeat prompted most of Gaul to join the revolt."}],paths:[[46.9,4.04,45.72,3.1,"Caesar's campaigns across Gaul"],[45.72,3.1,47.54,4.5,"From Gergovia defeat to Alesia victory"]],facts:["1 million Gauls killed, 1 million enslaved","800 towns stormed in 8 years","Vercingetorix strangled after Caesar's triumph"]},
{id:"exp17",cat:"expansion",name:"Conquest of Africa",y1:-146,y2:-46,desc:"From Carthage's destruction to Caesar's African War — Africa Proconsularis became Rome's breadbasket.",locs:[{n:"Carthage",lat:36.85,lng:10.33,info:"146 BC: destroyed. Later refounded by Caesar.",wiki:"In 146 BC, Scipio Aemilianus destroyed Carthage after a three-year siege. The city burned for 17 days. The population was sold into slavery. The site was symbolically plowed with salt (though this is likely legend). A century later, Julius Caesar refounded it as Colonia Julia Carthago (44 BC), and Augustus completed the project. The reborn city became the Roman Empire's fourth-largest."},{n:"Thapsus",lat:35.6,lng:11.0,info:"46 BC: Caesar crushed Pompeian resistance in Africa.",wiki:"At Thapsus, Caesar defeated the combined forces of Metellus Scipio, Juba I of Numidia, and remaining Pompeian diehards. The victory gave Rome complete control of North Africa. Cato committed suicide at Utica rather than submit to Caesar."},{n:"Utica",lat:36.95,lng:10.06,info:"Cato the Younger committed suicide here, 46 BC.",wiki:"After Caesar's victory at Thapsus, Cato — the Republic's most principled defender — read Plato's Phaedo on the immortality of the soul, then stabbed himself. When doctors stitched his wound, he tore it open with his bare hands. His death made him the ultimate symbol of republican virtue."}],paths:[[36.85,10.33,35.6,11.0,"Caesar's African campaign"],[35.6,11.0,36.95,10.06,"Cato's last stand at Utica"]],facts:["Carthage burned for 17 days (146 BC)","Caesar refounded Carthage (44 BC)","Africa produced one-third of Rome's grain"]},
{id:"exp18",cat:"expansion",name:"Bequest of Pergamum & Asia Minor",y1:-133,y2:-133,desc:"Attalus III willed his kingdom to Rome — the richest province in the East. Tax farming scandals followed.",locs:[{n:"Pergamon",lat:39.12,lng:27.18,info:"Capital of the Attalid kingdom, bequeathed 133 BC.",wiki:"King Attalus III of Pergamon died without legitimate heirs in 133 BC and willed his entire kingdom to the Roman people. The bequest included western Asia Minor — one of the ancient world's wealthiest regions. Rome's attempts to claim it provoked Aristonicus' revolt (132-129 BC), but the province of Asia was eventually organized and became the empire's richest territory."},{n:"Ephesus",lat:37.94,lng:27.34,info:"Became the capital of the province of Asia.",wiki:"Ephesus replaced Pergamon as the provincial capital. It grew to 250,000 people — the largest city in Asia Minor. Roman tax farming (publicani) squeezed the province mercilessly, helping provoke Mithridates' massacre of 80,000 Italians in 88 BC. The province's wealth funded Rome's late Republican wars."}],paths:[[39.12,27.18,37.94,27.34,"Pergamum bequeathed, Ephesus becomes capital"]],facts:["Attalus III willed his kingdom to Rome","80,000 Italians massacred in 88 BC","Richest province in the Roman East"]},
{id:"exp19",cat:"expansion",name:"Conquest of Dacia",y1:101,y2:106,desc:"Trajan's two campaigns — 165 tons of gold seized. Dacia became the only Latin-speaking province beyond the Danube.",locs:[{n:"Sarmizegetusa",lat:45.6,lng:23.3,info:"Dacian capital — fell in 106 AD.",wiki:"Sarmizegetusa Regia was King Decebalus' mountain capital. Trajan captured it in the First Dacian War (101-102), but Decebalus broke the peace. In the Second War (105-106), Trajan returned, captured the capital again, and found the royal treasury — 165 tons of gold and 331 tons of silver — hidden under a diverted river. Decebalus committed suicide. Dacia was colonized with settlers from across the empire and became the only province beyond the Danube where Latin took root — modern Romanian descends from Dacian Latin."},{n:"Drobeta Bridge",lat:44.63,lng:22.66,info:"Apollodorus' masterpiece: longest arch bridge for 1,000 years.",wiki:"To cross the Danube, Trajan commissioned Apollodorus of Damascus to build a bridge at Drobeta. It was 1,135 meters long with 20 piers — the longest arch bridge in the world for over a millennium. Hadrian later dismantled it to prevent barbarian crossing."}],paths:[[44.63,22.66,45.6,23.3,"Trajan crosses the Danube to conquer Dacia"]],facts:["165 tons of gold, 331 tons of silver seized","Romanian descends from Dacian Latin","Trajan's Column depicts the entire campaign"]},
{id:"exp20",cat:"expansion",name:"Conquest of Arabia",y1:106,y2:106,desc:"Trajan annexed the Nabataean kingdom — Petra became a Roman city. Arabia Petraea connected Red Sea trade to the empire.",locs:[{n:"Petra",lat:30.33,lng:35.44,info:"Nabataean capital — annexed peacefully in 106 AD.",wiki:"The Nabataean kingdom, centered on the rock-carved city of Petra, was annexed by Trajan in 106 AD — apparently peacefully, as the last king Rabbel II had died. Petra's famous Treasury (Al-Khazneh), carved from sandstone, was already centuries old. The Romans built a colonnaded street, baths, and a theater. The province of Arabia Petraea connected the Red Sea trade route to the broader Roman commercial network."},{n:"Bosra",lat:32.52,lng:36.48,info:"Provincial capital of Arabia Petraea.",wiki:"Bosra (Bostra) replaced Petra as the provincial capital. Trajan built a Via Nova Traiana — a Roman road from Bosra to Aila (Aqaba) on the Red Sea, facilitating trade. The city's well-preserved 2nd-century Roman theater seats 15,000. Bosra later became an important early Christian center."}],paths:[[30.33,35.44,32.52,36.48,"Nabataean kingdom becomes Roman Arabia"],[32.52,36.48,41.9,12.5,"Arabia connected to the Roman trade network"]],facts:["Annexed peacefully in 106 AD","Petra: Treasury carved from sandstone","Via Nova Traiana connected Red Sea trade"]},
// CAMPAIGNS
{id:"cam1",cat:"campaigns",name:"Hannibal's Italian Campaign",y1:-218,y2:-203,desc:"Hannibal crossed the Alps with elephants, devastating Italy for 15 years.",locs:[{n:"Carthago Nova",lat:37.6,lng:-0.99,info:"Departure point.",wiki:"Hannibal departed with ~90,000 infantry, 12,000 cavalry, 37 elephants."},{n:"Alps Crossing",lat:45.0,lng:6.8,info:"37 elephants. Many perished.",wiki:"One of history's most audacious feats. Arrived with only ~26,000 men."},{n:"Lake Trasimene",lat:43.1,lng:12.1,info:"217 BC: largest ambush ever.",wiki:"15,000 Romans killed in three hours."},{n:"Cannae",lat:41.3,lng:16.1,info:"216 BC: 50-70,000 killed.",wiki:"Most perfect tactical victory in history. Double envelopment killed 50-70,000."},{n:"Zama",lat:36.3,lng:8.55,info:"202 BC: Scipio defeats Hannibal.",wiki:"Scipio used Hannibal's own tactics against him."}],paths:[[37.6,-0.99,45.0,6.8,"Hannibal crosses the Pyrenees and Gaul","Departed spring 218 BC with 90,000 troops and 37 elephants."],[45.0,6.8,43.1,12.1,"Descent from Alps into Italy","Alpine crossing killed thousands. Emerged with only 26,000 men."],[43.1,12.1,41.3,16.1,"March south to Cannae","After Trebia and Trasimene, 86,400 Romans met Hannibal at Cannae."],[36.85,10.33,36.3,8.55,"Scipio invades Africa","Scipio invaded 204 BC, forcing Hannibal's recall."]],facts:["Crossed Alps with 37 elephants","Cannae: ~70,000 killed","Defeated at Zama 202 BC"]},
{id:"cam2",cat:"campaigns",name:"Caesar's Gallic Wars",y1:-58,y2:-50,desc:"Eight years conquering Gaul, extending Rome to the Atlantic.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Caesar needed glory.",wiki:"At 42, deeply in debt. Saw opportunity in Gaul."},{n:"Bibracte",lat:46.9,lng:4.0,info:"58 BC: first victory.",wiki:"Defeated ~70,000 Helvetii warriors."},{n:"Gergovia",lat:45.72,lng:3.1,info:"52 BC: rare defeat.",wiki:"Lost 700 legionaries and 46 centurions."},{n:"Alesia",lat:47.54,lng:4.5,info:"52 BC: decisive siege.",wiki:"Trapped 80,000 warriors with 40 km of walls. Defeated 250,000 relief army."},{n:"Uxellodunum",lat:44.9,lng:1.7,info:"51 BC: final resistance.",wiki:"Cut water supply. Cut hands off all warriors."}],paths:[[41.9,12.5,46.9,4.0,"Legions intercept the Helvetii","Force-marched from Rome to Geneva in 8 days."],[46.9,4.0,45.72,3.1,"Into central Gaul"],[45.72,3.1,47.54,4.5,"Pursuit to Alesia","Built 40 km of siege works."],[47.54,4.5,44.9,1.7,"Final pacification"]],facts:["~1 million Gauls killed","Alesia: masterful siege","De Bello Gallico"]},
{id:"cam3",cat:"campaigns",name:"Caesar's Civil War",y1:-49,y2:-45,desc:"After the Rubicon, Caesar pursued Pompey across the Mediterranean.",locs:[{n:"Rubicon",lat:44.1,lng:12.4,info:"Crossing was treason.",wiki:"January 10, 49 BC. 'Alea iacta est.'"},{n:"Pharsalus",lat:39.3,lng:22.4,info:"48 BC: defeated Pompey.",wiki:"22,000 vs 45,000. Hidden fourth line routed Pompey's cavalry."},{n:"Alexandria",lat:31.2,lng:29.9,info:"Allied with Cleopatra.",wiki:"Pompey murdered on the beach. Caesar installed Cleopatra."},{n:"Thapsus",lat:35.6,lng:11.1,info:"46 BC: Africa.",wiki:"Cato committed suicide rather than accept Caesar's mercy."},{n:"Munda",lat:37.4,lng:-4.7,info:"45 BC: hardest battle.",wiki:"Caesar personally rallied troops. 30,000 Pompeians died."}],paths:[[44.1,12.4,39.3,22.4,"Pursues Pompey to Greece","Seized Italy in 60 days, crossed Adriatic in winter."],[39.3,22.4,31.2,29.9,"Chases Pompey to Egypt","Pompey murdered on the beach by Ptolemy's agents."],[31.2,29.9,35.6,11.1,"Campaigns in Africa"],[35.6,11.1,37.4,-4.7,"Final battle in Spain"]],facts:["'Alea iacta est'","Defeated Pompey at Pharsalus","Became dictator perpetuo"]},
{id:"cam4",cat:"campaigns",name:"Spartacus' Slave Revolt",y1:-73,y2:-71,desc:"70,000 slaves in the largest uprising in Roman history.",locs:[{n:"Capua",lat:41.1,lng:14.2,info:"Escaped from gladiator school.",wiki:"73 BC: Spartacus led 70 gladiators out. Thousands joined — swelled to 70,000."},{n:"Mt. Vesuvius",lat:40.82,lng:14.43,info:"First rebel camp.",wiki:"Romans besieged the only path. Spartacus rappelled down cliffs at night."},{n:"Lucania",lat:40.2,lng:16.0,info:"Final battle. 6,000 crucified.",wiki:"71 BC: Crassus cornered Spartacus. Body never found. 6,000 crucified on Via Appia."}],paths:[[41.1,14.2,40.82,14.43,"Gladiators escape to Vesuvius"],[40.82,14.43,40.2,16.0,"Cornered by Crassus"]],facts:["70,000 slaves joined","Defeated Roman armies","6,000 crucified"]},
{id:"cam5",cat:"campaigns",name:"Battle of Teutoburg Forest",y1:9,y2:9,desc:"Arminius annihilated three legions — Rome's greatest disaster.",locs:[{n:"Teutoburg Forest",lat:52.4,lng:8.13,info:"20,000 men destroyed.",wiki:"September 9 AD. Arminius led legions into ambush over three days of rain-soaked fighting. Augustus: 'Give me back my legions!'"},{n:"Rome",lat:41.9,lng:12.5,info:"Augustus was devastated.",wiki:"Legion numbers XVII-XIX permanently retired. Set the Rhine as Rome's frontier forever."}],paths:[[41.9,12.5,52.4,8.13,"Varus marches into Germania"]],facts:["20,000 killed","'Give me back my legions!'","Shaped European borders"]},
{id:"cam6",cat:"campaigns",name:"Pyrrhic War",y1:-280,y2:-275,desc:"Pyrrhus of Epirus invaded Italy with elephants — won battles but lost the war.",locs:[{n:"Tarentum",lat:40.5,lng:17.2,info:"Greek colony that invited Pyrrhus.",wiki:"Wealthiest city in Magna Graecia. Insulted Roman ambassadors, then panicked and called Pyrrhus with 25,000 troops and 20 war elephants."},{n:"Heraclea",lat:40.23,lng:16.53,info:"280 BC: Pyrrhus' first victory.",wiki:"Romans faced war elephants for the first time. Pyrrhus won but lost 4,000 men — a foretaste of the costs ahead."},{n:"Asculum",lat:41.2,lng:15.38,info:"279 BC: 'Another such victory and we are lost!'",wiki:"Two-day battle. Pyrrhus won again but suffered crippling casualties. Origin of the phrase 'Pyrrhic victory.'"},{n:"Beneventum",lat:41.13,lng:14.78,info:"275 BC: Rome's decisive victory.",wiki:"Consul Manius Curius Dentatus turned Pyrrhus' elephants against his own men. Pyrrhus withdrew to Epirus, ending Greek resistance in Italy."}],paths:[[40.5,17.2,40.23,16.53,"Pyrrhus marches from Tarentum","Landed with 25,000 soldiers, 20 elephants, and dreams of western empire."],[40.23,16.53,41.2,15.38,"Advances north to Asculum"],[41.2,15.38,41.13,14.78,"Final clash at Beneventum","Elephants panicked and trampled Pyrrhus' own troops."]],facts:["'Another such victory and we are lost!'","20 war elephants","Rome gained all southern Italy"]},
{id:"cam7",cat:"campaigns",name:"Jewish-Roman Wars",y1:66,y2:73,desc:"The Great Revolt — Temple destroyed, Masada's last stand.",locs:[{n:"Jerusalem",lat:31.78,lng:35.23,info:"Temple destroyed 70 AD.",wiki:"Titus besieged Jerusalem with 70,000 troops. After five months, Romans breached the walls and burned the Second Temple. Josephus recorded that 1.1 million died and 97,000 were enslaved."},{n:"Jotapata",lat:32.83,lng:35.29,info:"47-day siege; Josephus surrendered.",wiki:"Josephus commanded the defense. After the fall, he hid in a cave and survived a suicide pact. Prophesied Vespasian would become emperor."},{n:"Masada",lat:31.32,lng:35.35,info:"Last stand — 960 chose death over slavery.",wiki:"Herod's mountaintop fortress. Romans built a massive siege ramp over months. On the final night, 960 defenders killed themselves rather than submit. Only 7 survived."},{n:"Rome",lat:41.9,lng:12.5,info:"Arch of Titus commemorates the victory.",wiki:"Titus celebrated a triumph. The Arch of Titus depicts soldiers carrying the Temple menorah. Spoils funded the Colosseum's construction."}],paths:[[41.9,12.5,32.83,35.29,"Vespasian pacifies Galilee, 67 AD","Methodically reduced fortress after fortress."],[32.83,35.29,31.78,35.23,"Titus besieges Jerusalem, 70 AD","Five-month siege. Temple burned in August."],[31.78,35.23,31.32,35.35,"Siege of Masada, 73 AD","Silva built circumvallation walls and a massive assault ramp."]],facts:["Temple destroyed 70 AD","960 died at Masada","Arch of Titus still stands"]},
{id:"cam8",cat:"campaigns",name:"Trajan's Dacian Wars",y1:101,y2:106,desc:"Two campaigns conquered Dacia — enormous gold plunder funded Trajan's building program.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Trajan's Column commemorates the wars.",wiki:"Trajan launched the largest Roman military campaign since Augustus. Victory brought 165 tons of gold and 330 tons of silver to Rome, funding massive public works."},{n:"Drobeta",lat:44.63,lng:22.66,info:"Trajan's bridge across the Danube.",wiki:"Apollodorus designed the largest bridge in the ancient world — 1,135m long with 20 piers. Each pier rose 50m from the riverbed. Hadrian later dismantled it."},{n:"Tapae",lat:45.56,lng:22.7,info:"Key battle in both campaigns.",wiki:"Site of major engagements in 101 and 105 AD. Romans fought through mountain passes to reach Sarmizegetusa."},{n:"Sarmizegetusa Regia",lat:45.6,lng:23.3,info:"Dacian capital — stormed 106 AD.",wiki:"Sacred Dacian political and religious center in the Orastie Mountains. Trajan besieged and destroyed it. King Decebalus cut his own throat rather than be captured."}],paths:[[41.9,12.5,44.63,22.66,"Legions cross the Danube at Drobeta","Trajan's bridge: 1,135m, largest in the ancient world."],[44.63,22.66,45.56,22.7,"Advance through mountain passes to Tapae"],[45.56,22.7,45.6,23.3,"Storm Sarmizegetusa Regia","Decebalus killed himself. Dacia became a Roman province."]],facts:["165 tons of gold captured","Decebalus killed himself","Trajan's Column: 2,662 figures"]},
{id:"cam9",cat:"campaigns",name:"Battle of Adrianople",y1:378,y2:378,desc:"Gothic cavalry annihilated Valens' army — worst defeat since Cannae.",locs:[{n:"Adrianople",lat:41.68,lng:26.56,info:"August 9, 378 AD: empire-shattering defeat.",wiki:"Emperor Valens attacked without waiting for western reinforcements. Gothic cavalry returned unexpectedly and encircled the Roman army. Two-thirds of the eastern army — 20,000 men — were killed, including the emperor himself."},{n:"Constantinople",lat:41.0,lng:29.0,info:"Theodosius rebuilt the eastern army.",wiki:"After Adrianople, Theodosius I was appointed to restore order. He settled the Goths as foederati within the empire — a precedent that would prove fatal."},{n:"Rome",lat:41.9,lng:12.5,info:"Western Empire shaken to its core.",wiki:"Ammianus Marcellinus, who may have witnessed the battle, called it the worst defeat since Cannae. It proved that Rome could no longer defeat barbarian armies in open battle."}],paths:[[41.0,29.0,41.68,26.56,"Valens marches from Constantinople","Refused to wait for Gratian's western reinforcements."],[41.68,26.56,41.0,29.0,"Survivors flee to Constantinople"]],facts:["Emperor Valens killed","Worst defeat since Cannae","Beginning of the end for Rome"]},
{id:"cam10",cat:"campaigns",name:"Sulla's Civil War",y1:-88,y2:-82,desc:"First Roman general to march on Rome — proscriptions killed thousands.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Marched on his own city twice.",wiki:"In 88 BC, Sulla became the first Roman to march legions against Rome when his eastern command was transferred to Marius. After defeating Mithridates, he returned in 83 BC and crushed the Marians at the Battle of the Colline Gate."},{n:"Athens",lat:37.98,lng:23.73,info:"Sacked in 86 BC during the Mithridatic War.",wiki:"Sulla besieged and sacked Athens to punish its alliance with Mithridates. Stripped the city of treasures. Defeated Mithridates at Chaeronea and Orchomenos."},{n:"Praeneste",lat:41.84,lng:12.9,info:"Younger Marius trapped and killed here.",wiki:"Sulla's forces besieged Praeneste. Gaius Marius the Younger committed suicide when the city fell. Sulla displayed his head at the gates of Rome."},{n:"Colline Gate",lat:41.91,lng:12.5,info:"82 BC: decisive battle for Rome itself.",wiki:"November 1, 82 BC. Sulla's forces fought all night against Samnites and Marians at Rome's gates. Victory gave him total control. He then published the proscription lists."}],paths:[[41.9,12.5,37.98,23.73,"Sulla sacks Athens, defeats Mithridates","Stripped Greek treasures. Won at Chaeronea and Orchomenos."],[37.98,23.73,41.9,12.5,"Returns to Italy for civil war","Landed at Brundisium with 40,000 veterans."],[41.9,12.5,41.84,12.9,"Besieges Marians at Praeneste"]],facts:["First general to march on Rome","520 names proscribed","Voluntarily resigned dictatorship"]},
{id:"cam11",cat:"campaigns",name:"Marcomannic Wars",y1:166,y2:180,desc:"Marcus Aurelius fought Germanic tribes along the Danube for 14 years.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Sold palace furnishings to fund the war.",wiki:"The Marcomannic Wars were the most serious threat since Hannibal. Barbarians even reached Aquileia in northern Italy. Marcus Aurelius auctioned imperial furniture rather than raise taxes."},{n:"Carnuntum",lat:48.11,lng:16.86,info:"Legionary fortress and Marcus Aurelius' headquarters.",wiki:"Major base on the Danube where Marcus Aurelius directed operations. He wrote portions of his Meditations here between campaigns."},{n:"Vindobona",lat:48.21,lng:16.37,info:"Modern Vienna. Marcus Aurelius may have died here.",wiki:"Frontier fortress that became a permanent camp. Some sources say Marcus Aurelius died here on March 17, 180 AD."},{n:"Aquileia",lat:45.77,lng:13.37,info:"Barbarians reached this far south in 167 AD.",wiki:"Marcomanni and Quadi invaded Italy itself for the first time in centuries, besieging Aquileia. The shock forced Rome to take the threat seriously."}],paths:[[41.9,12.5,45.77,13.37,"Marcus Aurelius rushes north as barbarians reach Italy"],[45.77,13.37,48.11,16.86,"Counteroffensive to the Danube frontier"],[48.11,16.86,48.21,16.37,"Operations along the Danube, 170-180 AD"]],facts:["Meditations written on campaign","Rain Miracle legend","14 years of frontier war"]},
{id:"cam12",cat:"campaigns",name:"Battle of Carrhae",y1:-53,y2:-53,desc:"Crassus' catastrophe against Parthia — 20,000 killed, 10,000 captured.",locs:[{n:"Carrhae",lat:36.86,lng:39.03,info:"Modern Harran, Turkey.",wiki:"June 53 BC. Crassus led seven legions deep into Mesopotamian desert. Parthian horse archers with camel-train resupply encircled the Romans. Surena's cavalry feigned retreat then showered arrows. 20,000 Romans killed, 10,000 captured. Crassus killed in a parley — molten gold poured down his throat, mocking his greed."},{n:"Rome",lat:41.9,lng:12.5,info:"Shattered the First Triumvirate.",wiki:"With Crassus dead, the balance between Caesar and Pompey collapsed. Civil war became inevitable. The captured eagle standards haunted Rome for 33 years until Augustus recovered them diplomatically in 20 BC."}],paths:[[41.9,12.5,36.86,39.03,"Crassus marches into the desert"]],facts:["20,000 killed, 10,000 captured","Molten gold poured down Crassus' throat","Ended the First Triumvirate"]},
{id:"cam13",cat:"campaigns",name:"Boudicca's Revolt",y1:60,y2:61,desc:"Iceni queen burned Colchester, London, and St Albans — 70,000 killed.",locs:[{n:"Camulodunum",lat:51.89,lng:0.9,info:"First city destroyed — temple of Claudius burned.",wiki:"60 AD. Boudicca's Iceni and Trinovantes burned the undefended colonia. The temple of Claudius, where defenders sheltered, fell after two days. Burnt layer still visible in archaeological digs."},{n:"Londinium",lat:51.5,lng:-0.1,info:"Abandoned by Suetonius — burned to the ground.",wiki:"Governor Suetonius Paulinus retreated rather than defend London, sacrificing the city. A red-black burn layer from 60 AD lies 4 meters below modern streets."},{n:"Verulamium",lat:51.75,lng:-0.34,info:"Modern St Albans — third city destroyed.",wiki:"The municipium was burned after London. Tacitus records 70,000 Romans and allies killed across the three cities. Boudicca showed no interest in taking prisoners."}],paths:[[51.89,0.9,51.5,-0.1,"Boudicca's army marches south to London"],[51.5,-0.1,51.75,-0.34,"Destruction continues at Verulamium"]],facts:["70,000 Romans killed","Three cities destroyed","Boudicca poisoned herself after defeat"]},
{id:"cam14",cat:"campaigns",name:"Attila's Invasion of the West",y1:451,y2:452,desc:"Catalaunian Plains stopped the Huns in Gaul — then Attila invaded Italy itself.",locs:[{n:"Catalaunian Plains",lat:48.96,lng:4.36,info:"June 451: one of history's largest battles.",wiki:"Aetius — the 'last of the Romans' — allied with Visigoths under Theodoric I to face Attila. The battle was massive and chaotic. Theodoric was killed but the Huns were stopped. Attila withdrew — his first defeat."},{n:"Aquileia",lat:45.77,lng:13.37,info:"Besieged and destroyed by Attila, 452 AD.",wiki:"Attila invaded Italy in 452. Aquileia was besieged for three months then razed so thoroughly it virtually disappeared. Refugees fleeing to lagoon islands would eventually found Venice."},{n:"Mantua",lat:45.16,lng:10.79,info:"Pope Leo I met Attila here.",wiki:"Pope Leo I, with two senators, met Attila near Mantua and persuaded him to withdraw. Plague in his army and eastern Roman forces threatening his homeland influenced his decision."},{n:"Rome",lat:41.9,lng:12.5,info:"Saved by diplomacy — barely.",wiki:"Rome itself was spared only because Attila turned back. The encounter became legendary — Raphael later painted it in the Vatican."}],paths:[[48.96,4.36,45.77,13.37,"Attila turns from Gaul to Italy"],[45.77,13.37,45.16,10.79,"Advances toward Rome"],[45.16,10.79,41.9,12.5,"Pope Leo persuades withdrawal"]],facts:["Catalaunian Plains: Attila's first defeat","Aquileia's refugees founded Venice","Pope Leo I negotiated withdrawal"]},
{id:"cam15",cat:"campaigns",name:"Third Punic War",y1:-149,y2:-146,desc:"Scipio Aemilianus besieged Carthage for three years — burned for 17 days.",locs:[{n:"Carthage",lat:36.85,lng:10.33,info:"Burned for 17 days. Population enslaved.",wiki:"Rome demanded impossible terms: Carthage must abandon its city and move 10 miles inland. When Carthaginians refused, Scipio Aemilianus besieged the city for three years. In spring 146 BC, Romans fought street by street for six days. The city burned for 17 days. 50,000 survivors were sold into slavery. Carthago delenda est."},{n:"Rome",lat:41.9,lng:12.5,info:"Cato's demand fulfilled: 'Carthage must be destroyed.'",wiki:"Cato the Elder ended every Senate speech with 'Carthago delenda est.' Even after Carthage's destruction, the site was cursed and left desolate. Julius Caesar later refounded it as a Roman colony."}],paths:[[41.9,12.5,36.85,10.33,"Scipio Aemilianus sails for Carthage"]],facts:["Burned for 17 days","50,000 enslaved","'Carthago delenda est'"]},
{id:"cam16",cat:"campaigns",name:"Bar Kokhba Revolt",y1:132,y2:136,desc:"Last Jewish revolt — Hadrian crushed it, renamed Judaea, and banned Jews from Jerusalem.",locs:[{n:"Jerusalem",lat:31.78,lng:35.23,info:"Rebuilt as Aelia Capitolina with a temple to Jupiter.",wiki:"Hadrian's plan to build a Roman colony on Jerusalem's ruins and erect a temple to Jupiter on the Temple Mount triggered the revolt. Simon bar Kokhba led a guerrilla war. After crushing the revolt, Hadrian renamed Jerusalem Aelia Capitolina and banned Jews from entering."},{n:"Betar",lat:31.72,lng:35.12,info:"Bar Kokhba's last stand, 135 AD.",wiki:"The final fortress fell after a brutal siege. Bar Kokhba was killed. Cassius Dio records 580,000 Jews killed in the war, 50 fortresses and 985 villages destroyed. Judaea was renamed Syria Palaestina to erase Jewish connection."}],paths:[[31.78,35.23,31.72,35.12,"Guerrilla war across Judaea"]],facts:["580,000 killed","Judaea renamed Syria Palaestina","Jews banned from Jerusalem"]},
{id:"cam17",cat:"campaigns",name:"Siege of Numantia",y1:-134,y2:-133,desc:"Scipio Aemilianus besieged the Celtiberian fortress with 60,000 troops — 4,000 defenders chose mass suicide.",locs:[{n:"Numantia",lat:41.81,lng:-2.44,info:"Modern Garray, near Soria, Spain.",wiki:"Numantia resisted Rome for 20 years, humiliating multiple Roman armies. In 134 BC, the Senate sent Scipio Aemilianus — destroyer of Carthage — with 60,000 troops. He built 9 km of circumvallation walls rather than risk assault. After eight months of starvation, most of the 4,000 defenders killed themselves and burned the city rather than surrender. The site became a symbol of heroic resistance."},{n:"Rome",lat:41.9,lng:12.5,info:"Senate humiliated by repeated Numantine victories.",wiki:"Multiple Roman commanders suffered defeats or disgraceful treaties at Numantia. The Senate repudiated a treaty in 137 BC and sent the disgraced general Mancinus back naked to the Numantines. Only Scipio's methodical siege succeeded."}],paths:[[41.9,12.5,41.81,-2.44,"Scipio marches to Numantia with 60,000 troops"]],facts:["20 years of Celtiberian resistance","9 km of siege walls","4,000 defenders chose mass suicide"]},
{id:"cam18",cat:"campaigns",name:"Belisarius & the Gothic War",y1:535,y2:554,desc:"Justinian's reconquest of Italy — Belisarius captured Rome, but two decades of war devastated the peninsula.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Changed hands five times during the war.",wiki:"Belisarius entered Rome in December 536 with only 5,000 troops. The Goths besieged it in 537-538 with 150,000 men; Belisarius held out. Rome changed hands five times during the war. The city's aqueducts were cut, its population plummeted, and the Senate met for the last time. Italy was reconquered but devastated."},{n:"Ravenna",lat:44.42,lng:12.2,info:"Gothic capital — Belisarius captured it in 540.",wiki:"Belisarius captured the Gothic capital Ravenna in 540 through negotiation rather than siege. But the war dragged on — the Goths rallied under Totila, who retook most of Italy. Justinian sent Narses, who finally defeated the Goths at Taginae (552) and Mons Lactarius (553)."},{n:"Constantinople",lat:41.0,lng:29.0,info:"Justinian directed the reconquest from here.",wiki:"Justinian's ambition to restore the Roman Empire drove the Gothic War. He reconquered North Africa (533-534), then Italy, then southern Spain. But the cost was enormous: Italy's population may have halved, and the reconquered territories were soon lost."}],paths:[[41.0,29.0,41.9,12.5,"Belisarius sails to reconquer Italy"],[41.9,12.5,44.42,12.2,"Gothic capital captured at Ravenna"]],facts:["Rome changed hands five times","Italy's population may have halved","Senate met for the last time"]},
{id:"cam19",cat:"campaigns",name:"Battle of Zama",y1:-202,y2:-202,desc:"Scipio defeated Hannibal on African soil — cavalry decided the battle. Ended the Second Punic War.",locs:[{n:"Zama",lat:36.3,lng:8.55,info:"202 BC: Scipio Africanus defeated Hannibal.",wiki:"At Zama, Scipio turned Hannibal's own tactics against him. Numidian cavalry under Masinissa drew Hannibal's horsemen away, while Roman infantry absorbed the charge of 80 war elephants by opening lanes in their formation. When the cavalry returned, they struck Hannibal's rear — exactly as Hannibal had done at Cannae. 20,000 Carthaginians killed, 20,000 captured. Hannibal, undefeated for 15 years, fled. Carthage surrendered."},{n:"Carthage",lat:36.85,lng:10.33,info:"Carthage accepted humiliating peace terms.",wiki:"The Treaty of Zama stripped Carthage of its empire, fleet (reduced to 10 ships), and military independence. Carthage paid 10,000 talents of silver over 50 years. Rome became the unchallenged power of the western Mediterranean."}],paths:[[36.3,8.55,36.85,10.33,"From Zama to Carthage's surrender"]],facts:["Scipio used Hannibal's own tactics","80 war elephants neutralized","Carthage stripped of its empire"]},
{id:"cam20",cat:"campaigns",name:"Battle of Lake Trasimene",y1:-217,y2:-217,desc:"Hannibal's greatest ambush — 15,000 Romans killed in hours. Largest ambush in military history.",locs:[{n:"Lake Trasimene",lat:43.1,lng:12.1,info:"217 BC: Hannibal ambushed Consul Flaminius.",wiki:"On a foggy June morning in 217 BC, Hannibal concealed his entire army — 50,000 men — in hills along the northern shore of Lake Trasimene. Consul Gaius Flaminius marched his 25,000 troops along the narrow lakeshore road without scouting ahead. Hannibal sprung the trap: Carthaginians poured down from three sides while the lake blocked retreat. 15,000 Romans were killed in three hours — many drowned. Flaminius was killed. It remains the largest ambush in recorded military history."},{n:"Rome",lat:41.9,lng:12.5,info:"Panic in Rome — Fabius Maximus appointed dictator.",wiki:"News of Trasimene caused panic in Rome. The Senate appointed Fabius Maximus as dictator. He adopted a strategy of delay and attrition — 'the Delayer' (Cunctator) — shadowing Hannibal's army but refusing battle. It was deeply unpopular but ultimately sound."}],paths:[[43.1,12.1,41.9,12.5,"News of disaster reaches Rome"]],facts:["15,000 killed in 3 hours","Largest ambush in military history","Fabius appointed dictator"]},
{id:"cam21",cat:"campaigns",name:"Samnite Wars",y1:-343,y2:-290,desc:"Three wars for control of central Italy — the Caudine Forks humiliation. Rome learned mountain warfare.",locs:[{n:"Caudium",lat:41.07,lng:14.61,info:"321 BC: Roman army humiliated at the Caudine Forks.",wiki:"In 321 BC, a Roman army was trapped in a narrow mountain pass (the Caudine Forks) by the Samnites. Unable to fight or retreat, the entire army was forced to 'pass under the yoke' — a ritual humiliation where soldiers walked beneath a frame of spears. It was Rome's most shameful defeat before Cannae. The incident shaped Roman military doctrine: never again would they march blindly into confined terrain."},{n:"Sentinum",lat:43.4,lng:12.9,info:"295 BC: decisive battle of the Third Samnite War.",wiki:"At Sentinum, Rome faced a coalition of Samnites, Gauls, Etruscans, and Umbrians — the largest alliance ever arrayed against her. Consul Decius Mus ritually devoted himself to death (devotio), charging into the enemy to inspire his troops. Rome won, breaking the coalition. It was the largest battle in Italy until the Social War."},{n:"Rome",lat:41.9,lng:12.5,info:"Three wars (343-290 BC) forged Rome's military identity.",wiki:"The three Samnite Wars transformed Rome from a regional Italian power into the dominant force on the peninsula. Rome learned mountain warfare, built strategic colonies (Luceria, Venusia, Beneventum), and extended its road network. The Appian Way was begun in 312 BC to support military logistics during the Second Samnite War."}],paths:[[41.9,12.5,41.07,14.61,"Roman army marches to Caudium"],[41.07,14.61,43.4,12.9,"Three wars across central Italy"]],facts:["Caudine Forks: 'passing under the yoke'","Decius Mus devoted himself to death at Sentinum","Via Appia built for Samnite War logistics"]},
{id:"cam22",cat:"campaigns",name:"Roman-Sassanid Wars",y1:224,y2:363,desc:"400 years of conflict with Persia — Valerian captured, Julian killed. Rome's most dangerous and enduring rival.",locs:[{n:"Ctesiphon",lat:33.1,lng:44.6,info:"Sassanid capital — sacked by Rome three times.",wiki:"Ctesiphon, the Sassanid capital on the Tigris, was captured by Rome three times (165, 197, 283 AD) but never held. The Roman-Persian frontier along the Euphrates was the ancient world's longest-running conflict zone. In 363, Emperor Julian invaded with 65,000 men, reached Ctesiphon, but failed to take it and was killed during the retreat — the last pagan emperor dying in Mesopotamia."},{n:"Edessa",lat:37.15,lng:38.79,info:"260 AD: Emperor Valerian captured — worst Roman humiliation.",wiki:"In 260 AD, Emperor Valerian was captured alive by Shapur I at Edessa — the only Roman emperor ever taken prisoner. Persian rock reliefs show Valerian kneeling before Shapur. According to hostile sources, Valerian was used as a human footstool and eventually flayed — his stuffed skin displayed in a Persian temple."},{n:"Dura-Europos",lat:34.75,lng:40.73,info:"Frontier fortress destroyed by the Sassanids c. 257 AD.",wiki:"Dura-Europos — a Roman frontier garrison on the Euphrates — fell to the Sassanids around 257 AD. The siege tunnels and counter-tunnels survive, including evidence of the earliest known chemical warfare: the Sassanids burned sulfur and bitumen to gas Roman defenders in a tunnel."}],paths:[[37.15,38.79,33.1,44.6,"Roman campaigns into Mesopotamia"],[37.15,38.79,34.75,40.73,"The Euphrates frontier"]],facts:["Valerian: only emperor captured alive","Julian killed retreating from Ctesiphon (363)","Earliest known chemical warfare at Dura-Europos"]},
{id:"cam23",cat:"campaigns",name:"Siege of Veii",y1:-406,y2:-396,desc:"Rome's first great siege — 10 years like Troy. Camillus diverted a drainage tunnel. Rome doubled its territory.",locs:[{n:"Veii",lat:42.02,lng:12.39,info:"Etruscan city 16 km from Rome — fell 396 BC.",wiki:"Veii was Rome's nearest major Etruscan rival, just 16 km north of Rome. The siege lasted 10 years (ancients compared it to Troy). The breakthrough came when Camillus discovered the Etruscans' drainage tunnel system — Roman soldiers entered through the tunnels and emerged inside the Temple of Juno. The city was captured, its population enslaved, and its territory annexed. Rome doubled its size overnight."},{n:"Rome",lat:41.9,lng:12.5,info:"Veii's fall made Rome the dominant power in Latium.",wiki:"The conquest of Veii in 396 BC transformed Rome from one city among many into the dominant power of central Italy. The annexed territory was distributed to Roman citizens — four new tribes were created. Camillus was hailed as a second Romulus. Six years later, the Gauls sacked Rome; Camillus returned to drive them out."}],paths:[[41.9,12.5,42.02,12.39,"10-year siege of Veii"]],facts:["10-year siege — compared to Troy","Romans entered through drainage tunnels","Rome doubled its territory overnight"]},
// FIGURES
{id:"fig1",cat:"figures",name:"Julius Caesar",y1:-100,y2:-44,desc:"General, politician, author. Assassinated Ides of March.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Born ~100 BC. Killed March 15, 44 BC.",wiki:"Patrician family. Captured by pirates at 25. Reformed calendar. Stabbed 23 times."},{n:"Gaul",lat:47.0,lng:2.0,info:"8 years conquering.",wiki:"Conquered 800,000 km². Estimated 1 million killed."},{n:"Rubicon",lat:44.1,lng:12.4,info:"Crossed 49 BC.",wiki:"Crossing under arms was treason."},{n:"Alexandria",lat:31.2,lng:29.9,info:"Allied with Cleopatra.",wiki:"Wept at Pompey's severed head. Fathered Caesarion."}],paths:[[41.9,12.5,47.0,2.0,"Departs for Gaul"],[47.0,2.0,44.1,12.4,"Return and Rubicon"],[44.1,12.4,31.2,29.9,"Journey to Egypt"]],facts:["Pirates at 25","Julian calendar","23 stab wounds"]},
{id:"fig2",cat:"figures",name:"Augustus",y1:-63,y2:14,desc:"First Emperor. 41-year Pax Romana.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Brick to marble.",wiki:"Born Gaius Octavius. Adopted by Caesar. Crafted the Principate."},{n:"Actium",lat:38.95,lng:20.73,info:"31 BC: defeated Antony.",wiki:"Agrippa's fleet crushed Antony and Cleopatra."},{n:"Alexandria",lat:31.2,lng:29.9,info:"Antony and Cleopatra died.",wiki:"Both committed suicide as Octavian arrived."},{n:"Nola",lat:40.93,lng:14.53,info:"Died 14 AD.",wiki:"'Have I played the part well?'"}],paths:[[41.9,12.5,38.95,20.73,"Fleet sails to Actium"],[38.95,20.73,31.2,29.9,"Pursuit to Egypt"],[41.9,12.5,40.93,14.53,"Final journey"]],facts:["'Found Rome of bricks'","41-year reign","Praetorian Guard"]},
{id:"fig3",cat:"figures",name:"Constantine the Great",y1:272,y2:337,desc:"Reunified Empire. Legalized Christianity. Founded Constantinople.",locs:[{n:"Naissus",lat:43.32,lng:21.9,info:"Born 272 AD.",wiki:"Born to Constantius Chlorus and Helena."},{n:"York",lat:53.96,lng:-1.08,info:"Proclaimed emperor 306.",wiki:"Legions proclaimed him Augustus at his father's death."},{n:"Rome",lat:41.9,lng:12.5,info:"Milvian Bridge 312.",wiki:"Defeated Maxentius. Saw cross: 'In this sign, conquer.'"},{n:"Constantinople",lat:41.0,lng:29.0,info:"New Rome. 1,100 years.",wiki:"Dedicated May 11, 330 AD."}],paths:[[43.32,21.9,53.96,-1.08,"To Britain with father"],[53.96,-1.08,41.9,12.5,"March on Rome"],[41.9,12.5,41.0,29.0,"Founds Constantinople"]],facts:["Milvian Bridge 312","Edict of Milan 313","Constantinople 1,100+ years"]},
{id:"fig4",cat:"figures",name:"Trajan",y1:53,y2:117,desc:"Optimus Princeps — greatest territorial extent. First emperor born outside Italy.",locs:[{n:"Italica",lat:37.44,lng:-6.04,info:"Born 53 AD near modern Seville.",wiki:"Born in Italica, Hispania Baetica — the first non-Italian emperor. Rose through military ranks under Domitian. Adopted by Nerva in 97 AD."},{n:"Rome",lat:41.9,lng:12.5,info:"Built Forum, Column, markets.",wiki:"Senate gave him the title Optimus Princeps — 'Best Ruler.' Built the largest forum complex in Rome with Trajan's Markets and Column."},{n:"Sarmizegetusa",lat:45.6,lng:23.3,info:"Conquered Dacia 106 AD.",wiki:"Two brutal campaigns (101-102, 105-106) conquered Dacia. Captured 165 tons of gold. Trajan's Column depicts the wars in 155 scenes with 2,662 figures."},{n:"Ctesiphon",lat:33.1,lng:44.6,info:"Captured the Parthian capital 116 AD.",wiki:"Maximum eastern extent. Trajan reportedly wept at the Tigris, saying he was too old to follow Alexander. Fell ill and died returning home."},{n:"Selinus",lat:36.4,lng:32.4,info:"Died here August 117 AD.",wiki:"Died of illness in Cilicia on the return journey. Ashes carried back to Rome and placed inside his Column — a unique honor."}],paths:[[37.44,-6.04,41.9,12.5,"Rises through the ranks to emperor"],[41.9,12.5,45.6,23.3,"Conquers Dacia in two campaigns"],[41.9,12.5,33.1,44.6,"Advances on Parthia, 114-116 AD"],[33.1,44.6,36.4,32.4,"Dies on the return journey"]],facts:["First non-Italian emperor","5 million km² at peak","Optimus Princeps — 'Best Ruler'"]},
{id:"fig5",cat:"figures",name:"Marcus Aurelius",y1:121,y2:180,desc:"Philosopher-emperor. Meditations. Last of the Five Good Emperors.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Born April 26, 121 AD. Emperor 161-180.",wiki:"Born to a prominent family. Adopted by Antoninus Pius at Hadrian's arrangement. Co-ruled with Lucius Verus 161-169. Sold palace furnishings to fund wars rather than raise taxes. His equestrian statue on the Capitoline is one of antiquity's most famous."},{n:"Carnuntum",lat:48.11,lng:16.86,info:"Headquarters during the Marcomannic Wars.",wiki:"Major legionary fortress on the Danube. Marcus Aurelius spent years here directing campaigns. Wrote portions of his Meditations between battles."},{n:"Vindobona",lat:48.21,lng:16.37,info:"Modern Vienna. Likely place of death.",wiki:"Frontier fortress. Marcus Aurelius probably died here on March 17, 180 AD. His last words reportedly urged his officers to think of the troops."},{n:"Sirmium",lat:44.97,lng:19.61,info:"Strategic Pannonian base.",wiki:"Important staging area for Danube operations. Marcus Aurelius wrote large sections of his Meditations here between 170-180 AD."}],paths:[[41.9,12.5,48.11,16.86,"Campaigns on the Danube frontier"],[48.11,16.86,48.21,16.37,"Operations between Carnuntum and Vindobona"],[41.9,12.5,44.97,19.61,"Writes Meditations at Sirmium"]],facts:["Stoic philosopher on the throne","Meditations written on campaign","Sold palace furnishings for war"]},
{id:"fig6",cat:"figures",name:"Nero",y1:37,y2:68,desc:"Artist-emperor. Matricide. Great Fire. Persecution of Christians. Suicide.",locs:[{n:"Antium",lat:41.45,lng:12.63,info:"Born December 15, 37 AD.",wiki:"Born Lucius Domitius Ahenobarbus. Mother Agrippina engineered his adoption by Emperor Claudius. Became emperor at 17 when Claudius was poisoned."},{n:"Rome",lat:41.9,lng:12.5,info:"Emperor 54-68 AD. Great Fire 64 AD.",wiki:"Early reign guided by Seneca and Burrus was praised. After 59 AD, murdered his mother, kicked his pregnant wife to death, and built the Golden House. After the Great Fire of 64, blamed Christians. Senators revolted in 68; Nero fled and stabbed himself."},{n:"Baiae",lat:40.82,lng:14.07,info:"Attempted to murder Agrippina here.",wiki:"In 59 AD, Nero designed a collapsible boat to drown his mother. She swam to safety. He then sent soldiers who stabbed her. She reportedly said: 'Strike here — this bore Nero.'"},{n:"Corinth",lat:37.9,lng:22.9,info:"Tried to cut a canal through the isthmus.",wiki:"Nero toured Greece in 66-67 AD, competing in Olympic games (he won every event by default). Attempted to dig the Corinth Canal with 6,000 Jewish prisoners of war."}],paths:[[41.45,12.63,41.9,12.5,"Becomes emperor at 17"],[41.9,12.5,40.82,14.07,"Attempted murder of Agrippina at Baiae"],[41.9,12.5,37.9,22.9,"Tours Greece, competes in Olympics"]],facts:["Murdered his mother","Built the Domus Aurea","'What an artist dies in me!'"]},
{id:"fig7",cat:"figures",name:"Scipio Africanus",y1:-236,y2:-183,desc:"Rome's greatest Republican general. Defeated Hannibal at Zama at age 31.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Born ~236 BC to patrician family.",wiki:"Survived Cannae at age 17. Elected commander of Spain at 25 with no legal authority — the Senate was desperate. His bold tactics and personal charisma transformed Rome's fortunes."},{n:"Carthago Nova",lat:37.6,lng:-0.99,info:"Captured in a single day, 209 BC.",wiki:"Scipio discovered the harbor was fordable at low tide. Attacked from the lagoon while the main force assaulted the walls. Captured Carthage's Spanish capital in one day."},{n:"Zama",lat:36.3,lng:8.55,info:"202 BC: defeated Hannibal.",wiki:"The decisive battle of the Second Punic War. Scipio used horns to panic Hannibal's elephants, turning them against their own lines. Earned the name 'Africanus.'"},{n:"Liternum",lat:40.9,lng:13.9,info:"Died in voluntary exile ~183 BC.",wiki:"Political enemies led by Cato accused him of corruption. Retired bitterly to his country estate. Reportedly asked that his epitaph read: 'Ungrateful fatherland, you shall not have my bones.'"}],paths:[[41.9,12.5,37.6,-0.99,"Conquers Carthaginian Spain at 25"],[37.6,-0.99,36.3,8.55,"Invades Africa, defeats Hannibal at Zama"],[41.9,12.5,40.9,13.9,"Retires to Liternum in disgrace"]],facts:["Defeated Hannibal at 31","Conquered Spain at 25","Died in bitter exile"]},
{id:"fig8",cat:"figures",name:"Diocletian",y1:244,y2:311,desc:"Rose from nothing. Ended the Crisis. Created the Tetrarchy. Voluntarily abdicated.",locs:[{n:"Salona",lat:43.51,lng:16.45,info:"Born ~244 AD in Dalmatia.",wiki:"Born Diocles to a low-status family — possibly a freedman's son. Rose through the military ranks under Aurelian, Probus, and Carus."},{n:"Nicomedia",lat:40.76,lng:29.92,info:"Imperial capital and seat of eastern power.",wiki:"Ruled from Nicomedia rather than Rome. Launched the Great Persecution of Christians in 303 AD. Reorganized the empire into 100+ provinces with a massive new bureaucracy."},{n:"Rome",lat:41.9,lng:12.5,info:"Visited Rome only once as emperor.",wiki:"Diocletian marginalized Rome. Visited in 303 for his vicennalia celebration but found the citizens insolent. His reforms saved the empire but ended the Principate."},{n:"Split Palace",lat:43.51,lng:16.44,info:"Retired here to grow cabbages.",wiki:"Built a massive fortified palace at Split (Croatia) for his retirement. When urged to resume power, he replied: 'If you could show the cabbages I planted, you would not ask me to give up this peace.'"}],paths:[[43.51,16.45,40.76,29.92,"Rises to power, rules from Nicomedia"],[40.76,29.92,41.9,12.5,"Visits Rome only once"],[40.76,29.92,43.51,16.44,"Retires to Split Palace, 305 AD"]],facts:["Rose from slave's son to emperor","First voluntary abdication","Retired to grow cabbages"]},
{id:"fig9",cat:"figures",name:"Hadrian",y1:76,y2:138,desc:"Builder, traveler, Hellenophile — visited every province and reshaped the empire.",locs:[{n:"Italica",lat:37.44,lng:-6.04,info:"Born 76 AD near Seville.",wiki:"Born in Italica, Hispania, like his predecessor Trajan. Rose through military and administrative ranks. Became Trajan's ward and eventually his successor."},{n:"Rome",lat:41.9,lng:12.5,info:"Rebuilt the Pantheon. Built his massive mausoleum.",wiki:"Rebuilt the Pantheon with its revolutionary dome — still the world's largest unreinforced concrete dome. His mausoleum became Castel Sant'Angelo. Abandoned Trajan's eastern conquests to focus on defensible frontiers."},{n:"Athens",lat:37.98,lng:23.73,info:"Completed the Temple of Olympian Zeus after 600 years.",wiki:"Hadrian's passion for Greek culture transformed Athens. Completed the Temple of Olympian Zeus begun 600 years earlier. Built a new quarter of the city with an arch inscribed: 'This is the city of Hadrian, not of Theseus.'"},{n:"Tivoli",lat:41.96,lng:12.8,info:"Hadrian's Villa — 120 hectares of architectural genius.",wiki:"30+ buildings recreating places Hadrian visited: Egyptian Canopus, Greek Lyceum, Thessalian Vale of Tempe. The most ambitious private building project in Roman history."},{n:"Egypt",lat:25.7,lng:32.65,info:"Antinous drowned in the Nile, 130 AD.",wiki:"Hadrian's beloved companion Antinous drowned in the Nile in mysterious circumstances. Hadrian was devastated and deified him, founding the city of Antinoöpolis and commissioning hundreds of statues — more survive than of any other figure from antiquity."}],paths:[[37.44,-6.04,41.9,12.5,"Rises to emperor"],[41.9,12.5,37.98,23.73,"Transforms Athens"],[41.9,12.5,41.96,12.8,"Designs his villa at Tivoli"],[41.9,12.5,25.7,32.65,"Travels to Egypt — Antinous drowns"]],facts:["Visited every province","Rebuilt the Pantheon","Deified his lover Antinous"]},
{id:"fig10",cat:"figures",name:"Vespasian",y1:9,y2:79,desc:"Soldier-emperor who restored order after civil war and built the Colosseum.",locs:[{n:"Falacrine",lat:42.48,lng:13.07,info:"Born 9 AD in the Sabine countryside.",wiki:"Born to a modest equestrian family. Rose through military service in Britain and Africa. Nero sent him to crush the Jewish revolt in 66 AD."},{n:"Rome",lat:41.9,lng:12.5,info:"Founded the Flavian dynasty. Built the Colosseum.",wiki:"Restored the treasury after Nero's extravagance. Began the Colosseum (Flavian Amphitheatre) on the site of Nero's private lake — returning to the people what Nero had stolen. Famous for his earthy humor."},{n:"Jerusalem",lat:31.78,lng:35.23,info:"Commanded the siege before becoming emperor.",wiki:"Led the Jewish War before being proclaimed emperor by eastern legions in 69 AD. Left his son Titus to finish the siege of Jerusalem."}],paths:[[42.48,13.07,41.9,12.5,"Rises from humble origins"],[41.9,12.5,31.78,35.23,"Commands the Jewish War"],[31.78,35.23,41.9,12.5,"Proclaimed emperor, returns to Rome"]],facts:["Founded Flavian dynasty","Built the Colosseum","'Dear me, I think I'm becoming a god'"]},
{id:"fig11",cat:"figures",name:"Gaius Marius",y1:-157,y2:-86,desc:"Seven-time consul. Saved Rome from northern hordes. Reformed the army. Proscribed rivals.",locs:[{n:"Arpinum",lat:41.65,lng:13.61,info:"Born 157 BC — same hometown as Cicero.",wiki:"A 'new man' (novus homo) from a modest family. Rose through sheer military talent and political cunning. First of his family to reach the consulship."},{n:"Aquae Sextiae",lat:43.53,lng:5.45,info:"102 BC: destroyed the Teutones.",wiki:"Modern Aix-en-Provence. Marius annihilated the Teutones — 100,000 killed or captured. The victory saved Italy from Germanic invasion."},{n:"Vercellae",lat:45.32,lng:8.42,info:"101 BC: destroyed the Cimbri.",wiki:"The following year, Marius and Catulus crushed the Cimbri at Vercellae. The combined Germanic threat that had terrified Rome for a decade was eliminated."},{n:"Rome",lat:41.9,lng:12.5,info:"Seven-time consul. Rival of Sulla.",wiki:"Opened the army to the landless poor, creating professional soldiers loyal to their commanders rather than the state. This reform made possible the warlords who destroyed the Republic. His rivalry with Sulla produced Rome's first civil war."}],paths:[[41.65,13.61,41.9,12.5,"New man rises to power"],[41.9,12.5,43.53,5.45,"Destroys the Teutones"],[43.53,5.45,45.32,8.42,"Destroys the Cimbri"],[45.32,8.42,41.9,12.5,"Returns to political warfare"]],facts:["Seven-time consul","Saved Rome from Germanic invasion","Army reforms enabled civil wars"]},
{id:"fig12",cat:"figures",name:"Tiberius",y1:-42,y2:37,desc:"Reluctant, capable emperor who stabilized the frontiers but withdrew to Capri and let Sejanus terrorize Rome.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Emperor 14-37 AD. Left Rome permanently in 26 AD.",wiki:"Tiberius Claudius Nero was Augustus' stepson, adopted reluctantly as heir. A brilliant general who secured the Rhine and Danube, he became a bitter, suspicious emperor. In 26 AD he withdrew to Capri, ruling through letters and his prefect Sejanus — who conducted a reign of terror until Tiberius had him arrested and executed in 31 AD."},{n:"Capri",lat:40.55,lng:14.22,info:"Tiberius ruled from here for 11 years.",wiki:"Tiberius built twelve villas on Capri, ruling the empire by correspondence. Ancient sources (Suetonius, Tacitus) describe debauchery and cruelty, though these may be senatorial propaganda. He never returned to Rome. He died at Misenum in 37 AD — Caligula may have smothered him."},{n:"Rhine Frontier",lat:50.0,lng:8.27,info:"Tiberius' greatest military campaigns were here.",wiki:"Before becoming emperor, Tiberius was Rome's finest general. He campaigned extensively in Germania, Pannonia, and Illyricum. After the Teutoburg disaster (9 AD), Tiberius restored the Rhine frontier. His military competence was never questioned — only his personality."}],paths:[[41.9,12.5,40.55,14.22,"Withdraws to Capri, 26 AD"],[41.9,12.5,50.0,8.27,"Earlier campaigns on the Rhine"]],facts:["Left Rome permanently in 26 AD","Sejanus' reign of terror (23-31 AD)","Brilliant general, bitter emperor"]},
{id:"fig13",cat:"figures",name:"Claudius",y1:-10,y2:54,desc:"Unexpected emperor — stammering scholar who conquered Britain, built Portus, and reformed the administration.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Emperor 41-54 AD. Found hiding behind a curtain.",wiki:"When the Praetorian Guard assassinated Caligula in 41 AD, they found Claudius hiding behind a curtain and proclaimed him emperor. The Senate's contempt turned to grudging respect: Claudius proved an effective administrator. He expanded citizenship, reformed the courts, built the harbor at Portus, and completed the Aqua Claudia aqueduct. He was likely poisoned by his wife Agrippina in 54 AD to install her son Nero."},{n:"Lugdunum",lat:45.76,lng:4.84,info:"Born here 10 BC — modern Lyon.",wiki:"Born in Lugdunum (Lyon), Gaul's capital. His provincial birth and physical disabilities (a stammer, limp, and drooling) led his own family to dismiss him. Augustus called him 'a poor creature.' But his lifelong study of history and law made him one of Rome's most competent rulers."},{n:"Camulodunum",lat:51.89,lng:0.9,info:"Claudius personally received Britain's surrender here.",wiki:"Claudius invaded Britain in 43 AD with four legions and — in a propaganda coup — war elephants. He arrived in person for 16 days to accept the surrender of 11 British kings at Camulodunum (Colchester). It was Rome's first major new conquest in decades."}],paths:[[45.76,4.84,41.9,12.5,"From Lugdunum to emperor"],[41.9,12.5,51.89,0.9,"Claudius invades Britain"]],facts:["Found hiding behind a curtain","Conquered Britain","Probably poisoned by Agrippina"]},
{id:"fig14",cat:"figures",name:"Justinian I",y1:482,y2:565,desc:"Last emperor to speak Latin natively. Corpus Juris Civilis. Hagia Sophia. Reconquered the West. Survived the Nika riots.",locs:[{n:"Constantinople",lat:41.0,lng:29.0,info:"Emperor 527-565 AD. Transformed the city.",wiki:"Justinian I was the last great Roman emperor. He codified all Roman law into the Corpus Juris Civilis — still the foundation of European civil law. He built the Hagia Sophia — the largest cathedral for 1,000 years. He reconquered North Africa, Italy, and southern Spain. He survived the Nika riots (532 AD) only because Empress Theodora stiffened his resolve: 'Purple is the noblest shroud.' He also survived the Justinian Plague that killed perhaps 40% of Constantinople."},{n:"Ravenna",lat:44.42,lng:12.2,info:"Center of reconquered Italy — stunning mosaics.",wiki:"The mosaics at San Vitale in Ravenna — showing Justinian and Theodora in imperial splendor — are among the greatest surviving artworks of late antiquity. Ravenna became the administrative center of Byzantine Italy."}],paths:[[41.0,29.0,44.42,12.2,"Reconquers Italy"]],facts:["Corpus Juris Civilis: foundation of European law","Hagia Sophia: largest cathedral for 1,000 years","'Purple is the noblest shroud' — Theodora"]},
{id:"fig15",cat:"figures",name:"Aurelian",y1:214,y2:275,desc:"Restitutor Orbis — reunified the fragmented empire, defeated Zenobia, built the Aurelian Walls. Assassinated at his peak.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Built the Aurelian Walls — 19 km encircling Rome.",wiki:"Aurelian rose from humble Danubian origins to become emperor in 270 AD. In five years he reunified the shattered empire: defeated the Goths on the Danube, reconquered the Palmyrene Empire (272), and crushed the breakaway Gallic Empire (274). He built the 19 km Aurelian Walls around Rome — a sign that the capital itself was no longer safe. Assassinated by his own officers in 275, based on a forged document."},{n:"Palmyra",lat:34.55,lng:38.27,info:"Defeated Zenobia here, 272 AD.",wiki:"Aurelian marched east and defeated Zenobia's forces at Immae and Emesa, then besieged Palmyra. Zenobia was captured trying to flee to Persia. She was paraded in golden chains in Aurelian's triumph — but spared, reportedly living out her days as a Roman matron."},{n:"Trier",lat:49.75,lng:6.64,info:"Crushed the Gallic Empire here, 274 AD.",wiki:"The Gallic Empire had been independent since 260 AD, controlling Gaul, Britain, and Hispania. Aurelian defeated the last Gallic emperor Tetricus at Chalons in 274, reunifying the West. The Senate proclaimed him Restitutor Orbis — Restorer of the World."}],paths:[[41.9,12.5,34.55,38.27,"Reconquers the East from Zenobia"],[41.9,12.5,49.75,6.64,"Crushes the Gallic Empire"]],facts:["Restitutor Orbis — Restorer of the World","19 km Aurelian Walls still stand","Assassinated based on a forged document"]},
{id:"fig16",cat:"figures",name:"Domitian",y1:51,y2:96,desc:"Capable administrator hated by the Senate — expanded the frontier, first to demand 'Dominus et Deus.' Assassinated.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Emperor 81-96 AD. Last of the Flavians.",wiki:"Titus Flavius Domitianus became emperor in 81 AD after his brother Titus' death. A capable but autocratic ruler, he expanded the empire in Britain and Germany, reformed the currency, and administered justice efficiently. But he demanded to be addressed as 'Dominus et Deus' (Lord and God) — shocking senators used to the fiction of first-among-equals. His Reign of Terror in his final years saw senators executed on flimsy charges. He was assassinated in 96 AD by palace officials. The Senate damned his memory (damnatio memoriae) — his name chiseled from monuments."},{n:"Danube Frontier",lat:48.11,lng:16.86,info:"Domitian fought campaigns on the Danube.",wiki:"Domitian campaigned against the Dacians and the Germanic Chatti, strengthening the Rhine-Danube frontier with permanent fortifications. His Dacian wars were inconclusive — he agreed to pay Decebalus subsidies in exchange for peace, which Trajan later found humiliating and reversed."}],paths:[],facts:["Demanded 'Dominus et Deus'","Damnatio memoriae by the Senate","Stabilized and expanded the frontier"]},
{id:"fig17",cat:"figures",name:"Commodus",y1:161,y2:192,desc:"Marcus Aurelius' unworthy son — fought as a gladiator, renamed Rome 'Colonia Commodiana.' Strangled on New Year's Eve.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Emperor 180-192 AD. The beginning of the end.",wiki:"Lucius Aurelius Commodus was everything his philosopher-father was not: vain, cruel, and increasingly deranged. He abandoned Marcus Aurelius' Danube campaigns, negotiated a peace that yielded Roman territory, and devoted himself to the arena — fighting as a gladiator (as a secutor and also shooting animals), which horrified the Senate. He renamed Rome 'Colonia Lucia Annia Commodiana,' the months after himself, and identified as Hercules incarnate. A conspiracy of his mistress Marcia, prefect Laetus, and wrestler Narcissus strangled him on December 31, 192 AD. Edward Gibbon dated Rome's decline from his accession."}],paths:[],facts:["Fought as a gladiator in the Colosseum","Renamed Rome after himself","Gibbon dated Rome's decline from his reign"]},
{id:"fig18",cat:"figures",name:"Septimius Severus",y1:145,y2:211,desc:"First African emperor — founded a dynasty. Died at York campaigning in Britain. 'Be harmonious, enrich the soldiers.'",locs:[{n:"Leptis Magna",lat:32.64,lng:14.29,info:"Born here — lavished building projects on his hometown.",wiki:"Lucius Septimius Severus was born in Leptis Magna, Libya — the first Roman emperor from Africa. He won the Year of the Five Emperors (193 AD), defeating Niger and Albinus. He expanded the empire in Mesopotamia, reformed the army (raising pay 50%), and lavished his hometown with a magnificent forum, basilica, and triumphal arch that survive today."},{n:"Rome",lat:41.9,lng:12.5,info:"Emperor 193-211 AD. Founded the Severan dynasty.",wiki:"Severus ruled with iron efficiency. He expanded the Praetorian Guard to 15,000 (replacing Italian soldiers with provincials), created three new legions, and purged the Senate. His Arch of Septimius Severus still dominates the Forum. His dynasty lasted until 235 AD."},{n:"Eboracum",lat:53.96,lng:-1.08,info:"Died here in 211 AD campaigning against the Caledonians.",wiki:"Severus invaded Scotland in 208 with a massive force, fighting a brutal guerrilla war against the Caledonians. He died at Eboracum (York) on February 4, 211 AD. His deathbed advice to his sons Caracalla and Geta: 'Be harmonious, enrich the soldiers, and scorn all other men.' They ignored the first instruction — Caracalla murdered Geta within a year."}],paths:[[32.64,14.29,41.9,12.5,"From Leptis Magna to emperor"],[41.9,12.5,53.96,-1.08,"Final campaign in Britain"]],facts:["First African emperor","'Be harmonious, enrich the soldiers'","Caracalla murdered Geta within a year"]},
{id:"fig19",cat:"figures",name:"Antoninus Pius",y1:86,y2:161,desc:"Most peaceful reign — 23 years without leaving Italy. Built the Antonine Wall. Deified by acclamation.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Emperor 138-161 AD. The peaceful zenith.",wiki:"Titus Aurelius Fulvus Boionius Arrius Antoninus was adopted by Hadrian and became emperor in 138 AD. His 23-year reign was the most peaceful in Roman history — he never left Italy, yet the empire ran smoothly. He earned the cognomen 'Pius' for persuading the Senate to deify Hadrian (whom they loathed). He expanded into southern Scotland (Antonine Wall), reformed the legal system to protect slaves and improve women's property rights, and died in 161 AD — reportedly his last word was 'Equanimity.'"},{n:"Lanuvium",lat:41.67,lng:12.7,info:"Antoninus' birthplace — modern Lanuvio.",wiki:"Born in Lanuvium to a wealthy senatorial family from Nemausus (Nimes) in Gaul. His provincial origins show how thoroughly Romanized the western provinces had become by the 2nd century."}],paths:[],facts:["23 years without leaving Italy","Last word: 'Equanimity'","Reformed law to protect slaves"]},
{id:"fig20",cat:"figures",name:"Theodosius I",y1:347,y2:395,desc:"Last emperor to rule both halves — made Christianity the sole state religion (380). Banned the Olympics. Split the empire.",locs:[{n:"Constantinople",lat:41.0,lng:29.0,info:"Ruled from here. Last to govern a united empire.",wiki:"Theodosius I (the Great) was the last emperor to rule a united Roman Empire. A devout Christian, he issued the Edict of Thessalonica (380 AD) making Nicene Christianity the sole state religion. He banned pagan sacrifices, closed temples, and abolished the Olympic Games (abolished 393 AD, after 1,168 years). He did penance before Ambrose of Milan for the Thessalonica massacre — the first time an emperor submitted to a bishop's authority."},{n:"Thessalonica",lat:40.64,lng:22.94,info:"380 AD: Edict making Christianity the state religion. 390: massacre.",wiki:"Two epochal events at Thessalonica. In 380, Theodosius issued the Edict of Thessalonica — Christianity became the Roman Empire's official state religion. In 390, after a riot killed a Gothic general, Theodosius ordered a reprisal massacre that killed 7,000 civilians. Bishop Ambrose of Milan refused him communion until he did public penance — establishing the principle that even emperors answer to moral authority."},{n:"Rome",lat:41.9,lng:12.5,info:"Theodosius' death (395) permanently divided the empire.",wiki:"When Theodosius died on January 17, 395 AD, the empire was divided between his young sons: Arcadius (East) and Honorius (West). It was never reunited."}],paths:[[41.0,29.0,40.64,22.94,"Edict of Thessalonica"],[41.0,29.0,41.9,12.5,"Empire splits at Theodosius' death"]],facts:["Edict of Thessalonica: Christianity = state religion","Banned the Olympic Games (393 AD)","Did public penance before Bishop Ambrose"]},
// EVENTS
{id:"evt1",cat:"events",name:"Founding of Rome",y1:-753,y2:-753,desc:"Romulus founded the city after killing Remus.",locs:[{n:"Palatine Hill",lat:41.89,lng:12.49,info:"Central hill.",wiki:"Twins nursed by she-wolf. Remus jumped walls; Romulus killed him. Habitation from ~1000 BC."}],paths:[],facts:["April 21, 753 BC","Seven kings","She-wolf symbol"]},
{id:"evt2",cat:"events",name:"Battle of Cannae",y1:-216,y2:-216,desc:"Hannibal's double envelopment killed 50-70,000.",locs:[{n:"Cannae",lat:41.3,lng:16.1,info:"Still studied at academies.",wiki:"August 2, 216 BC. Hannibal let center bend, then encircled. 50-70,000 died including 80 senators."},{n:"Rome",lat:41.9,lng:12.5,info:"Panic. Emergency declared.",wiki:"Senate recruited slaves. Rome refused to negotiate."}],paths:[[41.3,16.1,41.9,12.5,"News reaches Rome"]],facts:["50-70,000 killed","Still studied","Rome refused surrender"]},
{id:"evt3",cat:"events",name:"Eruption of Vesuvius",y1:79,y2:79,desc:"Buried Pompeii and Herculaneum.",locs:[{n:"Mt. Vesuvius",lat:40.82,lng:14.43,info:"33 km column.",wiki:"August 24, 79 AD. Pliny the Younger described it."},{n:"Pompeii",lat:40.75,lng:14.49,info:"Buried 4-6m deep.",wiki:"City of 20,000 perfectly preserved."},{n:"Herculaneum",lat:40.81,lng:14.35,info:"500°C flows.",wiki:"Pyroclastic flows preserved wood and scrolls."}],paths:[[40.82,14.43,40.75,14.49,"Surge engulfs Pompeii"],[40.82,14.43,40.81,14.35,"Cloud buries Herculaneum"]],facts:["Pliny documented it","~16,000 died","Rediscovered 18th century"]},
{id:"evt4",cat:"events",name:"Fall of Western Rome",y1:476,y2:476,desc:"Odoacer deposed last emperor. East survived 1,000 years.",locs:[{n:"Ravenna",lat:44.42,lng:12.2,info:"Western capital.",wiki:"September 4, 476. Odoacer deposed Romulus Augustulus. Sent him to live on a pension."},{n:"Rome",lat:41.9,lng:12.5,info:"Sacked twice.",wiki:"Population fell from 1 million to ~100,000."},{n:"Constantinople",lat:41.0,lng:29.0,info:"Survived until 1453.",wiki:"Eastern Empire thrived behind its walls for another millennium."}],paths:[[44.42,12.2,41.9,12.5,"Western authority ends"],[41.0,29.0,41.9,12.5,"Eastern influence continues"]],facts:["Byzantine: until 1453","Decades of decline","Last emperor echoed founder"]},
{id:"evt5",cat:"events",name:"Assassination of Caesar",y1:-44,y2:-44,desc:"23 senators stabbed Caesar on March 15.",locs:[{n:"Theatre of Pompey",lat:41.896,lng:12.473,info:"Site of assassination.",wiki:"60 conspirators surrounded Caesar. Casca struck first. 23 wounds. Only one fatal."}],paths:[],facts:["23 wounds","One fatal","Brutus and Cassius led"]},
{id:"evt6",cat:"events",name:"Gallic Sack of Rome",y1:-390,y2:-390,desc:"Brennus and the Gauls burned Rome. 'Vae victis' — woe to the conquered.",locs:[{n:"Allia River",lat:42.05,lng:12.55,info:"Romans routed 11 miles north of Rome.",wiki:"July 18, 390 BC. Senone Gauls under Brennus crushed the Roman army at the Allia tributary. The road to Rome lay open."},{n:"Capitoline Hill",lat:41.89,lng:12.48,info:"Only part of Rome that held out.",wiki:"While the Gauls burned the city, defenders held the Capitol for seven months. Sacred geese of Juno alerted guards to a night assault. Marcus Manlius hurled attackers off the cliff."},{n:"Veii",lat:42.02,lng:12.39,info:"Roman refugees sheltered here.",wiki:"Survivors fled to the recently conquered Etruscan city. Camillus organized a counterattack and was hailed as Rome's 'second founder.'"}],paths:[[42.05,12.55,41.89,12.48,"Gauls march from Allia into Rome","City defenders collapsed in panic. Most Romans fled."],[42.02,12.39,41.89,12.48,"Camillus counterattacks from Veii"]],facts:["'Vae victis' — woe to the conquered","Sacred geese saved the Capitol","1,000 lbs of gold ransom"]},
{id:"evt7",cat:"events",name:"Battle of Actium",y1:-31,y2:-31,desc:"Octavian defeated Antony and Cleopatra — the Republic ended, the Empire began.",locs:[{n:"Actium",lat:38.95,lng:20.73,info:"September 2, 31 BC: 500 ships clashed.",wiki:"Agrippa's fleet of 400 light warships outmaneuvered Antony's 290 heavier vessels. Cleopatra's 60 Egyptian ships fled mid-battle; Antony abandoned his fleet to follow her."},{n:"Alexandria",lat:31.2,lng:29.9,info:"Antony and Cleopatra committed suicide.",wiki:"Octavian pursued them to Egypt. Antony fell on his sword. Cleopatra killed herself — tradition says by asp bite — on August 12, 30 BC. Egypt became Rome's richest province."},{n:"Rome",lat:41.9,lng:12.5,info:"Octavian returned to absolute power.",wiki:"With no rivals left, Octavian controlled the Roman world. In 27 BC, the Senate granted him the title Augustus. The Republic was dead; the Empire had begun."}],paths:[[41.9,12.5,38.95,20.73,"Agrippa's fleet sails to Actium","400 ships vs 290. Lighter Roman ships proved decisive."],[38.95,20.73,31.2,29.9,"Octavian pursues to Alexandria","Antony and Cleopatra's suicides ended the last resistance."]],facts:["500 ships vs 290 ships","Cleopatra fled mid-battle","Egypt became a Roman province"]},
