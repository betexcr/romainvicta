{id:"evt8",cat:"events",name:"Edict of Milan",y1:313,y2:313,desc:"Constantine and Licinius legalized Christianity — ending 250 years of persecution.",locs:[{n:"Mediolanum",lat:45.46,lng:9.19,info:"Edict issued here in February 313 AD.",wiki:"Constantine (western emperor) and Licinius (eastern emperor) agreed to grant religious tolerance throughout the empire. Churches received legal status and confiscated property was restored."},{n:"Rome",lat:41.9,lng:12.5,info:"Christian worship came into the open.",wiki:"Within decades, Christianity went from persecuted sect to dominant religion. Constantine funded massive church construction including Old St. Peter's Basilica."},{n:"Nicomedia",lat:40.76,lng:29.92,info:"Where Diocletian's persecution began in 303.",wiki:"Just ten years earlier, Diocletian's first edict was posted here ordering churches destroyed and scriptures burned. The reversal under Constantine was total."}],paths:[[45.46,9.19,41.9,12.5,"Edict reaches Rome — churches emerge"],[40.76,29.92,45.46,9.19,"From persecution at Nicomedia to tolerance at Milan"]],facts:["Christianity legalized","Ended 250 years of persecution","Property restored to churches"]},
{id:"evt9",cat:"events",name:"Crossing the Rubicon",y1:-49,y2:-49,desc:"Caesar crossed with the 13th Legion — an irreversible act of treason that ended the Republic.",locs:[{n:"Rubicon River",lat:44.1,lng:12.4,info:"January 10, 49 BC: point of no return.",wiki:"The Rubicon was the legal boundary of Italy. Any general crossing it under arms committed treason. Caesar hesitated, then said 'Alea iacta est' — the die is cast — and led his single legion south."},{n:"Ravenna",lat:44.42,lng:12.2,info:"Caesar's staging point in Cisalpine Gaul.",wiki:"Caesar waited here with only one legion — the 13th — while negotiating with the Senate. When talks failed, he made his fateful decision."},{n:"Rome",lat:41.9,lng:12.5,info:"Pompey and the Senate fled in panic.",wiki:"Caesar seized Italy in just 60 days without bloodshed. Pompey and most senators fled to Greece. Caesar found the treasury still full and took it."}],paths:[[44.42,12.2,44.1,12.4,"Caesar departs Ravenna for the Rubicon"],[44.1,12.4,41.9,12.5,"Marches on Rome — Pompey flees","Seized Italy in 60 days without a major battle."]],facts:["'Alea iacta est' — the die is cast","Crossing under arms = treason","Seized Italy in 60 days"]},
{id:"evt10",cat:"events",name:"Sack of Rome by Vandals",y1:455,y2:455,desc:"Gaiseric's fleet from Carthage looted Rome for 14 systematic days.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"14 days of methodical plunder.",wiki:"June 2, 455 AD. Vandal king Gaiseric landed at Ostia and entered Rome unopposed. Pope Leo I negotiated: no burning or killing, but everything of value was stripped. Temple of Jupiter on the Capitoline was stripped of its gilded bronze roof tiles."},{n:"Carthage",lat:36.85,lng:10.33,info:"Vandal kingdom's capital.",wiki:"Gaiseric had seized Carthage in 439 and built a powerful fleet. Ironic that Carthage — destroyed by Rome in 146 BC — now sent ships to sack Rome."},{n:"Ostia",lat:41.76,lng:12.29,info:"Vandal fleet landed here.",wiki:"Rome's port offered easy access. The fleet loaded shiploads of plunder including the Temple menorah from Jerusalem, originally seized by Titus in 70 AD."}],paths:[[36.85,10.33,41.76,12.29,"Vandal fleet sails from Carthage","Ironic reversal — Carthage strikes back."],[41.76,12.29,41.9,12.5,"Gaiseric enters Rome unopposed"]],facts:["14 days of looting","Menorah from Jerusalem taken","Pope Leo I negotiated no killing"]},
{id:"evt11",cat:"events",name:"Year of the Four Emperors",y1:69,y2:69,desc:"Nero's suicide triggered chaos — Galba, Otho, Vitellius each reigned and died within months.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Three emperors died here in 18 months.",wiki:"Nero's suicide in June 68 left no heir. Galba (Spain) seized power but was murdered in the Forum after 7 months. Otho overthrew him but lost to Vitellius at Bedriacum after 3 months. Vitellius was lynched by Vespasian's troops in December 69."},{n:"Bedriacum",lat:45.07,lng:10.28,info:"Two decisive battles fought here in 69 AD.",wiki:"Small village near Cremona where both critical battles of 69 AD were fought. First: Vitellius' forces defeated Otho (who then committed suicide). Second: Vespasian's forces destroyed Vitellius' army."},{n:"Alexandria",lat:31.2,lng:29.9,info:"Vespasian proclaimed emperor here.",wiki:"Eastern legions proclaimed Vespasian emperor on July 1, 69 AD. Egypt's grain supply gave him economic leverage over Rome. He restored order and founded the Flavian dynasty."}],paths:[[41.9,12.5,45.07,10.28,"Armies clash at Bedriacum — twice"],[31.2,29.9,41.9,12.5,"Vespasian marches from the East to restore order"]],facts:["Four emperors in 18 months","Vespasian restored order","Civil war revealed the empire's secret: emperors could be made outside Rome"]},
{id:"evt12",cat:"events",name:"The Social War",y1:-91,y2:-88,desc:"Italian allies demanded citizenship — Rome's bloodiest war since Hannibal.",locs:[{n:"Asculum",lat:42.85,lng:13.58,info:"War erupted here when Roman praetor was murdered.",wiki:"91 BC. When praetor Servilius was murdered by angry Italians at Asculum, full-scale war erupted. Italian allies who had fought alongside Rome for centuries demanded equal citizenship rights."},{n:"Corfinium",lat:42.12,lng:13.84,info:"Rebel capital — renamed 'Italia.'",wiki:"The rebels established their own state with Corfinium as capital, renaming it 'Italia.' They minted coins showing the Italian bull goring the Roman wolf — a powerful symbol of their cause."},{n:"Rome",lat:41.9,lng:12.5,info:"Won militarily but conceded politically.",wiki:"Approximately 300,000 died — the bloodiest conflict in Italy since Hannibal. Rome won the battles but granted citizenship to all Italians through the Lex Julia (90 BC) and Lex Plautia Papiria (89 BC). The war doubled Rome's citizen body."}],paths:[[42.85,13.58,42.12,13.84,"Rebellion spreads across central Italy"],[42.12,13.84,41.9,12.5,"Rome concedes citizenship"]],facts:["~300,000 killed","Italian bull vs Roman wolf","Rome won the war, allies won the peace"]},
{id:"evt13",cat:"events",name:"Battle of the Milvian Bridge",y1:312,y2:312,desc:"Constantine vs. Maxentius — 'In hoc signo vinces' changed the course of Western civilization.",locs:[{n:"Milvian Bridge",lat:41.94,lng:12.47,info:"October 28, 312 AD.",wiki:"Constantine saw a vision — cross or chi-rho in the sky with the words 'In hoc signo vinces' (In this sign, conquer). He ordered the Christian symbol painted on shields. Maxentius, trusting an oracle, chose to fight outside Rome's walls. His troops were pushed into the Tiber; Maxentius drowned. Constantine entered Rome as sole western emperor."},{n:"Rome",lat:41.9,lng:12.5,info:"Constantine entered as liberator.",wiki:"Constantine attributed his victory to the Christian God. Within months he co-issued the Edict of Milan legalizing Christianity. Within a century, the empire was officially Christian. The battle changed the religious trajectory of Western civilization."}],paths:[[41.94,12.47,41.9,12.5,"Constantine enters Rome victorious"]],facts:["'In hoc signo vinces'","Maxentius drowned in the Tiber","Changed the religious history of the West"]},
{id:"evt14",cat:"events",name:"First & Second Triumvirates",y1:-60,y2:-33,desc:"Private power-sharing that killed the Republic — Caesar-Pompey-Crassus, then Octavian-Antony-Lepidus.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Where both triumvirates wielded power.",wiki:"The First Triumvirate (60 BC) was an informal pact: Caesar got Gaul, Pompey got Spain, Crassus got Syria. It collapsed when Crassus died at Carrhae. The Second Triumvirate (43 BC) was legally enacted: Octavian, Antony, and Lepidus divided the Roman world and published proscription lists — 300 senators and 2,000 equites, including Cicero."},{n:"Luca",lat:43.84,lng:10.51,info:"Conference renewed the First Triumvirate, 56 BC.",wiki:"Caesar, Pompey, and Crassus met at Luca (Lucca) to renew their alliance. 200 senators attended — showing how much power had shifted from the Senate to these three men."},{n:"Bononia",lat:44.49,lng:11.34,info:"Second Triumvirate formed here, 43 BC.",wiki:"Modern Bologna. Octavian, Antony, and Lepidus met on an island in a river near Bononia. They divided the Roman world and drew up proscription lists — trading each other's enemies and allies. Antony demanded Cicero's head; Octavian reluctantly agreed."}],paths:[[41.9,12.5,43.84,10.51,"200 senators attend the Luca conference"],[44.49,11.34,41.9,12.5,"Proscription lists reach Rome"]],facts:["First: Caesar-Pompey-Crassus (60 BC)","Second: Octavian-Antony-Lepidus (43 BC)","2,300 proscribed in the Second"]},
{id:"evt15",cat:"events",name:"Birth of the Republic",y1:-509,y2:-509,desc:"Tarquinius Superbus expelled after the rape of Lucretia — 'never again a king.' Rome's Republic was born.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"509 BC: the last king expelled.",wiki:"According to tradition, Tarquinius Superbus (Tarquin the Proud) was overthrown after his son Sextus raped the noblewoman Lucretia, who committed suicide rather than live in dishonor. Lucius Junius Brutus led the revolt. Two consuls were elected — power would be shared and annual. The Romans' hatred of monarchy shaped their politics for 500 years: 'rex' (king) became the deadliest political accusation."}],paths:[],facts:["Lucretia's suicide triggered the revolt","Two consuls replaced the king","'Rex' became the worst political accusation"]},
{id:"evt16",cat:"events",name:"Permanent Division of the Empire",y1:395,y2:395,desc:"Theodosius I's death permanently divided the empire. Arcadius received the East, Honorius the West. Never reunified.",locs:[{n:"Constantinople",lat:41.0,lng:29.0,info:"Eastern capital under Arcadius.",wiki:"When Theodosius I died on January 17, 395 AD, the empire was divided between his sons: the 17-year-old Arcadius (East) and the 10-year-old Honorius (West). Previous divisions had been administrative; this one became permanent. The Eastern Empire — richer, more urbanized, with shorter frontiers — thrived. The Western Empire collapsed within 81 years."},{n:"Ravenna",lat:44.42,lng:12.2,info:"Western capital under Honorius.",wiki:"The child-emperor Honorius moved the western capital from Milan to Ravenna in 402. Protected by marshes, it served as the last refuge of western emperors. When Alaric sacked Rome in 410, Honorius was safe in Ravenna — legend says he confused the news with the death of his chicken named Roma."}],paths:[[41.0,29.0,44.42,12.2,"Empire divided: East and West"]],facts:["Theodosius died January 17, 395 AD","Eastern Empire lasted 1,058 more years","Western Empire fell in 81 years"]},
{id:"evt17",cat:"events",name:"Secession of the Plebs",y1:-494,y2:-494,desc:"Plebeians withdrew to the Sacred Mount, refusing military service — won the creation of Tribunes. First general strike in history.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Patricians vs. plebeians — the Conflict of the Orders began.",wiki:"In 494 BC, Rome's common citizens (plebeians) — burdened by debt, denied political rights, and subject to harsh patrician justice — withdrew from the city to the Sacred Mount (Mons Sacer), 3 miles northeast of Rome. They refused to serve in the army or work. The patricians, unable to wage war or run the economy without them, were forced to negotiate. The result: the creation of Tribunes of the Plebs — sacrosanct magistrates who could veto any action of the state. It was the world's first recorded general strike and the beginning of the Conflict of the Orders."},{n:"Mons Sacer",lat:42.0,lng:12.55,info:"Sacred Mount — where the plebeians withdrew.",wiki:"The Mons Sacer (Sacred Mount), on the Via Nomentana northeast of Rome, was where the plebeians camped during their secession. Tradition says Menenius Agrippa persuaded them to return with his famous fable of the belly and the limbs: all parts of the body must work together. There were at least five secessions between 494 and 287 BC."}],paths:[[41.9,12.5,42.0,12.55,"Plebeians withdraw to the Sacred Mount"]],facts:["First general strike in recorded history","Tribunes of the Plebs created","At least 5 secessions over 200 years"]},
{id:"evt18",cat:"events",name:"The Nika Riots",y1:532,y2:532,desc:"Constantinople's worst urban violence — 30,000 killed. Half the city burned. Theodora's speech saved Justinian's throne.",locs:[{n:"Constantinople/Hippodrome",lat:41.006,lng:28.975,info:"January 532 AD: racing factions united in revolt.",wiki:"On January 13, 532 AD, the Blue and Green chariot racing factions — normally bitter rivals — united against Justinian's government, chanting 'Nika!' (Win!). For five days, rioters burned Constantinople: the original Hagia Sophia, the Senate House, and much of the city center were destroyed. The rioters crowned a rival emperor. Justinian prepared to flee — but Empress Theodora refused, declaring 'Purple is the noblest shroud.' General Belisarius trapped the rioters in the Hippodrome and slaughtered approximately 30,000. Justinian then rebuilt the city, including the magnificent new Hagia Sophia."}],paths:[],facts:["30,000 killed in the Hippodrome","'Purple is the noblest shroud' — Theodora","Led to the rebuilding of Hagia Sophia"]},
{id:"evt19",cat:"events",name:"Proscriptions of the Triumvirs",y1:-43,y2:-43,desc:"Octavian, Antony, and Lepidus published death lists — 300 senators, 2,000 equestrians marked. Cicero murdered.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"43 BC: the Second Triumvirate's reign of terror.",wiki:"On November 27, 43 BC, the Second Triumvirate (Octavian, Antony, Lepidus) was legally established with the power of proscription — the right to publish lists of citizens condemned to death without trial. Approximately 300 senators and 2,000 equestrians were proscribed. Their property was confiscated to fund the war against Caesar's assassins. Men were hunted through the streets; heads were displayed on the Rostra."},{n:"Formiae",lat:41.26,lng:13.6,info:"Cicero was murdered here, December 7, 43 BC.",wiki:"Marcus Tullius Cicero — Rome's greatest orator and the Republic's most eloquent voice — was murdered by Antony's soldiers at his villa near Formiae on December 7, 43 BC. He had been proscribed at Antony's personal insistence (Octavian agreed, betraying his mentor). Cicero's head and hands were nailed to the Rostra in the Forum — the platform where he had delivered his greatest speeches. Antony's wife Fulvia allegedly pierced his tongue with a hairpin."}],paths:[[41.9,12.5,41.26,13.6,"Cicero flees Rome but is caught at Formiae"]],facts:["300 senators and 2,000 equestrians proscribed","Cicero's head nailed to the Rostra","Fulvia pierced his tongue with a hairpin"]},
{id:"evt20",cat:"events",name:"The Rape of the Sabine Women",y1:-750,y2:-750,desc:"Foundation legend — Romulus' settlers seized neighboring women. War, then reconciliation. The women themselves stopped the fighting.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"One of Rome's most famous foundation myths.",wiki:"According to Roman tradition, Romulus' new settlement had plenty of men but few women. He invited the neighboring Sabines to a festival, then his men seized the unmarried women. The Sabines returned with an army. As battle was about to begin, the Sabine women — now wives and mothers — rushed between the lines, begging their fathers and husbands to stop. The two peoples merged, and the Sabine king Titus Tatius co-ruled with Romulus. The story, depicted by Giambologna, Poussin, and David, became one of Western art's most painted subjects."}],paths:[],facts:["Sabine women stopped the battle themselves","Romans and Sabines merged into one people","One of Western art's most depicted scenes"]},
{id:"evt21",cat:"events",name:"Deposition of Romulus Augustulus",y1:476,y2:476,desc:"Odoacer deposed the last Western emperor — sent the imperial regalia to Constantinople. Traditional end of the Western Roman Empire.",locs:[{n:"Ravenna",lat:44.42,lng:12.2,info:"September 4, 476 AD: the last Western emperor deposed.",wiki:"On September 4, 476 AD, the Germanic chieftain Odoacer deposed the boy-emperor Romulus Augustulus in Ravenna. The irony of the name was not lost on contemporaries: Romulus (founder of Rome) Augustulus (little Augustus). Odoacer did not kill him — he sent the child to Campania with a pension. More significantly, he sent the imperial regalia to Emperor Zeno in Constantinople, declaring there was no need for a Western emperor. The Western Roman Empire was over."},{n:"Constantinople",lat:41.0,lng:29.0,info:"Zeno received the imperial regalia — the East continued alone.",wiki:"Emperor Zeno in Constantinople accepted the situation, technically recognizing Odoacer as his representative in Italy. The Eastern Roman Empire (Byzantine Empire) would continue for another 977 years, until Constantinople fell to the Ottoman Turks in 1453."}],paths:[[44.42,12.2,41.0,29.0,"Imperial regalia sent East — the West is over"]],facts:["Romulus Augustulus: ironic name for the last emperor","Spared — sent to Campania with a pension","Eastern Empire continued 977 more years"]},
// ENGINEERING
{id:"eng1",cat:"engineering",name:"Roman Road Network",y1:-312,y2:200,desc:"400,000 km of roads, 80,000 km stone-paved.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Golden Milestone.",wiki:"Milliarium Aureum — symbolic start of all roads."},{n:"Brundisium",lat:40.64,lng:17.94,info:"Via Appia terminus.",wiki:"Eastern end of Rome's first highway."},{n:"Londinium",lat:51.5,lng:-0.1,info:"Britain's road hub.",wiki:"Five major roads radiated from here."}],paths:[[41.9,12.5,40.64,17.94,"Via Appia"],[41.9,12.5,51.5,-0.1,"Roads to Britannia"]],facts:["Via Appia: 312 BC","4.5m wide","'All roads lead to Rome'"]},
{id:"eng2",cat:"engineering",name:"The Colosseum",y1:70,y2:80,desc:"50,000 seats for gladiatorial combat.",locs:[{n:"Colosseum",lat:41.89,lng:12.49,info:"189×156m, 48m tall.",wiki:"100,000 m³ travertine. Flooded for naval battles. Retractable awning by 1,000 sailors."}],paths:[],facts:["100,000 m³ travertine","Naval battles","Retractable awning"]},
{id:"eng3",cat:"engineering",name:"Pantheon",y1:118,y2:128,desc:"Largest unreinforced concrete dome — still standing.",locs:[{n:"Pantheon",lat:41.9,lng:12.48,info:"43.3m dome. 8.8m oculus.",wiki:"Concrete grades from heavy basalt to light pumice. Michelangelo: 'work of angels.'"}],paths:[],facts:["43.3m dome","1,900 years old","Michelangelo: 'work of angels'"]},
{id:"eng4",cat:"engineering",name:"Roman Aqueducts",y1:-312,y2:226,desc:"11 aqueducts fed Rome — gravity-powered engineering across continents.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"11 aqueducts delivered 1 million m³/day.",wiki:"Rome's 11 aqueducts totaled over 500 km. The Aqua Appia (312 BC) was the first. By the imperial period, they delivered enough water for 1 million cubic meters daily — more per capita than many modern cities."},{n:"Pont du Gard",lat:43.95,lng:4.54,info:"48.8m tall — tallest Roman aqueduct bridge.",wiki:"Built ~40-60 AD to carry water 50 km to Nemausus (Nîmes). Three tiers of arches. Average gradient of just 1 cm per 180 m — water flowed by gravity alone. UNESCO World Heritage Site."},{n:"Segovia",lat:40.95,lng:-4.12,info:"167 arches of granite — in use until 1973.",wiki:"Built in the 1st century AD from 20,400 granite blocks with no mortar. 28 m tall at its highest point. Remarkably, it supplied water to Segovia until 1973."},{n:"Carthage",lat:36.85,lng:10.33,info:"132 km aqueduct — longest in the Roman world.",wiki:"The Zaghouan Aqueduct stretched 132 km from mountain springs to Carthage. Sections still stand. Restored by Hadrian after earthquake damage."}],paths:[[41.9,12.5,43.95,4.54,"Aqueduct engineering reaches Gaul"],[41.9,12.5,40.95,-4.12,"Roman water reaches Hispania"],[41.9,12.5,36.85,10.33,"Longest aqueduct built in Africa"]],facts:["11 aqueducts, 500+ km to Rome","Pont du Gard: 1cm/180m gradient","Segovia in use until 1973"]},
{id:"eng5",cat:"engineering",name:"Hadrian's Wall",y1:122,y2:128,desc:"117 km frontier across Britain — Rome's most famous wall.",locs:[{n:"Wallsend",lat:55.0,lng:-1.53,info:"Eastern terminus on the Tyne.",wiki:"Named Segedunum. Eastern end of the wall where it met the river. Garrison of 600 infantry. Full-scale reconstruction visible today."},{n:"Housesteads Fort",lat:55.01,lng:-2.33,info:"Best-preserved fort on the Wall.",wiki:"Vercovicium — garrisoned by 800 men. Spectacularly sited on the Whin Sill crags. Includes the best-preserved Roman latrine in Britain."},{n:"Vindolanda",lat:54.99,lng:-2.36,info:"Famous writing tablets discovered here.",wiki:"Pre-dates the Wall itself. The Vindolanda Tablets — thin wooden postcards — are the oldest handwritten documents in Britain. Include a birthday party invitation from a commander's wife."},{n:"Bowness-on-Solway",lat:54.95,lng:-3.23,info:"Western terminus on the Irish Sea.",wiki:"Western end of the Wall. Extended by a system of watchtowers and forts down the Cumbrian coast to guard against seaborne flanking."}],paths:[[55.0,-1.53,55.01,-2.33,"Wall runs east to west across crags"],[55.01,-2.33,54.99,-2.36,"Vindolanda guards the Stanegate road"],[54.99,-2.36,54.95,-3.23,"Wall continues to the Solway coast"]],facts:["117 km coast to coast","80 milecastles, 160 turrets","Manned for ~300 years"]},
{id:"eng6",cat:"engineering",name:"Baths of Caracalla",y1:211,y2:216,desc:"100,000 m² leisure complex — gym, library, gardens, and baths for 1,600.",locs:[{n:"Baths of Caracalla",lat:41.879,lng:12.492,info:"Rome's second-largest thermae.",wiki:"Inaugurated 216 AD. Could serve 1,600 bathers simultaneously. Featured caldarium (hot), tepidarium (warm), frigidarium (cold), and natatio (swimming pool). 10 tonnes of wood burned daily for heating. Interior lavished with marble, mosaics, and hundreds of statues including the Farnese Hercules and Farnese Bull."},{n:"Rome",lat:41.9,lng:12.5,info:"Supplied by the Aqua Antoniniana aqueduct.",wiki:"A dedicated branch aqueduct supplied the 8 million liters of water. The complex also included libraries, gymnasiums, shops, and gardens. Operated for over 300 years until Goths cut the aqueducts in 537 AD."}],paths:[],facts:["100,000 m² complex","10 tonnes of wood burned daily","Library, gym, gardens included"]},
{id:"eng7",cat:"engineering",name:"Circus Maximus",y1:-600,y2:549,desc:"250,000-seat chariot racing stadium — Rome's largest and most beloved venue.",locs:[{n:"Circus Maximus",lat:41.886,lng:12.485,info:"621m × 118m — larger than any modern stadium.",wiki:"Located between the Palatine and Aventine hills. Chariot racing began here under the kings. Julius Caesar expanded it; Augustus added an Egyptian obelisk. After the Great Fire of 64 AD, Nero rebuilt it to seat 250,000. Last races held in 549 AD under the Ostrogothic king Totila."}],paths:[],facts:["250,000 spectators","621m × 118m","Chariot racing for 1,000+ years"]},
{id:"eng8",cat:"engineering",name:"Trajan's Column",y1:113,y2:113,desc:"30m marble monument with 2,662 carved figures — Rome's greatest war memorial.",locs:[{n:"Trajan's Forum",lat:41.896,lng:12.484,info:"Completed May 113 AD.",wiki:"Designed by Apollodorus of Damascus. 19 massive drums of Carrara marble, each weighing ~32 tons. A continuous spiral frieze winds 23 times around the shaft for 190 meters, depicting 155 scenes of the Dacian Wars with 2,662 figures. Trajan appears 58 times. An internal staircase of 185 steps leads to the top. Originally crowned by a bronze statue of Trajan; replaced by St. Peter in 1587."}],paths:[],facts:["30m tall, 1,100 tons of marble","2,662 carved figures","185-step internal staircase"]},
{id:"eng9",cat:"engineering",name:"Forum Romanum",y1:-753,y2:476,desc:"Heart of Rome for 1,200 years — temples, courts, markets, and the crucible of history.",locs:[{n:"Forum Romanum",lat:41.892,lng:12.485,info:"Political, religious, and commercial center.",wiki:"Originally a marshy valley between the hills, drained by the Cloaca Maxima in the 6th century BC. For 1,200 years it was the center of Roman public life: elections, trials, triumphs, funerals, commerce, and speeches. Caesar was cremated here. Augustus declared it 'too small' and built his own forum — then Trajan built an even larger one."},{n:"Temple of Saturn",lat:41.893,lng:12.484,info:"State treasury and one of the oldest temples.",wiki:"Founded ~498 BC. Housed the aerarium — Rome's state treasury. During Saturnalia, the temple's wool bindings were removed. Eight surviving columns date from a 4th-century restoration."},{n:"Rostra",lat:41.893,lng:12.484,info:"The speaker's platform — decorated with ships' prows.",wiki:"Named for the bronze ram (rostrum) prows taken from enemy ships at Antium in 338 BC. Where Cicero delivered his greatest speeches. After his murder, his severed head and hands were nailed here by Antony."}],paths:[],facts:["1,200 years of continuous use","Caesar cremated here","Cicero's head displayed on the Rostra"]},
{id:"eng10",cat:"engineering",name:"Trajan's Bridge",y1:105,y2:105,desc:"Longest arch bridge in the world for 1,000 years — 1,135m across the Danube.",locs:[{n:"Drobeta",lat:44.63,lng:22.66,info:"Modern Drobeta-Turnu Severin, Romania.",wiki:"Designed by Apollodorus of Damascus for Trajan's Dacian Wars. 1,135 meters long with 20 wooden arches on stone piers, each rising 50 meters from the riverbed. The longest arch bridge in the world for over 1,000 years. Hadrian dismantled the superstructure to prevent barbarian crossings — the stone piers survived into the modern era."}],paths:[],facts:["1,135m — longest for 1,000 years","20 stone piers, 50m high","Hadrian dismantled it"]},
{id:"eng11",cat:"engineering",name:"Hypocaust Heating",y1:-100,y2:400,desc:"Underfloor heating with pilae stacks and tubuli wall flues — used in baths and wealthy homes across the empire.",locs:[{n:"Pompeii",lat:40.75,lng:14.49,info:"Well-preserved hypocaust systems in the Forum Baths.",wiki:"The hypocaust (Latin: hypocaustum, 'burning beneath') was Rome's central heating system. A furnace (praefurnium) heated air that circulated under a raised floor supported by small brick pillars (pilae). Hot air rose through hollow tiles (tubuli) in the walls. The system was essential for bathhouses — the caldarium (hot room) required temperatures up to 40°C."},{n:"Bath",lat:51.38,lng:-2.36,info:"Aquae Sulis: Roman baths in Britain with intact hypocaust.",wiki:"The Roman baths at Bath (Aquae Sulis) are among the best preserved in the world. The sacred spring supplies water at 46°C naturally, but the complex also used hypocaust heating for additional rooms. The Great Bath, temple of Sulis Minerva, and underfloor heating channels are all visible today."}],paths:[[40.75,14.49,51.38,-2.36,"Hypocaust technology spreads across the empire"]],facts:["Raised floor on brick pillars (pilae)","Hollow wall tiles (tubuli) channeled heat","Essential for Roman bath culture"]},
{id:"eng12",cat:"engineering",name:"Triumphal Arches",y1:-196,y2:315,desc:"Monumental arches commemorating military victories — from Scipio's first to Constantine's last great example.",locs:[{n:"Rome/Arch of Titus",lat:41.891,lng:12.489,info:"81 AD: celebrates conquest of Jerusalem. Shows spoils of the Temple.",wiki:"The Arch of Titus commemorates the siege of Jerusalem (70 AD). Its inner relief shows soldiers carrying the menorah and sacred vessels from the Temple — one of the most important historical artworks in the world. The arch set the standard for all subsequent triumphal arches, including the Arc de Triomphe in Paris."},{n:"Rome/Arch of Constantine",lat:41.89,lng:12.491,info:"315 AD: largest surviving Roman arch.",wiki:"The Arch of Constantine is the largest and last great triumphal arch of Rome. Built in 315 AD to celebrate Constantine's victory at the Milvian Bridge, it famously reused (spoliated) sculpture from earlier monuments of Trajan, Hadrian, and Marcus Aurelius — perhaps because craftsmen could no longer match earlier quality."}],paths:[],facts:["Arch of Titus: spoils of Jerusalem's Temple","Arch of Constantine: largest surviving arch","Inspired the Arc de Triomphe in Paris"]},
{id:"eng13",cat:"engineering",name:"Roman Harbors & Breakwaters",y1:-37,y2:200,desc:"Hydraulic concrete set underwater — Caesarea Maritima and Portus revolutionized Roman maritime engineering.",locs:[{n:"Caesarea Maritima",lat:32.5,lng:34.89,info:"Herod's artificial harbor using Roman concrete technology.",wiki:"King Herod built Caesarea's harbor (Sebastos) between 22-10 BC using Roman hydraulic concrete — pozzolana mixed with lime and seawater that hardened underwater. The harbor was larger than Piraeus. Wooden forms were sunk and filled with concrete. It was the largest artificial harbor in the ancient world."},{n:"Portus",lat:41.78,lng:12.26,info:"Rome's great harbor built by Claudius and Trajan.",wiki:"Claudius began Portus in 42 AD to replace silting Ostia. Trajan expanded it with a hexagonal inner basin (112 AD) that could handle 200 ships. The complex covered 3.5 km² and fed Rome's population of over a million. Remains of warehouses, canals, and the lighthouse base survive."}],paths:[[32.5,34.89,41.78,12.26,"Maritime engineering links the harbors"]],facts:["Hydraulic concrete hardened underwater","Caesarea: largest ancient artificial harbor","Portus: Trajan's hexagonal basin held 200 ships"]},
{id:"eng14",cat:"engineering",name:"Domus Aurea",y1:64,y2:68,desc:"Nero's Golden House — 300 rooms, a rotating dining room, and an octagonal hall that revolutionized architecture.",locs:[{n:"Rome/Esquiline",lat:41.891,lng:12.495,info:"Built after the Great Fire of 64 AD.",wiki:"After the Great Fire of 64 AD cleared vast areas of central Rome, Nero built his fantastical palace complex — the Domus Aurea (Golden House). It covered 100-300 acres with an artificial lake, vineyards, and a 120-foot bronze colossus of Nero. The octagonal room used a revolutionary concrete dome with an oculus, predating the Pantheon's dome by 60 years. The rotating dining room (coenatio rotunda) has been archaeologically confirmed. Buried by Trajan and Titus, it was rediscovered during the Renaissance when artists including Raphael and Michelangelo lowered themselves into the 'grottos' — the word 'grotesque' comes from these visits."}],paths:[],facts:["300 rooms with gold leaf and gemstones","Octagonal hall predated the Pantheon's dome","'Grotesque' derives from its buried rooms"]},
{id:"eng15",cat:"engineering",name:"Roman Bridges",y1:-62,y2:200,desc:"Alcantara (still in use), Pont du Gard, Pons Fabricius — engineering that outlasted the empire by 2,000 years.",locs:[{n:"Alcantara",lat:39.72,lng:-6.89,info:"Six-arch bridge still carrying traffic after 2,000 years.",wiki:"The Alcantara Bridge over the Tagus in Spain was built 104-106 AD by the architect Lacer. Its central arches span 29 meters and rise 48 meters above the river. An inscription declares: 'I have built a bridge that will last forever.' It still carries traffic. The bridge's engineering — voussoir arches on granite piers — was not surpassed until the 19th century."},{n:"Rome/Pons Fabricius",lat:41.89,lng:12.48,info:"Oldest bridge in Rome, still intact (62 BC).",wiki:"The Pons Fabricius was built in 62 BC and connects the Campus Martius to the Tiber Island. It is the oldest bridge in Rome still in its original state — over 2,000 years of continuous use. The inscription names its builder: L. Fabricius. Two four-faced herms of Janus guard the central pier."}],paths:[[39.72,-6.89,41.89,12.48,"Roman bridge engineering spans the empire"]],facts:["Alcantara: 'I have built a bridge that will last forever'","Pons Fabricius: 2,000+ years of continuous use","Voussoir arch engineering unsurpassed until 1800s"]},
{id:"eng16",cat:"engineering",name:"Roman Insulae (Apartment Blocks)",y1:-200,y2:476,desc:"5-7 story tenements housing the urban poor — fire traps prone to collapse. 46,000 insulae vs. 1,800 domus in Rome.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"46,000 apartment blocks vs. 1,800 private houses.",wiki:"The vast majority of Rome's million-plus population lived in insulae — apartment blocks of 5-7 stories built of timber, brick, and concrete. A 4th-century survey counted 46,602 insulae against only 1,797 domus (private houses). Upper floors were cheapest, hottest, and most dangerous. Augustus limited building height to 70 feet (21m) after collapses; Trajan reduced it further to 60 feet. Fire was a constant terror — Rome had no fire engines, and timber upper floors burned easily."},{n:"Ostia",lat:41.76,lng:12.29,info:"Best-preserved insulae — still standing to 3-4 stories.",wiki:"Ostia's insulae are the best-preserved in the Roman world — some still stand to 3-4 stories. The Casa dei Dipinti and the Insula of the Painted Vaults show small apartments with frescoed walls, balconies, and shared courtyards. They give the best picture of how ordinary Romans actually lived: cramped, noisy, but not without dignity."}],paths:[],facts:["46,000 insulae vs. 1,800 domus in Rome","Augustus limited height to 70 feet","Fire was a constant terror"]},
{id:"eng17",cat:"engineering",name:"Roman Lighthouses",y1:-300,y2:400,desc:"Tower of Hercules still stands (UNESCO). Pharos of Dover guided the Channel crossing. Roman lighthouses served the entire empire.",locs:[{n:"A Coruna/Tower of Hercules",lat:43.39,lng:-8.41,info:"Only Roman lighthouse still functioning — UNESCO World Heritage.",wiki:"The Tower of Hercules in A Coruna, Spain is the only Roman lighthouse still in operation. Built in the late 1st century AD, it stands 55 meters tall and guided ships approaching the northwest corner of the Iberian Peninsula. Renovated in the 18th century, it retains its Roman core and foundations. It has served as a lighthouse for nearly 2,000 years — UNESCO World Heritage since 2009."},{n:"Dover",lat:51.13,lng:1.33,info:"Roman pharos guided the Channel crossing.",wiki:"The Roman lighthouse (pharos) at Dover Castle is the tallest surviving Roman structure in Britain — 19 meters of the original Roman work still stand. It guided ships crossing the English Channel from Boulogne (Gesoriacum). A matching pharos existed on the French side. The pair formed a navigation system for the critical Channel crossing."}],paths:[[43.39,-8.41,51.13,1.33,"Roman lighthouses guided the Atlantic and Channel"]],facts:["Tower of Hercules: 2,000 years of continuous use","Only functioning Roman lighthouse","Dover pharos: tallest Roman structure in Britain"]},
{id:"eng18",cat:"engineering",name:"Roman Cranes & Construction Machines",y1:-200,y2:400,desc:"Polyspaston, treadwheel crane, pile driver — lifted 6-ton blocks. Vitruvius documented the technology.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Cranes enabled Rome's monumental architecture.",wiki:"Roman construction technology was remarkably sophisticated. Vitruvius (De Architectura, Book X) described multiple crane types: the trispastos (3-pulley, 150kg capacity), pentaspaston (5-pulley), and the massive polyspaston. Treadwheel cranes — powered by men walking inside a large drum — could lift 6-ton blocks with a crew of just 4-5 men. The Romans also developed pile drivers for foundation work and sophisticated scaffolding systems."},{n:"Baalbek",lat:34.01,lng:36.2,info:"Trilithon stones: 800 tons each — how were they moved?",wiki:"The Temple of Jupiter at Baalbek contains the Trilithon — three stones weighing approximately 800 tons each, placed 7 meters above ground. A fourth stone (the Stone of the Pregnant Woman, 1,000 tons) was quarried but never placed. How the Romans moved these stones remains debated — no known Roman crane could lift them. They may have used inclined planes, rollers, and thousands of laborers."}],paths:[],facts:["Treadwheel cranes lifted 6-ton blocks","Vitruvius documented crane designs","Baalbek stones: 800 tons — method unknown"]},
{id:"eng19",cat:"engineering",name:"Roman Amphitheatres",y1:-80,y2:400,desc:"230+ amphitheatres across the empire — El Djem, Arles, Nimes, Pula. Not just the Colosseum.",locs:[{n:"El Djem",lat:35.3,lng:10.71,info:"Third-largest amphitheatre — seats 35,000. UNESCO.",wiki:"The Amphitheatre of El Djem (Thysdrus) in Tunisia is the third-largest Roman amphitheatre (after the Colosseum and Capua), seating 35,000. Built around 238 AD, it is remarkably well-preserved — the full three-story facade survives. It demonstrates how deeply Roman culture penetrated North Africa. UNESCO World Heritage since 1979."},{n:"Arles",lat:43.68,lng:4.63,info:"Still used for bullfights — seats 20,000.",wiki:"The amphitheatre at Arles (Arelate) in southern France seats 20,000 and is still used for events today. Built around 90 AD, it survived the Middle Ages by being converted into a fortified village — over 200 houses were built inside it. The houses were cleared in the 19th century, revealing the Roman structure beneath."},{n:"Pula",lat:44.87,lng:13.85,info:"Best-preserved amphitheatre on the Adriatic — seats 23,000.",wiki:"Pula's amphitheatre in Croatia is the sixth-largest surviving Roman arena, seating 23,000. Built under Augustus and enlarged under Vespasian, it preserves its complete outer wall — four stories on the seaward side. It's still used for concerts and film festivals."}],paths:[[35.3,10.71,43.68,4.63,"Amphitheatres across the empire"],[43.68,4.63,44.87,13.85,"From Gaul to the Adriatic"]],facts:["230+ amphitheatres built across the empire","El Djem: third-largest, seats 35,000","Arles: still used after 1,900 years"]},
{id:"eng20",cat:"engineering",name:"Roman Public Latrines & Sanitation",y1:-300,y2:476,desc:"Communal toilets seating 20-80 people — flowing water beneath. Sponge-on-a-stick. Remarkably hygienic for antiquity.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"144 public latrines in 4th-century Rome.",wiki:"Roman public latrines (foricae) were communal facilities seating 20-80 people side by side on stone or marble benches with keyhole-shaped openings. Continuously flowing water from the aqueduct system ran beneath the seats, carrying waste to the sewers. Users cleaned themselves with a tersorium — a sea sponge on a stick, rinsed in a channel of running water at their feet. A 4th-century survey counted 144 public latrines in Rome."},{n:"Ostia",lat:41.76,lng:12.29,info:"Well-preserved latrines show the communal design.",wiki:"Ostia has several well-preserved latrines showing the standard Roman design: marble seats arranged around three walls of a room, with running water beneath and decorative mosaic floors. Communal toileting was entirely normal — a social occasion for conversation and business."},{n:"Ephesus",lat:37.94,lng:27.34,info:"Heated latrine with marble seats.",wiki:"The public latrine at Ephesus features heated marble seats (wealthy patrons sent slaves ahead to warm them), decorative columns, and an open-air central courtyard. It seated about 50 people and was connected to the city's sophisticated water and sewer system."}],paths:[],facts:["144 public latrines in 4th-century Rome","Tersorium: sponge-on-a-stick for cleaning","Communal toileting was a social occasion"]},
// CULTURE
{id:"cul1",cat:"culture",name:"Virgil's Aeneid",y1:-29,y2:-19,desc:"Rome's national epic — Aeneas' journey from Troy.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Augustus commissioned it.",wiki:"11 years writing. Virgil asked to burn it on his deathbed. Augustus saved it."},{n:"Naples",lat:40.85,lng:14.27,info:"Virgil lived here.",wiki:"Tomb at Posillipo became a pilgrimage site."}],paths:[[40.85,14.27,41.9,12.5,"Masterpiece presented to Augustus"]],facts:["11 years, never finished","Augustus saved it","Rome's foundational epic"]},
{id:"cul2",cat:"culture",name:"Colosseum Games",y1:80,y2:404,desc:"Gladiatorial combat for 300+ years.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"50,000 watched fighters.",wiki:"Gladiators trained in categories. Most fights not to death. Banned 404 AD."}],paths:[],facts:["100 days inaugural","Categories of fighters","Banned 404 AD"]},
{id:"cul3",cat:"culture",name:"Ovid's Metamorphoses",y1:-8,y2:8,desc:"15-book epic of 250 transformation myths — exiled by Augustus for 'a poem and an error.'",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Written here; published ~8 AD.",wiki:"Ovid was Rome's most popular poet. The Metamorphoses — 15 books, 250 myths, 12,000 lines — became 'the Bible for artists.' Augustus banished him in 8 AD for 'carmen et error' — a poem and a mistake. The exact crime remains history's greatest literary mystery."},{n:"Sulmo",lat:42.05,lng:13.93,info:"Ovid's birthplace — modern Sulmona.",wiki:"Born March 20, 43 BC to an equestrian family. Trained in rhetoric but drawn irresistibly to poetry. 'Whatever I tried to say came out in verse.'"},{n:"Tomis",lat:44.18,lng:28.63,info:"Exiled here on the Black Sea until death.",wiki:"Modern Constanța, Romania. A remote, non-Latin-speaking frontier town. Ovid spent his last decade writing letters of despair (Tristia, Epistulae ex Ponto) begging to return. He never did. 400 medieval manuscripts of Metamorphoses survive — testament to the work's power."}],paths:[[42.05,13.93,41.9,12.5,"Young Ovid comes to Rome"],[41.9,12.5,44.18,28.63,"Augustus banishes Ovid to Tomis, 8 AD","'Carmen et error' — the exact crime remains unknown."]],facts:["15 books, 250 myths","Exiled by Augustus","400 medieval manuscripts survive"]},
{id:"cul4",cat:"culture",name:"Roman Theatre",y1:-240,y2:400,desc:"Plautus, Terence, and Seneca — comedy and tragedy that shaped Western drama.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Theatre of Pompey: first permanent stone theatre.",wiki:"Romans initially banned permanent theatres as morally corrupting. Pompey circumvented the law in 55 BC by building a temple atop the seating. The resulting Theatre of Pompey seated 20,000 — and was where Caesar was assassinated."},{n:"Orange",lat:44.14,lng:4.81,info:"Best-preserved Roman theatre in the world.",wiki:"Built under Augustus in southern Gaul. The 37m-high stage wall survives intact — Louis XIV called it 'the finest wall in my kingdom.' Seated 9,000. Still hosts opera performances."},{n:"Aspendos",lat:36.94,lng:31.17,info:"Remarkably intact theatre in Turkey.",wiki:"Built 155 AD. Seats 15,000. Acoustics so perfect that a coin dropped on stage can be heard in the top row. Survives because Seljuk Turks used it as a caravanserai."}],paths:[[41.9,12.5,44.14,4.81,"Roman theatre reaches Gaul"],[41.9,12.5,36.94,31.17,"Theatre culture spreads to Asia Minor"]],facts:["Plautus: 130+ plays attributed","Theatre of Orange: best-preserved","Inspired Shakespeare and Moliere"]},
{id:"cul5",cat:"culture",name:"Saturnalia",y1:-500,y2:400,desc:"Rome's greatest festival — role reversals, gift-giving, and carnival for a week in December.",locs:[{n:"Temple of Saturn",lat:41.893,lng:12.484,info:"Festival began with sacrifice here.",wiki:"Saturnalia honored Saturn, god of seed and sowing. December 17-23: businesses closed, courts shut, schools cancelled. A public banquet and sacrifice at the Temple of Saturn launched the festivities. Gambling was legal. A 'King of Saturnalia' was elected to give absurd orders."},{n:"Rome",lat:41.9,lng:12.5,info:"The entire city celebrated.",wiki:"Masters served their slaves at dinner. Gift-giving (especially wax candles and small figurines called sigillaria) was customary. Catullus called it 'the best of days.' Seneca complained you couldn't escape the noise. Many scholars see it as a precursor to Christmas celebrations."}],paths:[],facts:["December 17-23","Masters served slaves","Influenced Christmas traditions"]},
{id:"cul6",cat:"culture",name:"Roman Mosaics & Art",y1:-200,y2:400,desc:"From the Alexander Mosaic to Piazza Armerina — millions of tesserae told Rome's stories.",locs:[{n:"Pompeii",lat:40.75,lng:14.49,info:"Alexander Mosaic: 1.5 million tesserae.",wiki:"The Alexander Mosaic from the House of the Faun depicts Alexander the Great charging Darius III at Issus. Made of 1.5 million tiny colored stone pieces. Pompeii's frescoes — preserved under volcanic ash — provide our best window into Roman daily life, from garden scenes to erotic art."},{n:"Rome",lat:41.9,lng:12.5,info:"Portrait busts captured individual character.",wiki:"Roman art broke from Greek idealism to embrace verismo — 'warts and all' realism. Portrait busts of aging senators with wrinkles and bald spots were marks of honor, showing a life of service."},{n:"Piazza Armerina",lat:37.36,lng:14.37,info:"3,500 m² of late Roman mosaics.",wiki:"Villa Romana del Casale in Sicily contains the most extensive collection of Roman mosaics in the world. 3,500 m² of floors depicting hunting scenes, mythological tales, and the famous 'Bikini Girls' — female athletes in two-piece outfits."}],paths:[[41.9,12.5,40.75,14.49,"Finest mosaics at Pompeii"],[41.9,12.5,37.36,14.37,"Late Roman masterpiece in Sicily"]],facts:["Alexander Mosaic: 1.5 million tesserae","Pompeii frescoes preserved under ash","Piazza Armerina: 3,500 m² of mosaics"]},
{id:"cul7",cat:"culture",name:"Latin Language & the Alphabet",y1:-700,y2:476,desc:"From regional Italian dialect to lingua franca of the Mediterranean — spawned five modern languages.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Latin became the language of law, literature, and empire.",wiki:"Latin evolved from a dialect of Latium into the Mediterranean's lingua franca. Classical Latin (Cicero, Virgil) gave way to Vulgar Latin — the spoken language of soldiers, traders, and colonists — which fragmented into French, Spanish, Italian, Portuguese, and Romanian."},{n:"Latium",lat:41.6,lng:12.9,info:"Birthplace of the Latin language.",wiki:"The region south of the Tiber where Latin originated. The Latin alphabet, adapted from the Etruscan script (itself from Greek), became the world's most widely used writing system. 26 letters now used by over 3 billion people."}],paths:[],facts:["Spawned French, Spanish, Italian, Portuguese, Romanian","Latin alphabet used by 3+ billion","Language of the Catholic Church for 1,500 years"]},
{id:"cul8",cat:"culture",name:"Horace & Roman Poetry",y1:-65,y2:-8,desc:"'Carpe diem' — Satires, Odes, and Epistles that defined the Augustan golden age.",locs:[{n:"Venusia",lat:40.96,lng:15.99,info:"Born 65 BC — modern Venosa.",wiki:"Son of a freedman (former slave) who invested everything in his son's education. Fought on the losing side at Philippi with Brutus. Poverty and poetry brought him to Maecenas' circle."},{n:"Rome",lat:41.9,lng:12.5,info:"Augustus' poet laureate alongside Virgil.",wiki:"Horace's Satires mocked Roman society with gentle wit. His Odes perfected Latin lyric poetry. 'Carpe diem, quam minimum credula postero' — seize the day, trusting as little as possible in tomorrow. His Ars Poetica influenced literary criticism for 2,000 years."},{n:"Tibur",lat:41.96,lng:12.8,info:"Horace's beloved Sabine farm — gift from Maecenas.",wiki:"Modern Tivoli area. Maecenas gave Horace a farm in the Sabine Hills. The grateful poet wrote some of his finest work here, celebrating the simple rural life. 'This is what I prayed for: a piece of land not too large.'"}],paths:[[40.96,15.99,41.9,12.5,"Freedman's son comes to Rome"],[41.9,12.5,41.96,12.8,"Retreats to his Sabine farm"]],facts:["'Carpe diem'","Son of a freedman","Ars Poetica influenced 2,000 years of criticism"]},
{id:"cul9",cat:"culture",name:"Tacitus & Roman Historiography",y1:56,y2:120,desc:"Annals, Histories, Germania — 'They create a desert and call it peace.'",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Senator, consul, and Rome's greatest historian.",wiki:"Publius Cornelius Tacitus was a senator and consul who wrote the two greatest works of Roman history. The Annals covers the Julio-Claudian emperors (14-68 AD); the Histories covers the Year of Four Emperors through the Flavians (69-96 AD). His prose is compressed, sardonic, and devastating. He saw moral corruption as inseparable from absolute power: 'The more corrupt the state, the more numerous the laws.' His Germania is the most detailed ancient account of the Germanic peoples — used and misused by later generations."},{n:"Germania",lat:51.0,lng:9.0,info:"Subject of Tacitus' ethnographic work.",wiki:"Tacitus' Germania (98 AD) described Germanic customs, warfare, and society. He contrasted Germanic 'noble savagery' with Roman decadence — partly as social criticism. The work was later misappropriated for nationalist purposes, but remains an invaluable ethnographic source."}],paths:[[41.9,12.5,51.0,9.0,"Tacitus describes the Germanic world"]],facts:["'They create a desert and call it peace'","'The more corrupt the state, the more laws'","Germania: invaluable ethnographic source"]},
{id:"cul10",cat:"culture",name:"Juvenal & Roman Satire",y1:55,y2:130,desc:"'Bread and circuses.' 'Who watches the watchmen?' Biting social commentary as a uniquely Roman art form.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Wrote 16 Satires attacking Roman society.",wiki:"Decimus Junius Juvenalis perfected verse satire — a genre the Romans themselves considered uniquely their own ('satura tota nostra est' — Quintilian). His 16 Satires attack every level of Roman society: greedy patrons, pretentious freedmen, corrupt officials, dangerous streets, and the moral decay of the elite. 'Panem et circenses' (bread and circuses) — his phrase for how rulers distract the masses — remains one of the most quoted Latin phrases. 'Quis custodiet ipsos custodes?' (Who watches the watchmen?) inspired works from Alan Moore to constitutional law."},{n:"Aquinum",lat:41.49,lng:13.69,info:"Juvenal's probable birthplace — modern Aquino.",wiki:"Juvenal likely came from Aquinum in Latium. Little is known of his life — he may have been exiled to Egypt. His Satires were popular in the Middle Ages and Renaissance, influencing Pope, Swift, and Johnson."}],paths:[[41.49,13.69,41.9,12.5,"From Aquinum to Rome's literary scene"]],facts:["'Panem et circenses' — bread and circuses","'Quis custodiet ipsos custodes?'","Satire: 'wholly our own' — Quintilian"]},
{id:"cul11",cat:"culture",name:"Livy & Ab Urbe Condita",y1:-59,y2:17,desc:"142 books from Rome's founding to his own time — foundation myths, moral exempla, and national pride. Only 35 survive.",locs:[{n:"Padua",lat:45.41,lng:11.88,info:"Livy's birthplace (Patavium).",wiki:"Titus Livius (59 BC – 17 AD) was born in Padua, a conservative city famous for moral rectitude — Asinius Pollio teased Livy for his 'Patavinity.' He spent most of his life in Rome writing Ab Urbe Condita Libri (Books from the Foundation of the City) — 142 books covering 753 BC to 9 BC. Only 35 survive complete."},{n:"Rome",lat:41.9,lng:12.5,info:"Livy spent decades researching in Rome.",wiki:"Livy's history gave Rome its national story: Romulus and Remus, the rape of the Sabine women, Horatius on the bridge, the Gauls sacking Rome, Hannibal at the gates. His purpose was moral: Rome's greatness came from virtus (courage), pietas (duty), and fides (honor). Augustus was a personal friend."}],paths:[[45.41,11.88,41.9,12.5,"From Padua to Rome: Livy's literary career"]],facts:["142 books — only 35 survive","Foundation myths of Rome","Augustus' personal friend"]},
{id:"cul12",cat:"culture",name:"Roman Libraries",y1:-39,y2:400,desc:"From Asinius Pollio's first public library to Trajan's Bibliotheca Ulpia — Rome's temples of knowledge.",locs:[{n:"Rome/Forum of Trajan",lat:41.896,lng:12.484,info:"Bibliotheca Ulpia — the greatest Roman library.",wiki:"Trajan's Forum contained the Bibliotheca Ulpia (112 AD) — twin halls of Greek and Latin literature flanking Trajan's Column. Roman public libraries held papyrus scrolls in wooden armaria (cupboards) with reading rooms. At its height, Rome had 28 public libraries. Asinius Pollio founded the first in 39 BC."},{n:"Ephesus/Library of Celsus",lat:37.94,lng:27.34,info:"Spectacular facade of Celsus library survives.",wiki:"The Library of Celsus at Ephesus was built 117 AD as a monumental tomb and library. Its two-story facade — with statues of Wisdom, Knowledge, Intelligence, and Excellence — is among the most photographed Roman ruins. It held 12,000 scrolls. The building combined library and mausoleum: Celsus was buried beneath the reading room."}],paths:[[41.896,12.484,37.94,27.34,"Roman libraries across the empire"]],facts:["Rome had 28 public libraries","Bibliotheca Ulpia: twin Greek and Latin halls","Library of Celsus held 12,000 scrolls"]},
{id:"cul13",cat:"culture",name:"Lucretius & De Rerum Natura",y1:-99,y2:-55,desc:"Epicurean poem on the nature of the universe — atomic theory 1,800 years before Dalton.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Written in the final decades of the Republic.",wiki:"Titus Lucretius Carus wrote De Rerum Natura (On the Nature of Things) around 55 BC — a 7,400-line poem explaining Epicurean physics. He argued that everything consists of atoms and void, that the soul is mortal, that the gods don't intervene in nature, and that nothing comes from nothing. The poem was lost for centuries until Poggio Bracciolini rediscovered a manuscript in 1417 — an event that helped trigger the Renaissance and the Scientific Revolution."}],paths:[],facts:["Atomic theory 1,800 years before Dalton","'Nothing comes from nothing'","Rediscovered in 1417, helped trigger the Renaissance"]},
{id:"cul14",cat:"culture",name:"Martial & Roman Epigram",y1:40,y2:104,desc:"1,500+ witty, bawdy epigrams — the best source for street-level Roman life.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Martial lived and wrote in Rome for 34 years.",wiki:"Marcus Valerius Martialis wrote over 1,500 epigrams between about 86-103 AD. They are short, sharp, and often obscene — satirizing everything from bad poets and dinner parasites to client-patron humiliations and sexual mores. They provide an unmatched window into everyday Roman life: barbershops, taverns, gladiatorial games, apartment blocks, dawn salutations, and the exhausting social calendar of a client."},{n:"Bilbilis",lat:41.38,lng:-1.6,info:"Martial's birthplace in Spain.",wiki:"Martial was born in Bilbilis (modern Calatayud) in Spain. He moved to Rome around age 24, spending 34 years as a literary client seeking patronage. He retired to Spain in old age, writing that he missed Rome terribly. Pliny the Younger paid for his journey home."}],paths:[[41.38,-1.6,41.9,12.5,"From Bilbilis to Rome: Martial's 34-year literary career"]],facts:["1,500+ epigrams — many obscene","Best source for street-level Roman life","Pliny paid for his retirement journey to Spain"]},
{id:"cul15",cat:"culture",name:"Roman Music & Performance",y1:-300,y2:400,desc:"Tibia, lyre, and hydraulis (water organ) — music at games, banquets, funerals, theater, and religious rites.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Music pervaded Roman public and private life.",wiki:"Music was essential to Roman life: tibiae (double-pipes) accompanied sacrifices and funerals, lyres played at banquets, brass instruments (tubae, cornua) sounded in the army and arena. The hydraulis (water organ) was the most impressive instrument — Nero was famously obsessed with performing. Actors and musicians had ambiguous social status: admired but legally infames (disgraced)."},{n:"Pompeii",lat:40.75,lng:14.49,info:"Musical instruments and frescoes preserved here.",wiki:"Pompeii preserved actual musical instruments and frescoes depicting performances. A pair of tibiae, a sistrum (Egyptian rattle), and bronze cymbals were found. Frescoes show musicians at banquets and in theatrical performances. Graffiti name favorite performers. The amphitheater hosted music alongside gladiatorial games."}],paths:[],facts:["Hydraulis (water organ): most complex ancient instrument","Nero was obsessed with performing","Musicians were admired but legally 'disgraced'"]},
{id:"cul16",cat:"culture",name:"Catullus & Love Poetry",y1:-84,y2:-54,desc:"Passionate, personal poems to 'Lesbia' — invented Latin love elegy. 'Let us live and love.' Influenced all Western poetry.",locs:[{n:"Verona",lat:45.44,lng:10.99,info:"Catullus' birthplace — he came from a wealthy family.",wiki:"Gaius Valerius Catullus was born in Verona around 84 BC to a family wealthy enough to host Julius Caesar. He moved to Rome as a young man and fell passionately in love with a woman he called 'Lesbia' — probably Clodia Metelli, a notorious aristocratic beauty. His 116 surviving poems revolutionized Latin literature: intensely personal, emotionally raw, technically brilliant. 'Vivamus, mea Lesbia, atque amemus' (Let us live and love, my Lesbia) became the most famous love poem in Latin."},{n:"Rome",lat:41.9,lng:12.5,info:"Where Catullus loved, wrote, and suffered.",wiki:"Catullus' poems chart an entire love affair: ecstatic passion, jealousy, betrayal, and bitter hatred. 'Odi et amo' (I hate and I love — why do I do it? I don't know, but I feel it and am tormented) may be the most famous couplet in Western literature. He died around 54 BC, barely 30 years old. His influence on Ovid, Horace, Petrarch, and all subsequent love poetry is incalculable."}],paths:[[45.44,10.99,41.9,12.5,"From Verona to Rome: Catullus' literary life"]],facts:["'Odi et amo' — most famous Latin couplet","Died at barely 30 years old","Influenced all subsequent Western love poetry"]},
{id:"cul17",cat:"culture",name:"Pliny the Younger's Letters",y1:61,y2:113,desc:"247 letters — eyewitness to Vesuvius, Trajan correspondence, daily elite life. Best source for imperial social history.",locs:[{n:"Como",lat:45.81,lng:9.08,info:"Pliny's birthplace — modern Como.",wiki:"Gaius Plinius Caecilius Secundus (Pliny the Younger) was born in Comum (Como) in 61 AD, nephew and adopted son of Pliny the Elder. His 247 surviving letters, carefully selected for publication, cover every aspect of upper-class Roman life: dinner parties, legal cases, estate management, ghost stories, and the governance of Bithynia-Pontus."},{n:"Rome",lat:41.9,lng:12.5,info:"Pliny served as senator, consul, and advocate.",wiki:"Pliny's letters include his correspondence with Emperor Trajan on governing Bithynia — including the famous exchange about how to treat Christians (Trajan: don't seek them out, but punish them if denounced and they refuse to recant). His letter describing the eruption of Vesuvius, the death of his uncle, and his own escape from Misenum is the most detailed ancient eyewitness account of a natural disaster."},{n:"Misenum",lat:40.79,lng:14.08,info:"17-year-old Pliny witnessed Vesuvius from here.",wiki:"In August 79 AD, 17-year-old Pliny watched Vesuvius erupt from Misenum, 30 km away. His uncle Pliny the Elder sailed toward the eruption to investigate and rescue friends — and died. The younger Pliny's two letters to Tacitus describing the event are so important that volcanologists call certain eruption types 'Plinian.'"}],paths:[[45.81,9.08,41.9,12.5,"From Como to Rome"],[41.9,12.5,40.79,14.08,"Eyewitness at Misenum"]],facts:["247 letters: best source for elite Roman life","Eyewitness account of Vesuvius","'Plinian' eruption type named after his uncle"]},
{id:"cul18",cat:"culture",name:"Roman Wall Painting (Four Styles)",y1:-200,y2:79,desc:"Incrustation, Architectural, Ornate, Intricate — Pompeii preserves the full evolution. Influenced Renaissance art.",locs:[{n:"Pompeii",lat:40.75,lng:14.49,info:"Preserves all four styles — the richest collection in the world.",wiki:"Roman wall painting is categorized into four Pompeian Styles. Style I (Incrustation, 200-80 BC): painted plaster imitating marble panels. Style II (Architectural, 80-20 BC): illusionistic architecture creating depth — the Villa of Mysteries' Bacchic frieze is the masterpiece. Style III (Ornate, 20 BC-20 AD): delicate, ornamental panels with central mythological scenes. Style IV (Intricate, 20-79 AD): theatrical fantasy combining all previous styles. When Renaissance artists crawled into the buried Domus Aurea, they discovered Style IV and called the designs 'grotesques' — revolutionizing European decorative art."},{n:"Rome",lat:41.9,lng:12.5,info:"Villa of Livia and the Domus Aurea preserve key examples.",wiki:"Rome preserves important wall paintings outside Pompeii. The Villa of Livia at Prima Porta has a famous garden room — an illusionistic painting of trees, birds, and flowers covering all four walls, creating the impression of standing in a garden. The Domus Aurea's Style IV decorations inspired Raphael's Vatican loggia designs."}],paths:[],facts:["Four Pompeian Styles span 200 years","'Grotesque' comes from Domus Aurea discoveries","Villa of Mysteries: greatest surviving ancient fresco"]},
{id:"cul19",cat:"culture",name:"Apuleius & The Golden Ass",y1:125,y2:180,desc:"Only complete Latin novel surviving — Lucius transformed into a donkey. Picaresque, bawdy, philosophical. Contains Cupid & Psyche.",locs:[{n:"Madauros",lat:36.38,lng:8.06,info:"Apuleius' birthplace in North Africa (modern M'Daourouch, Algeria).",wiki:"Lucius Apuleius was born around 125 AD in Madauros, Numidia (modern Algeria). Educated at Carthage and Athens, he was a polymath who wrote on philosophy, rhetoric, and natural history. He was famously tried for winning his wealthy wife's affections through magic (Apologia) — and acquitted."},{n:"Carthage",lat:36.85,lng:10.33,info:"Apuleius studied and taught here.",wiki:"Apuleius studied and later taught in Carthage — the intellectual capital of Roman Africa. The Metamorphoses (The Golden Ass) is the only complete Latin novel to survive. It tells of Lucius, accidentally transformed into a donkey, wandering through a picaresque world of bandits, witches, and lovers before being saved by the goddess Isis. Embedded within it is the fairy tale of Cupid and Psyche — one of the most retold stories in Western culture."},{n:"Rome",lat:41.9,lng:12.5,info:"The novel's literary influence reached Rome and beyond.",wiki:"The Golden Ass influenced Boccaccio's Decameron, Cervantes' Don Quixote, and Shakespeare's A Midsummer Night's Dream (Bottom's transformation). The tale of Cupid and Psyche has been illustrated by Canova, Raphael, and countless others."}],paths:[[36.38,8.06,36.85,10.33,"From Madauros to Carthage"],[36.85,10.33,41.9,12.5,"Literary influence reaches Rome"]],facts:["Only complete Latin novel surviving","Contains the tale of Cupid and Psyche","Tried for magic — and acquitted"]},
{id:"cul20",cat:"culture",name:"Roman Sculpture & Portraiture",y1:-500,y2:400,desc:"Veristic Republican portraits (warts and all), idealized Augustan classicism, equestrian Marcus Aurelius. Rome's visual identity.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Center of Roman sculptural production.",wiki:"Roman sculpture evolved through distinct phases. Republican verism (3rd-1st century BC) produced brutally honest portraits — wrinkled, scarred, balding heads that emphasized the Roman values of age and experience. Augustus revolutionized portraiture with idealized classicism — his Prima Porta statue, modeled on Greek originals, shows an eternally youthful emperor. Imperial portraits became propaganda. The equestrian statue of Marcus Aurelius (Capitoline Museums) survived because it was mistaken for Constantine. It inspired Donatello's Gattamelata and Verrocchio's Colleoni."},{n:"Pompeii",lat:40.75,lng:14.49,info:"Preserved bronze and marble sculpture in domestic contexts.",wiki:"Pompeii preserved sculpture in context — from the elegant Dancing Faun of the House of the Faun to garden herms and portrait busts. The Alexander Mosaic (technically opus vermiculatum, not sculpture) is among the most famous artworks of antiquity."}],paths:[],facts:["Republican verism: 'warts and all' portraiture","Marcus Aurelius equestrian: survived as 'Constantine'","Inspired Donatello and Verrocchio"]},
// RELIGION
{id:"rel1",cat:"religion",name:"Rise of Christianity",y1:30,y2:380,desc:"From Jewish sect to official religion in 350 years.",locs:[{n:"Jerusalem",lat:31.78,lng:35.23,info:"Jesus crucified ~30 AD.",wiki:"Christianity began with Jesus. Paul expanded it to Gentiles."},{n:"Antioch",lat:36.2,lng:36.15,info:"First called 'Christians' here.",wiki:"Crucial early center of the faith."},{n:"Rome",lat:41.9,lng:12.5,info:"Peter and Paul martyred here.",wiki:"Constantine legalized 313. Theodosius made official 380."}],paths:[[31.78,35.23,36.2,36.15,"Paul spreads the Gospel"],[36.2,36.15,41.9,12.5,"Christianity reaches Rome"]],facts:["Legalized 313","Official 380","Sect to state religion"]},
{id:"rel2",cat:"religion",name:"Roman Pantheon & State Religion",y1:-753,y2:380,desc:"Jupiter, Mars, Venus — the Capitoline Triad and state rituals that bound Rome together.",locs:[{n:"Capitoline Hill",lat:41.893,lng:12.483,info:"Temple of Jupiter Optimus Maximus.",wiki:"The most sacred site in Rome. Temple of Jupiter Optimus Maximus crowned the hill from 509 BC. Rebuilt three times after fires. Generals ended triumphs here. The Capitoline Triad — Jupiter, Juno, and Minerva — embodied Roman state power."},{n:"Rome",lat:41.9,lng:12.5,info:"Augurs, flamines, and pontiffs maintained the pax deorum.",wiki:"Roman religion was transactional: perform correct rituals, receive divine favor (pax deorum). Augurs read bird flights before any major decision. The pontifex maximus oversaw all religious matters. Every aspect of public life — wars, elections, building — required divine consultation."},{n:"Delphi",lat:38.48,lng:22.5,info:"Romans consulted the Greek oracle too.",wiki:"Rome respected and absorbed foreign gods. The Sibylline Books (Greek prophecies) were consulted in emergencies. This syncretism — absorbing Isis, Mithras, Cybele — was uniquely Roman."}],paths:[[41.9,12.5,38.48,22.5,"Romans adopt Greek religious traditions"]],facts:["Capitoline Triad: Jupiter, Juno, Minerva","Augurs read bird flights","Temple of Jupiter rebuilt 3 times"]},
{id:"rel3",cat:"religion",name:"Vestal Virgins",y1:-700,y2:394,desc:"Sacred fire of Vesta — 30-year service, extraordinary privileges, and terrifying punishments.",locs:[{n:"Temple of Vesta",lat:41.892,lng:12.486,info:"Circular temple in the Forum — sacred fire never extinguished.",wiki:"Six priestesses tended Vesta's eternal flame, symbolizing Rome's survival. Chosen between ages 6-10 from noble families. Served 30 years of chastity: 10 learning, 10 performing, 10 teaching. If the fire went out, the responsible Vestal was whipped. If she broke her vow of chastity, she was buried alive in an underground chamber with a small lamp and food — a 'bloodless death.'"},{n:"Rome",lat:41.9,lng:12.5,info:"Vestals had extraordinary rights for Roman women.",wiki:"Vestals were emancipated from paternal authority — unique for Roman women. They could own property, make wills, and vote. They rode in carriages, sat in reserved seats at games, and any man who harmed a Vestal was executed. The cult lasted over 1,000 years until Theodosius I banned pagan worship in 394 AD."}],paths:[],facts:["30 years of service","Chosen age 6-10","Breaking chastity = buried alive"]},
{id:"rel4",cat:"religion",name:"Mystery Cults: Mithraism",y1:100,y2:400,desc:"Underground bull-slaying rites — the soldiers' cult that rivaled Christianity.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Dozens of mithraea found under the city.",wiki:"Mithraism was a mystery religion centered on the god Mithras slaying a cosmic bull. Popular from the 1st to 4th centuries AD, especially among soldiers and merchants. Over 1,000 inscriptions and 700 bull-slaying depictions survive. Seven grades of initiation: Corax (Raven), Nymphus, Miles (Soldier), Leo, Perses, Heliodromus, and Pater."},{n:"Ostia",lat:41.76,lng:12.29,info:"18 mithraea found — highest concentration anywhere.",wiki:"Rome's port city had more Mithraic temples than any other. Members shared ritual meals in underground rooms designed to resemble caves, recreating the primordial cavern where Mithras slew the bull."},{n:"Carnuntum",lat:48.11,lng:16.86,info:"Major military cult center on the Danube.",wiki:"The cult was especially popular on military frontiers. Carnuntum's mithraeum has been reconstructed. In 308 AD, emperors met here and sacrificed to Mithras — one of the cult's last official acts before Christian suppression."}],paths:[[41.9,12.5,41.76,12.29,"Mithraism thrives at Rome's port"],[41.9,12.5,48.11,16.86,"Soldiers carry the cult to the frontiers"]],facts:["1,000+ inscriptions found","700 bull-slaying depictions","Seven grades of initiation"]},
{id:"rel5",cat:"religion",name:"Great Persecution & Edict of Milan",y1:303,y2:313,desc:"Diocletian's last, worst persecution of Christians — ended by Constantine's legalization.",locs:[{n:"Nicomedia",lat:40.76,lng:29.92,info:"Persecution began here February 23, 303 AD.",wiki:"Diocletian's first edict was posted on the church wall opposite his palace. Soldiers demolished the church, burned scriptures, and stripped Christians of legal rights. Later edicts demanded universal sacrifice to Roman gods. Persecution was fiercest in the East."},{n:"Rome",lat:41.9,lng:12.5,info:"Martyrdoms created saints still venerated today.",wiki:"In Rome and Africa, Christians were imprisoned, tortured, and executed. Churches were destroyed and property confiscated. But persecution backfired — martyrdom inspired converts. Tertullian's phrase proved prophetic: 'The blood of the martyrs is the seed of the Church.'"},{n:"Mediolanum",lat:45.46,lng:9.19,info:"Edict of Milan ended persecution, 313 AD.",wiki:"Constantine and Licinius agreed to religious tolerance. Christianity was legalized. Confiscated property was returned. Within 67 years, Theodosius would make Christianity the empire's only legal religion."}],paths:[[40.76,29.92,41.9,12.5,"Persecution spreads from East to West"],[41.9,12.5,45.46,9.19,"Constantine ends persecution at Milan"]],facts:["Last and worst persecution","Churches destroyed, scriptures burned","Ended by Edict of Milan 313"]},
{id:"rel6",cat:"religion",name:"Stoic Philosophy",y1:-300,y2:180,desc:"From Zeno's porch to Marcus Aurelius' tent — virtue as the only good.",locs:[{n:"Athens",lat:37.975,lng:23.723,info:"Stoa Poikile — where Stoicism was born.",wiki:"Zeno of Citium began teaching at the Stoa Poikile (Painted Porch) in Athens around 300 BC. The philosophy taught that virtue is the only true good, emotions come from false judgments, and we should focus on what we can control. It became Rome's dominant philosophy."},{n:"Rome",lat:41.9,lng:12.5,info:"Seneca, Epictetus, and Marcus Aurelius made it Roman.",wiki:"Stoicism was adapted for Roman practical temperament. Seneca — Nero's tutor — wrote essays on anger, mercy, and the shortness of life. Epictetus — born a slave — taught that freedom is found in accepting what you cannot change. Marcus Aurelius — emperor of the world — wrote the Meditations in his campaign tent."},{n:"Nicopolis",lat:38.96,lng:20.72,info:"Where Epictetus taught after exile from Rome.",wiki:"Epictetus, born a slave in Hierapolis, was exiled from Rome by Domitian. He established a school at Nicopolis in Greece. His student Arrian recorded his teachings as the Discourses and Enchiridion — manuals for living that remain in print 1,900 years later."}],paths:[[37.975,23.723,41.9,12.5,"Stoicism travels from Athens to Rome"],[41.9,12.5,38.96,20.72,"Epictetus exiled to Nicopolis"]],facts:["Zeno, Seneca, Epictetus, Marcus Aurelius","'What is up to us' vs 'what is not'","Most influential ancient philosophy today"]},
{id:"rel7",cat:"religion",name:"Imperial Cult & Deification",y1:-42,y2:395,desc:"Divus Julius to Theodosius — worshipping the emperor as a god.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Temple of Divus Julius in the Forum.",wiki:"Julius Caesar was the first Roman deified by the Senate (42 BC). Augustus built a temple at Caesar's cremation site. Living emperors were not worshipped in Rome itself, but in the eastern provinces divine honors were offered freely. Refusing to sacrifice to the emperor's genius became the legal basis for persecuting Christians."},{n:"Ephesus",lat:37.94,lng:27.34,info:"Temple of Hadrian — provincial emperor worship.",wiki:"Eastern cities competed to build temples to the emperors. Ephesus won the title 'neokoros' (temple warden) for its emperor cult temples. The Temple of Hadrian on Curetes Street survives with its elegant arch."},{n:"Pergamon",lat:39.13,lng:27.18,info:"Trajan's temple on the acropolis.",wiki:"Pergamon's acropolis held a massive temple to Trajan and Zeus. The city was among the first to receive permission to build an imperial cult temple. The Book of Revelation may refer to Pergamon's altar as 'Satan's throne.'"}],paths:[[41.9,12.5,37.94,27.34,"Imperial cult spreads east"],[41.9,12.5,39.13,27.18,"Pergamon builds emperor temples"]],facts:["Julius Caesar: first deified Roman","Refusal to sacrifice = treason","Christians persecuted for refusing"]},
{id:"rel8",cat:"religion",name:"Cult of Isis",y1:-80,y2:380,desc:"Egyptian goddess adopted by Rome — mystery rites, initiation, and a devoted following across the empire.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Iseum Campense — major Isis temple in the Campus Martius.",wiki:"The worship of Isis spread from Egypt to Rome by the 1st century BC. The cult offered what traditional Roman religion lacked: personal salvation, an afterlife, emotional rituals, and a compassionate goddess. Initiates underwent dramatic ceremonies described by Apuleius in The Golden Ass. The Senate repeatedly banned the cult (58, 53, 48 BC) but it kept returning. After Augustus, it was officially tolerated. The Iseum Campense in Rome was one of the city's grandest temples."},{n:"Pompeii",lat:40.75,lng:14.49,info:"Temple of Isis — one of the first buildings excavated.",wiki:"Pompeii's Temple of Isis, excavated in 1764, was one of the first ancient buildings to be uncovered. The cult was so popular that the temple was rebuilt at private expense after the earthquake of 62 AD — before many public buildings were repaired."},{n:"Philae",lat:24.02,lng:32.88,info:"Last pagan temple in the Roman world — closed 537 AD.",wiki:"The Temple of Isis at Philae in Upper Egypt was the last functioning pagan temple in the Roman world. Justinian's general Narses closed it in 537 AD — over 150 years after Theodosius banned pagan worship. Nubian priests had continued the rites by special treaty."}],paths:[[31.2,29.9,41.9,12.5,"Isis worship spreads from Egypt to Rome"],[41.9,12.5,40.75,14.49,"Cult thrives at Pompeii"]],facts:["Senate banned the cult repeatedly — it kept returning","Apuleius described initiation in The Golden Ass","Philae: last pagan temple, closed 537 AD"]},
{id:"rel9",cat:"religion",name:"Council of Nicaea",y1:325,y2:325,desc:"First ecumenical council — 318 bishops defined Christian orthodoxy under Constantine's watchful eye.",locs:[{n:"Nicaea",lat:40.43,lng:29.72,info:"Modern Iznik, Turkey.",wiki:"Constantine convened the first ecumenical council at Nicaea in June 325 AD. Approximately 318 bishops attended — almost all from the eastern empire. The central debate: was Christ of the same substance (homoousios) as God the Father, or a created being? Arius of Alexandria argued Christ was created; Athanasius argued he was co-eternal with the Father. The council sided with Athanasius, producing the Nicene Creed that remains the foundational statement of Christian faith. The council also set the date of Easter and established rules for church governance."},{n:"Constantinople",lat:41.0,lng:29.0,info:"Constantine presided from his new capital.",wiki:"Constantine, though not yet baptized, presided over the opening session in imperial purple. He sought unity for political reasons — a divided church threatened imperial stability. The Nicene Creed he helped forge is still recited by over 2 billion Christians today."}],paths:[[41.0,29.0,40.43,29.72,"Constantine convenes the bishops at Nicaea"]],facts:["318 bishops attended","Nicene Creed: foundational Christian statement","Set the date of Easter"]},
{id:"rel10",cat:"religion",name:"Judaism in the Roman Empire",y1:-63,y2:476,desc:"From Temple worship to diaspora — religio licita, three revolts, and synagogues across the empire.",locs:[{n:"Jerusalem",lat:31.78,lng:35.23,info:"Temple destroyed 70 AD. Jews banned after 135 AD.",wiki:"Pompey conquered Jerusalem in 63 BC. Judaism held a unique legal status as a religio licita (permitted religion) — Jews were exempt from emperor worship and military service. The Temple was the center of Jewish life until Titus destroyed it in 70 AD. After the Bar Kokhba revolt (132-136), Hadrian banned Jews from Jerusalem entirely and renamed the province Syria Palaestina."},{n:"Rome",lat:41.9,lng:12.5,info:"Trastevere: heart of Rome's Jewish community.",wiki:"Rome's Jewish community — one of the oldest in Europe — was centered in Trastevere. At its peak, 40,000-50,000 Jews lived in Rome. Six synagogues are known from inscriptions. Jews were expelled by Claudius (~49 AD) but returned. Relations fluctuated between tolerance and persecution."},{n:"Sardis",lat:38.49,lng:28.04,info:"Largest known ancient synagogue — inside a Roman gymnasium.",wiki:"The synagogue at Sardis in Turkey is the largest known from antiquity — 60 meters long, lavishly decorated with mosaics and marble. Remarkably, it was built inside the city's Roman gymnasium complex, suggesting high social integration. Over 80 Jewish donor inscriptions survive, including city councillors."}],paths:[[31.78,35.23,41.9,12.5,"Jewish diaspora reaches Rome"],[41.9,12.5,38.49,28.04,"Synagogues across the empire"]],facts:["Religio licita: legal protected status","40,000-50,000 Jews in Rome","Sardis synagogue: largest known, 60m long"]},
{id:"rel11",cat:"religion",name:"Cult of Cybele (Magna Mater)",y1:-204,y2:400,desc:"First eastern cult officially adopted by Rome — the Great Mother arrived during the Punic Wars.",locs:[{n:"Rome/Palatine Temple",lat:41.889,lng:12.487,info:"Temple of Magna Mater on the Palatine Hill.",wiki:"In 204 BC, during the darkest days of the Second Punic War, Rome brought the sacred black stone of Cybele from Pessinus in Asia Minor to the Palatine Hill. The Sibylline Books had prophesied that the Great Mother's presence would drive Hannibal from Italy. Her ecstatic cult — with self-castrating Galli priests, drums, cymbals, and the taurobolium (ritual drenching in bull's blood) — shocked Roman sensibilities but was too powerful to ban."},{n:"Pessinus",lat:39.38,lng:31.4,info:"Original cult center in Asia Minor (modern Turkey).",wiki:"Pessinus was the original cult center of Cybele in Phrygia. The sacred meteorite — an aniconic image of the goddess — was kept here until the Romans requested it in 204 BC. The city's high priest delivered the stone to Roman ambassadors, who brought it to Rome with great ceremony."}],paths:[[39.38,31.4,41.889,12.487,"Sacred stone brought from Pessinus to Rome (204 BC)"]],facts:["First eastern cult officially adopted","Self-castrating Galli priests","Taurobolium: ritual bath in bull's blood"]},
