{id:"rel12",cat:"religion",name:"Roman Augury & Divination",y1:-753,y2:400,desc:"Augurs read bird flights, haruspices read entrails, Sibylline Books consulted in crises — no major decision without divine approval.",locs:[{n:"Rome/Capitoline",lat:41.893,lng:12.483,info:"Augurs observed from the Capitoline Hill.",wiki:"Augury was fundamental to Roman public life. Augurs (one of Rome's four major priestly colleges) didn't predict the future — they determined whether the gods approved of a proposed action by observing bird flights, lightning, and other signs. Nothing significant happened without taking the auspices: elections, wars, laws. Even Julius Caesar was an augur. Cicero, himself an augur, wrote skeptically about it."},{n:"Cumae",lat:40.84,lng:14.05,info:"Home of the Sibyl — guardian of the Sibylline Books.",wiki:"The Cumaean Sibyl, a prophetess of Apollo, guarded the Sibylline Books — a collection of oracular utterances consulted by the Senate during grave crises. The original books burned in 83 BC; replacements were compiled from oracles across the Mediterranean. They prescribed rituals like the adoption of Cybele's cult. Virgil's Fourth Eclogue channeled the Sibyl's prophecy of a golden age."}],paths:[[40.84,14.05,41.893,12.483,"Sibylline Books consulted on the Capitoline"]],facts:["Augurs didn't predict — they read divine approval","No elections, wars, or laws without auspices","Sibylline Books consulted in national crises"]},
{id:"rel13",cat:"religion",name:"Early Christian Martyrs",y1:64,y2:313,desc:"Peter crucified upside-down, Paul beheaded, Perpetua in the arena — 'the blood of martyrs is the seed of the church.'",locs:[{n:"Rome/Vatican Hill",lat:41.9,lng:12.45,info:"Tradition: Peter crucified here under Nero.",wiki:"The persecution of Christians began under Nero in 64 AD — scapegoated after the Great Fire. Peter was traditionally crucified upside-down on Vatican Hill; Paul beheaded on the Via Ostiensis. Persecutions were sporadic until Decius (250 AD) and Diocletian (303 AD) launched empire-wide campaigns. Tertullian's phrase 'the blood of martyrs is the seed of the church' (Apologeticum 50.13) proved prophetic: Christianity grew fastest during persecutions."},{n:"Carthage",lat:36.85,lng:10.33,info:"Perpetua and Felicity martyred here, 203 AD.",wiki:"Vibia Perpetua, a 22-year-old noblewoman, and her slave Felicity were executed in the Carthage arena on March 7, 203 AD. Perpetua's prison diary — one of the earliest writings by a Christian woman — describes her visions and her refusal to sacrifice for the emperor's genius. She guided the gladiator's sword to her own throat."},{n:"Lyon",lat:45.76,lng:4.84,info:"Martyrs of Lugdunum, 177 AD.",wiki:"In 177 AD, a mob attacked Christians in Lugdunum (Lyon). The governor sent them to the arena. The slave Blandina endured torture from dawn to dusk — suspended on a stake, attacked by beasts, and finally killed by a bull. The Letter of the Churches of Vienne and Lyon preserves the eyewitness account."}],paths:[[41.9,12.45,36.85,10.33,"Martyrdom from Rome to North Africa"],[41.9,12.45,45.76,4.84,"Persecution reaches Gaul"]],facts:["'Blood of martyrs is the seed of the church'","Perpetua guided the sword to her own throat","Christianity grew fastest during persecutions"]},
{id:"rel14",cat:"religion",name:"Neoplatonism",y1:200,y2:529,desc:"Plotinus, Porphyry, Proclus — the last great pagan philosophy. 'The One' emanates all reality.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Plotinus taught here from 244 AD.",wiki:"Plotinus (204-270 AD) studied in Alexandria and taught in Rome for 25 years. His Enneads — compiled by his student Porphyry — describe how all reality emanates from 'The One' through successive levels: Nous (Intellect), Soul, and Matter. The philosopher's goal is mystical return to The One. Neoplatonism profoundly influenced Augustine, who borrowed its framework for Christian theology."},{n:"Alexandria",lat:31.2,lng:29.9,info:"Plotinus studied with Ammonius Saccas here.",wiki:"Alexandria was the birthplace of Neoplatonism. Ammonius Saccas taught both Plotinus and Origen (the Christian theologian). The city's fusion of Greek philosophy, Egyptian mysticism, and Jewish theology created the intellectual conditions for Neoplatonism. Hypatia of Alexandria (died 415 AD) was the last great Neoplatonist teacher — murdered by a Christian mob."},{n:"Athens",lat:37.98,lng:23.73,info:"Neoplatonic Academy closed by Justinian, 529 AD.",wiki:"Proclus (412-485 AD) led the Neoplatonic Academy in Athens, systematizing the philosophy. In 529 AD, Emperor Justinian closed the Academy — traditionally seen as the end of ancient philosophy. The seven last philosophers fled to the Sasanian court in Persia before returning under a peace treaty."}],paths:[[31.2,29.9,41.9,12.5,"Plotinus: from Alexandria to Rome"],[37.98,23.73,41.0,29.0,"Academy closed by Justinian"]],facts:["'The One' emanates all reality","Profoundly influenced Augustine","Academy closed by Justinian in 529 AD"]},
{id:"rel15",cat:"religion",name:"Monasticism & the Desert Fathers",y1:270,y2:529,desc:"Anthony of Egypt, Pachomius' communal rules, Benedict of Nursia — ascetics who shaped medieval civilization.",locs:[{n:"Nitria/Egyptian Desert",lat:30.37,lng:30.3,info:"Thousands of monks settled in the desert communities.",wiki:"Christian monasticism began in Egypt. Anthony the Great (c. 251-356 AD) withdrew into the desert around 270 AD, battling demons and attracting followers. By 400 AD, thousands of monks lived in desert communities at Nitria, Scetis, and Kellia. Pachomius (c. 292-348) created the first communal monasteries with written rules. The Desert Fathers' sayings — direct, paradoxical, profound — influenced all subsequent Christian spirituality."},{n:"Monte Cassino",lat:41.49,lng:13.81,info:"Benedict founded his great monastery here, c. 529 AD.",wiki:"Benedict of Nursia (c. 480-547 AD) founded the monastery of Monte Cassino around 529 AD and wrote his Rule — a practical guide balancing prayer (ora), work (labora), and study. The Benedictine Rule became the standard for Western monasticism. Monks preserved classical manuscripts, maintained agriculture, and provided stability through the Dark Ages. Monte Cassino was destroyed and rebuilt four times — most recently in WWII."},{n:"Rome",lat:41.9,lng:12.5,info:"Pope Gregory I promoted Benedictine monasticism.",wiki:"Pope Gregory the Great (590-604 AD) — himself a former monk — championed Benedict's Rule. He wrote the Dialogues, which popularized Benedict's life and miracles. Through Gregory's influence, Benedictine monasteries became the standard religious institution of medieval Europe, preserving literacy, agriculture, and culture through centuries of upheaval."}],paths:[[30.37,30.3,41.49,13.81,"From Egyptian desert to Monte Cassino"],[41.49,13.81,41.9,12.5,"Benedict's Rule reaches Rome"]],facts:["Anthony of Egypt: first great hermit","Benedict's Rule: ora et labora","Monks preserved classical manuscripts through the Dark Ages"]},
{id:"rel16",cat:"religion",name:"Bacchic Mysteries & the Bacchanalia Scandal",y1:-186,y2:-186,desc:"Senate crushed Bacchic worship in 186 BC — 7,000 arrested. First religious persecution in Roman history.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"186 BC: Senatus Consultum de Bacchanalibus.",wiki:"In 186 BC, the Roman Senate discovered that Bacchic mystery cult meetings (Bacchanalia) had spread across Italy — involving nocturnal rituals, ecstatic dancing, sexual initiation, and alleged crimes including murder, forgery, and poisoning. The Senate passed the Senatus Consultum de Bacchanalibus — one of Rome's most important surviving inscriptions — restricting gatherings to 5 people maximum and requiring Senate permission. Over 7,000 people were arrested; many executed. It was Rome's first large-scale religious persecution."},{n:"Pompeii/Villa of Mysteries",lat:40.75,lng:14.49,info:"Famous frescoes may depict Bacchic initiation.",wiki:"The Villa of Mysteries at Pompeii contains the most famous frescoes in the ancient world — 29 life-size figures in a continuous narrative. Their interpretation is debated, but most scholars see a Bacchic initiation rite: unveiling of a phallus, flagellation, dancing, and the reading of sacred texts. Despite the 186 BC crackdown, Bacchic worship never fully disappeared."}],paths:[],facts:["7,000 arrested — many executed","First religious persecution in Roman history","Villa of Mysteries frescoes may show initiation"]},
{id:"rel17",cat:"religion",name:"Sol Invictus & Solar Worship",y1:274,y2:380,desc:"Aurelian made Sol Invictus the supreme state deity — December 25 was his feast day. May have influenced the dating of Christmas.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Temple of Sol Invictus built on the Campus Martius.",wiki:"Emperor Aurelian established the cult of Sol Invictus (Unconquered Sun) as the supreme deity of the Roman state in 274 AD, building a magnificent temple on the Campus Martius. December 25 — Dies Natalis Solis Invicti (Birthday of the Unconquered Sun) — was designated as the major festival. Whether Christmas was deliberately placed on this date to compete with or absorb the solar festival is one of the most debated questions in religious history. Constantine, before his conversion, was a devotee of Sol Invictus — the sun appears on his coinage."}],paths:[],facts:["December 25: Birthday of the Unconquered Sun","Aurelian made Sol Invictus supreme deity (274)","Constantine was a devotee before converting"]},
{id:"rel18",cat:"religion",name:"Roman Funerary Religion",y1:-753,y2:400,desc:"Lares, Manes, Lemures — ancestor worship shaped Roman identity. 'Dis Manibus' on every tombstone.",locs:[{n:"Rome/Via Appia",lat:41.85,lng:12.52,info:"Tombs lined the roads outside every Roman city.",wiki:"Roman religion was deeply concerned with the dead. The Manes (spirits of the dead) were worshipped at family tombs. The inscription 'D.M.' (Dis Manibus — to the divine spirits) appears on virtually every Roman tombstone. The Parentalia (February 13-21) was a festival of the dead when families visited tombs with food and wine. The Lemuria (May 9, 11, 13) was a more fearful observance — the paterfamilias walked barefoot at midnight, spitting black beans to appease the Lemures (restless, malevolent ghosts). Ancestor masks (imagines) of the dead were kept in the atrium and worn in funeral processions."}],paths:[],facts:["'D.M.' (Dis Manibus) on every tombstone","Parentalia: 9-day festival of the dead","Lemures: restless ghosts appeased with black beans"]},
{id:"rel19",cat:"religion",name:"Epicureanism in Rome",y1:-155,y2:400,desc:"Garden philosophy — pleasure as the highest good (defined as absence of pain). Lucretius' poem. Rival to Stoicism.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Epicureanism had powerful Roman adherents.",wiki:"Epicureanism entered Rome in the 2nd century BC and attracted powerful adherents. Epicurus taught that pleasure (hedone) — properly understood as the absence of pain and anxiety (ataraxia) — was the highest good. The gods exist but don't intervene; the soul is mortal; the universe is composed of atoms in void. In Rome, Lucretius' De Rerum Natura was its greatest expression. Julius Caesar's father-in-law Calpurnius Piso built a villa at Herculaneum stuffed with Epicurean texts."},{n:"Athens",lat:37.98,lng:23.73,info:"Epicurus' Garden — where the philosophy began.",wiki:"Epicurus (341-270 BC) founded his school in a garden outside Athens — hence 'the Garden.' Uniquely, it admitted women and slaves. Epicureanism rivaled Stoicism as the dominant Roman philosophy; Cicero, though a Stoic sympathizer, wrote extensively about both."},{n:"Herculaneum/Villa of the Papyri",lat:40.81,lng:14.35,info:"1,800 carbonized papyrus scrolls — many Epicurean texts.",wiki:"The Villa of the Papyri at Herculaneum — buried by Vesuvius in 79 AD — contained a library of 1,800 carbonized papyrus scrolls, many containing works by the Epicurean philosopher Philodemus. Modern technology (X-ray scanning) is slowly reading these scrolls, recovering lost ancient texts."}],paths:[[37.98,23.73,41.9,12.5,"Epicureanism reaches Rome"],[41.9,12.5,40.81,14.35,"Epicurean library at Herculaneum"]],facts:["Pleasure = absence of pain (ataraxia)","1,800 scrolls at Herculaneum — many Epicurean","Epicurus admitted women and slaves"]},
{id:"rel20",cat:"religion",name:"Council of Constantinople",y1:381,y2:381,desc:"Theodosius I's council — Nicene Creed finalized, Arianism condemned. Constantinople elevated to second rank after Rome.",locs:[{n:"Constantinople",lat:41.0,lng:29.0,info:"381 AD: Second Ecumenical Council.",wiki:"The First Council of Constantinople (381 AD), convened by Emperor Theodosius I, was the second ecumenical council of the Christian Church. It expanded the Nicene Creed to its final form (still recited today), definitively condemned Arianism (which denied Christ's full divinity), and elevated Constantinople's bishop to second rank after Rome — 'because it is the New Rome.' This last canon infuriated Rome and planted the seeds of the eventual Great Schism (1054)."}],paths:[],facts:["Nicene Creed finalized in its current form","Arianism definitively condemned","Constantinople elevated to second rank — seeding the Schism"]},
// PLAGUES
{id:"plg1",cat:"plagues",name:"Antonine Plague",y1:165,y2:180,desc:"Smallpox from Parthia killed 5-10 million.",locs:[{n:"Seleucia",lat:33.1,lng:44.6,info:"Soldiers contracted it here.",wiki:"Roman soldiers looted Seleucia during Verus' war."},{n:"Rome",lat:41.9,lng:12.5,info:"2,000 died daily.",wiki:"Galen described symptoms. Marcus Aurelius recruited gladiators."},{n:"Aquileia",lat:45.77,lng:13.37,info:"Plague struck army.",wiki:"Devastated Danube frontier armies."}],paths:[[33.1,44.6,41.9,12.5,"Plague carried from Parthia"],[41.9,12.5,45.77,13.37,"Devastates northern armies"]],facts:["Likely smallpox","5-10 million dead","2,000/day in Rome"]},
{id:"plg2",cat:"plagues",name:"Great Fire of Rome",y1:64,y2:64,desc:"Destroyed two-thirds of the city. Nero blamed Christians.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Burned 6 days.",wiki:"July 18, 64 AD. 10 of 14 districts damaged. Nero opened gardens to refugees."}],paths:[],facts:["Burned 6 days","10 of 14 districts","Nero blamed Christians"]},
{id:"plg3",cat:"plagues",name:"Sack of Rome (410)",y1:410,y2:410,desc:"Alaric's Visigoths — first sack in 800 years.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Three days of plundering.",wiki:"August 24, 410 AD. Churches spared. Jerome: 'The city which took the world is itself taken.'"}],paths:[],facts:["First sack in 800 years","Three days","Inspired City of God"]},
{id:"plg4",cat:"plagues",name:"Plague of Cyprian",y1:249,y2:262,desc:"5,000 died per day in Rome — Alexandria's population halved.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"5,000 deaths daily at the peak.",wiki:"The plague erupted in 249 AD and ravaged the empire for over a decade. At its height, approximately 5,000 people died per day in Rome alone. Symptoms included fever, diarrhea, continuous vomiting, gangrenous extremities, deafness, and blindness. The disease may have been smallpox or viral hemorrhagic fever."},{n:"Alexandria",lat:31.2,lng:29.9,info:"Population collapsed from 500,000 to 190,000.",wiki:"Alexandria was devastated. Bishop Dionysius recorded that the city's population was halved. Streets were filled with unburied dead. The surviving population was smaller than the number of elderly alone before the plague."},{n:"Carthage",lat:36.85,lng:10.33,info:"Bishop Cyprian documented the plague here.",wiki:"The plague is named for St. Cyprian, Bishop of Carthage, whose firsthand accounts are the primary historical source. He described it as God's judgment. Christians who nursed the sick won converts — the plague accelerated Christianity's growth."}],paths:[[41.9,12.5,31.2,29.9,"Plague spreads across the Mediterranean"],[41.9,12.5,36.85,10.33,"Cyprian documents the horrors at Carthage"]],facts:["5,000/day died in Rome","Alexandria: 500k to 190k","Named for Bishop Cyprian"]},
{id:"plg5",cat:"plagues",name:"Gallic Sack of Rome (390 BC)",y1:-390,y2:-390,desc:"Brennus burned Rome and demanded gold — the trauma shaped Roman policy for centuries.",locs:[{n:"Allia River",lat:42.05,lng:12.55,info:"Roman army routed here.",wiki:"The Senone Gauls under Brennus crushed the Roman army at the Allia River, 11 miles north of Rome. The defeat was so traumatic that July 18 (dies Alliensis) became an unlucky day in the Roman calendar forever."},{n:"Capitoline Hill",lat:41.89,lng:12.48,info:"Held out for seven months while the city burned.",wiki:"Gauls occupied and burned the rest of the city. Sacred geese of Juno honked to warn of a night assault. When Romans agreed to ransom, Brennus threw his sword on the scales demanding more. 'Vae victis!' — woe to the conquered. Camillus arrived with an army and drove the Gauls out."}],paths:[[42.05,12.55,41.89,12.48,"Gauls march from Allia into Rome"]],facts:["'Vae victis' — woe to the conquered","Geese saved the Capitol","1,000 lbs of gold ransom"]},
{id:"plg6",cat:"plagues",name:"Sack of Rome by Vandals (455)",y1:455,y2:455,desc:"Gaiseric's fleet from Carthage — 14 days of systematic plunder.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"14 days of methodical looting.",wiki:"June 2, 455 AD. Vandal king Gaiseric entered an undefended Rome. Pope Leo I persuaded him not to burn the city or murder civilians. But everything of value was stripped: the gilded bronze roof tiles from the Temple of Jupiter, the Temple treasures including the Jewish menorah taken by Titus in 70 AD, and thousands of captives including Empress Eudoxia and her daughters."},{n:"Carthage",lat:36.85,lng:10.33,info:"Vandal fleet launched from here.",wiki:"Historic irony: Carthage — destroyed by Rome in 146 BC — now sent a fleet to sack Rome. Gaiseric had captured Carthage in 439 AD and built the western Mediterranean's most powerful navy."},{n:"Ostia",lat:41.76,lng:12.29,info:"Vandal fleet landed here.",wiki:"Rome's port provided easy access. After the sack, Vandal ships were loaded with art, gold, silver, and captives. The Vandals sailed back to Carthage with the greatest plunder since the fall of Troy."}],paths:[[36.85,10.33,41.76,12.29,"Vandal fleet sails from Carthage"],[41.76,12.29,41.9,12.5,"Gaiseric enters Rome"]],facts:["14 days of looting","Menorah from Jerusalem taken","Pope Leo I negotiated no killing"]},
{id:"plg7",cat:"plagues",name:"Antioch Earthquake",y1:115,y2:115,desc:"Struck while Trajan wintered there — he barely escaped as hundreds of thousands died.",locs:[{n:"Antioch",lat:36.2,lng:36.15,info:"One of the ancient world's deadliest earthquakes.",wiki:"December 13, 115 AD. Emperor Trajan was wintering in Antioch preparing for his Parthian campaign when a massive earthquake struck. Cassius Dio reports he escaped through a window as buildings collapsed around him. The city — one of Rome's largest with ~500,000 people — was devastated. Aftershocks continued for days. A tsunami hit the coast. Trajan organized relief efforts but Antioch took decades to recover."}],paths:[],facts:["Trajan barely escaped","Hundreds of thousands killed","Triggered a tsunami"]},
{id:"plg8",cat:"plagues",name:"Justinian Plague",y1:541,y2:549,desc:"First bubonic plague pandemic — 25-50 million dead. Constantinople lost 40% of its population.",locs:[{n:"Constantinople",lat:41.0,lng:29.0,info:"Emperor Justinian himself fell ill but survived.",wiki:"The plague arrived in Constantinople in spring 542. At its peak, 5,000-10,000 died daily. Bodies were stacked in towers and dumped at sea. Justinian contracted the disease but survived. The plague returned in waves for 200 years. Modern DNA analysis of victims confirmed Yersinia pestis — the same bacterium that caused the Black Death 800 years later."},{n:"Pelusium",lat:31.05,lng:32.56,info:"First recorded outbreak in the Roman world, 541 AD.",wiki:"The plague arrived at the Egyptian port of Pelusium in 541 AD, likely from East Africa or Central Asia via Indian Ocean trade routes. Egypt's grain ships then carried it across the Mediterranean."},{n:"Alexandria",lat:31.2,lng:29.9,info:"Grain ships carried the plague from here.",wiki:"Alexandria's role as the empire's grain hub made it a plague distribution center. Ships carrying grain to Constantinople also carried infected rats and fleas. The pandemic killed an estimated 25-50 million people — perhaps 40-50% of the eastern empire's population."}],paths:[[31.05,32.56,31.2,29.9,"Plague arrives at Egyptian ports"],[31.2,29.9,41.0,29.0,"Grain ships carry plague to Constantinople"]],facts:["25-50 million dead","5,000-10,000/day in Constantinople","Yersinia pestis confirmed by DNA"]},
{id:"plg9",cat:"plagues",name:"Great Tiber Floods",y1:-241,y2:400,desc:"Rome's recurring curse — the Campus Martius submerged for days, grain stores ruined, disease unleashed.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Major floods recorded in 54 BC, 69 AD, 217 AD, and many more.",wiki:"The Tiber flooded Rome repeatedly throughout its history. Ancient sources record over 30 major floods. The low-lying Campus Martius and Forum Boarium were especially vulnerable. In 54 BC, the flood was so severe that boats replaced carriages. In 69 AD, Otho's soldiers had to wade through chest-deep water. Augustus created a permanent Tiber commission (curatores riparum et alvei Tiberis) and cleared the riverbed. Trajan built a canal at Ostia to divert floodwaters. Despite these efforts, flooding continued — it wrecked grain stores, spread disease, and undermined buildings."}],paths:[],facts:["30+ major floods recorded","Augustus created a Tiber commission","Campus Martius submerged for days"]},
{id:"plg10",cat:"plagues",name:"365 Crete Earthquake & Tsunami",y1:365,y2:365,desc:"Massive earthquake off Crete sent a tsunami across the Mediterranean — ships thrown 2 miles inland.",locs:[{n:"Crete",lat:35.24,lng:24.47,info:"Epicenter off western Crete — estimated magnitude 8.0+.",wiki:"On July 21, 365 AD, a massive earthquake struck off western Crete. Modern geological analysis estimates magnitude 8.0+. The earthquake uplifted western Crete by 9 meters — ancient harbor installations are now stranded far above sea level. The resulting tsunami radiated across the entire eastern Mediterranean."},{n:"Alexandria",lat:31.2,lng:29.9,info:"Ships deposited on rooftops. Ammianus Marcellinus witnessed it.",wiki:"The tsunami devastated Alexandria. The historian Ammianus Marcellinus, who may have witnessed it, describes the sea withdrawing then returning with enormous force. Ships were deposited on rooftops and 2 miles inland. Thousands drowned. The anniversary was commemorated annually in Alexandria for centuries as a 'day of horror.'"}],paths:[[35.24,24.47,31.2,29.9,"Tsunami crosses the Mediterranean to Alexandria"]],facts:["Estimated magnitude 8.0+","Western Crete uplifted 9 meters","Ships thrown 2 miles inland at Alexandria"]},
{id:"plg11",cat:"plagues",name:"Pompeii Earthquake of 62 AD",y1:62,y2:62,desc:"Major earthquake severely damaged Pompeii and Herculaneum 17 years before Vesuvius — much of the city was still being rebuilt.",locs:[{n:"Pompeii",lat:40.75,lng:14.49,info:"Severely damaged — extensive rebuilding was underway in 79 AD.",wiki:"On February 5, 62 AD, a powerful earthquake struck the Bay of Naples region. Pompeii suffered severe damage: the Forum, temples, and many houses were partially destroyed. Seventeen years of reconstruction were underway when Vesuvius erupted in 79 AD — archaeologists can distinguish earthquake damage from volcanic destruction. Seneca wrote a famous account of the earthquake in his Natural Questions."},{n:"Herculaneum",lat:40.81,lng:14.35,info:"Also damaged in the 62 AD earthquake.",wiki:"Herculaneum was closer to the epicenter and suffered significant damage. The earthquake was likely caused by magma movement beneath Vesuvius — a warning the Romans couldn't interpret. Many wealthy families had already left the area before the 79 AD eruption."}],paths:[],facts:["February 5, 62 AD","Much of Pompeii still being rebuilt when Vesuvius erupted","Seneca described it in Natural Questions"]},
{id:"plg12",cat:"plagues",name:"Fire of 192 AD",y1:192,y2:192,desc:"Under Commodus, fire destroyed the Temple of Peace, vast warehouses, and irreplaceable public records.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Destroyed the Temple of Peace and surrounding warehouses.",wiki:"A devastating fire broke out in Rome in 192 AD during the reign of Commodus. It destroyed the Temple of Peace (Vespasian's masterpiece, considered one of Rome's most beautiful buildings), warehouses containing exotic spices and medicines from the East, and vast archives of public records. Cassius Dio compared the disaster to the Great Fire of 64 AD. Commodus proposed renaming Rome 'Colonia Commodiana' during the rebuilding — he was assassinated on December 31, 192."}],paths:[],facts:["Temple of Peace destroyed","Irreplaceable public records lost","Commodus assassinated weeks later"]},
{id:"plg13",cat:"plagues",name:"Rhine Crossing of 406 AD",y1:406,y2:406,desc:"Vandals, Alans, and Suebi crossed the frozen Rhine on New Year's Eve — Gaul overrun, beginning of the end for the West.",locs:[{n:"Mainz",lat:50.0,lng:8.27,info:"Crossing point on the frozen Rhine, December 31, 406.",wiki:"On the night of December 31, 406 AD, a massive coalition of Vandals, Alans, and Suebi crossed the frozen Rhine near Mainz. The Frankish frontier guards were overwhelmed. The barbarians fanned out across Gaul, looting cities that had been peaceful for generations. Jerome wrote: 'Innumerable and very savage peoples have now occupied the whole of Gaul.' Within four years, the Vandals would reach Spain; within 30, they would take Carthage. The Rhine frontier was never restored."}],paths:[],facts:["December 31, 406 AD: frozen Rhine crossed","Gaul overrun — frontier never restored","Within 30 years, Vandals took Carthage"]},
{id:"plg14",cat:"plagues",name:"Famine & Food Crises",y1:-200,y2:400,desc:"Grain shortages triggered riots — Pompey and Caesar used grain control as political weapons.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"City of 1 million+ utterly dependent on imported grain.",wiki:"Rome's million-plus population depended entirely on imported grain — primarily from Egypt, North Africa, and Sicily. Any disruption (piracy, storms, political instability) caused immediate food crises. In 57 BC, riots forced the Senate to grant Pompey extraordinary power over grain supply. Caesar and later Augustus formalized the annona — a state grain distribution that by the Empire fed 200,000 citizens for free. Control of the annona was power itself."},{n:"Ostia",lat:41.76,lng:12.29,info:"Rome's port: critical bottleneck for grain imports.",wiki:"Ostia was Rome's lifeline. Grain ships from Egypt, Africa, and Sicily unloaded here before barges carried supplies up the Tiber. When the harbor silted up, Claudius built Portus nearby. A grain supply disruption here could starve Rome within weeks."}],paths:[[41.76,12.29,41.9,12.5,"Grain barges up the Tiber to Rome"]],facts:["200,000 Romans received free grain","Pompey given extraordinary grain powers, 57 BC","Control of the annona was political power"]},
{id:"plg15",cat:"plagues",name:"Siege Famine of Rome (408-410)",y1:408,y2:410,desc:"Alaric blockaded Rome three times — starvation, plague, and possibly cannibalism before the sack.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Population collapsed from ~800,000 to ~500,000.",wiki:"Alaric and his Visigoths blockaded Rome three times between 408-410 AD. The first siege (408) caused horrific famine: 'the inhabitants were at the point of eating each other' wrote Zosimus. The city paid a massive ransom. The second siege (409) installed a puppet emperor. The third siege (August 24, 410) ended in the sack of Rome — the first time in 800 years the city had fallen to a foreign enemy. The population had already collapsed from starvation and disease. Augustine wrote The City of God in response."}],paths:[],facts:["Three sieges in two years","First sack of Rome in 800 years (410 AD)","Augustine wrote City of God in response"]},
{id:"plg16",cat:"plagues",name:"Collapse of the Amphitheatre at Fidenae",y1:27,y2:27,desc:"Cheaply built wooden amphitheatre collapsed — 20,000-50,000 casualties. Worst structural disaster in Roman history.",locs:[{n:"Fidenae",lat:41.95,lng:12.52,info:"27 AD: catastrophic collapse during gladiatorial games.",wiki:"In 27 AD, a cheaply constructed wooden amphitheatre at Fidenae (just 8 km from Rome) collapsed during gladiatorial games. Tacitus reports 50,000 casualties (killed and injured) — though modern historians estimate 20,000-30,000. A freedman named Atilius had built it on inadequate foundations to profit from games banned in Rome. The disaster prompted the Senate to pass regulations requiring structural inspections and minimum wealth for games sponsors. Tiberius sent surgeons and opened his palace to the injured."}],paths:[],facts:["20,000-50,000 casualties","Worst structural disaster in Roman history","Led to building safety regulations"]},
{id:"plg17",cat:"plagues",name:"Eruption of Vesuvius (79 AD)",y1:79,y2:79,desc:"18 hours of eruption — pyroclastic surges, Pliny the Elder killed, 2,000+ dead. Cities buried for 1,700 years.",locs:[{n:"Pompeii",lat:40.75,lng:14.49,info:"Buried under 4-6 meters of pumice and ash.",wiki:"On August 24 (or October 24), 79 AD, Mount Vesuvius erupted catastrophically. Pompeii — population ~11,000 — was buried under 4-6 meters of pumice and volcanic ash over 18 hours. Most residents evacuated, but approximately 1,150 bodies have been found (perhaps 2,000 died). The first phase dropped pumice; the lethal phase was pyroclastic surges — superheated gas and rock traveling at 100+ km/h. The city was forgotten until rediscovery in 1748, providing an unparalleled snapshot of Roman daily life."},{n:"Herculaneum",lat:40.81,lng:14.35,info:"Buried under 20 meters of volcanic mud — better preserved than Pompeii.",wiki:"Herculaneum — a wealthy seaside town of ~5,000 — was buried under 20 meters of volcanic material, mostly pyroclastic flows that carbonized organic material but also preserved it. Over 300 skeletons were found huddled in the boat sheds, killed instantly by heat. The depth of burial preserved wooden furniture, food, and the famous papyrus library of the Villa of the Papyri."},{n:"Stabiae",lat:40.7,lng:14.47,info:"Pliny the Elder died here during the eruption.",wiki:"Pliny the Elder — admiral, naturalist, and author of the Natural History — sailed from Misenum to rescue friends at Stabiae. He died on the beach, probably from a heart attack or asphyxiation from volcanic gases. His nephew Pliny the Younger's account to Tacitus is the most detailed eyewitness description of a volcanic eruption from antiquity."}],paths:[[40.79,14.08,40.7,14.47,"Pliny the Elder sails from Misenum to Stabiae"]],facts:["18 hours of eruption","Pliny the Elder killed — 'Plinian' eruption named for him","Pompeii rediscovered in 1748"]},
{id:"plg18",cat:"plagues",name:"Plague of Athens (Roman Context)",y1:-430,y2:-426,desc:"Though Greek, it profoundly shaped Roman plague awareness — Thucydides' account became the model for all Roman plague writing.",locs:[{n:"Athens",lat:37.98,lng:23.73,info:"430-426 BC: up to 100,000 dead.",wiki:"The Plague of Athens (430-426 BC) killed perhaps one-quarter of the Athenian population, including Pericles. Though a Greek event, it was foundational for the Roman world: Thucydides' clinical description became the literary model for every subsequent Roman plague narrative — Lucretius' De Rerum Natura ends with a devastating poetic retelling. Roman writers including Livy, Diodorus Siculus, and Procopius all drew on Thucydides' template when describing later epidemics. The disease's identity remains debated: typhus, smallpox, Ebola, and measles have all been proposed."}],paths:[],facts:["Up to 100,000 dead in Athens","Thucydides' account: model for all Roman plague writing","Disease identity still debated"]},
{id:"plg19",cat:"plagues",name:"The Praetorian Auction of the Empire",y1:193,y2:193,desc:"After murdering Pertinax, the Praetorian Guard auctioned the empire to the highest bidder — Didius Julianus paid 25,000 sestertii per man.",locs:[{n:"Rome/Castra Praetoria",lat:41.91,lng:12.52,info:"March 28, 193 AD: the empire sold at auction.",wiki:"On March 28, 193 AD, the Praetorian Guard murdered Emperor Pertinax after just 87 days. They then literally auctioned the empire from atop the walls of the Castra Praetoria (Praetorian camp). Two bidders competed: Sulpicianus and Didius Julianus. Julianus won by offering 25,000 sestertii to each guardsman. He entered the palace but found the treasury empty. The frontier legions revolted — Septimius Severus marched on Rome from Pannonia. Julianus was abandoned by everyone and executed after 66 days. The episode epitomized Rome's political degradation."}],paths:[],facts:["Empire auctioned for 25,000 sestertii per man","Didius Julianus lasted only 66 days","Septimius Severus marched on Rome in response"]},
{id:"plg20",cat:"plagues",name:"Deforestation & Environmental Degradation",y1:-200,y2:400,desc:"Rome stripped forests for ships, fuel, and construction — North Africa's forests vanished. Soil erosion. Ancient environmental catastrophe.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Massive demand for timber and fuel.",wiki:"The Roman Empire's enormous demand for timber — shipbuilding, construction, fuel for baths and industry, and charcoal for smelting — drove deforestation across the Mediterranean. Italy's forests were largely stripped by the late Republic. Strabo noted that Corsica was once so forested that 'bees found no room for their hives.' Pliny lamented the disappearance of Italian forests. The environmental impact was severe: soil erosion, silting of harbors (Ostia silted up), loss of agricultural land, and local climate changes."},{n:"North Africa",lat:36.85,lng:10.33,info:"Once forested — now largely desert.",wiki:"North Africa — Rome's breadbasket — was extensively deforested for agriculture and timber. Regions that were forested in antiquity are now semi-arid. Analysis of pollen cores from Tunisia and Algeria shows massive forest clearance during the Roman period. The environmental transformation contributed to declining agricultural productivity in late antiquity."}],paths:[],facts:["Italy's forests stripped by the late Republic","North African forests became semi-desert","Harbor silting at Ostia from deforestation erosion"]},
// BIOGRAPHIES
{id:"bio1",cat:"biography",name:"Cicero",y1:-106,y2:-43,desc:"Rome's greatest orator. Defender of the Republic. Head nailed to the Rostra.",locs:[{n:"Arpinum (born)",lat:41.65,lng:13.61,info:"Small hilltop town — also Marius' birthplace.",wiki:"Born January 3, 106 BC. A 'novus homo' — first in his family to reach consulship."},{n:"Rome",lat:41.9,lng:12.5,info:"Consul 63 BC. Crushed Catiline. Killed by Antony 43 BC.",wiki:"As consul, crushed Catiline's conspiracy. Greatest Latin orator. Philosophical works transmitted Greek thought to Rome. Delivered Philippics against Antony. Killed December 7, 43 BC. Head and hands nailed to the Rostra."},{n:"Athens",lat:37.98,lng:23.73,info:"Studied philosophy here.",wiki:"Studied at the Academy and under Stoic philosophers."},{n:"Tusculum",lat:41.8,lng:12.71,info:"Villa where he wrote his great works.",wiki:"Favorite retreat. Wrote Tusculan Disputations, On Old Age, On Friendship."}],paths:[[41.65,13.61,41.9,12.5,"Young Cicero comes to Rome","Arrived as teenager. Won first major case at 25."],[41.9,12.5,37.98,23.73,"Studies philosophy in Athens"],[37.98,23.73,41.9,12.5,"Returns — rises to consul"]],facts:["Greatest Latin orator","Crushed Catiline","Head nailed to Rostra"]},
{id:"bio2",cat:"biography",name:"Seneca the Younger",y1:-4,y2:65,desc:"Stoic philosopher. Tutor to Nero. Preached simplicity with 300 million sesterces.",locs:[{n:"Corduba (born)",lat:37.88,lng:-4.78,info:"Modern Córdoba, Spain.",wiki:"Born ~4 BC. Father was a famous rhetorician. Nephew was poet Lucan."},{n:"Rome",lat:41.9,lng:12.5,info:"Tutor to Nero. Forced suicide 65 AD.",wiki:"Effectively governed Rome during Nero's early years. Amassed 300 million sesterces while writing about poverty. Forced suicide 65 AD — opened veins dictating philosophy."},{n:"Corsica",lat:42.15,lng:9.1,info:"Exiled 8 years by Claudius.",wiki:"Exiled 41-49 AD. Wrote On the Shortness of Life."}],paths:[[37.88,-4.78,41.9,12.5,"Comes to Rome from Hispania"],[41.9,12.5,42.15,9.1,"Exiled to Corsica"],[42.15,9.1,41.9,12.5,"Recalled to tutor Nero"]],facts:["300 million sesterces","Letters to Lucilius","Forced suicide by Nero"]},
{id:"bio3",cat:"biography",name:"Pliny the Elder",y1:23,y2:79,desc:"Greatest encyclopedist. 37 volumes. Died investigating Vesuvius.",locs:[{n:"Comum (born)",lat:45.81,lng:9.08,info:"Modern Como.",wiki:"Born 23 AD. Equestrian family. Served in Germania."},{n:"Rome",lat:41.9,lng:12.5,info:"Advisor to Vespasian. Wrote Natural History.",wiki:"37-volume encyclopedia citing 2,000+ books. Read constantly, even during meals."},{n:"Misenum",lat:40.79,lng:14.08,info:"Fleet commander when Vesuvius erupted.",wiki:"Sailed across the bay to investigate and rescue."},{n:"Stabiae",lat:40.72,lng:14.48,info:"Died from volcanic gases.",wiki:"Dined calmly, slept. Killed by gases on the beach. 'Plinian eruption' named after him."}],paths:[[45.81,9.08,41.9,12.5,"Comes to Rome"],[41.9,12.5,40.79,14.08,"Fleet commander at Misenum"],[40.79,14.08,40.72,14.48,"Sails into the eruption","Curiosity overcame caution. Ordered fleet toward falling pumice, dictating observations."]],facts:["37-volume Natural History","2,000+ books cited","Died at Vesuvius"]},
{id:"bio4",cat:"biography",name:"Agrippina the Younger",y1:15,y2:59,desc:"Sister of Caligula, wife of Claudius, mother of Nero. Murdered by her son.",locs:[{n:"Colonia (born)",lat:50.94,lng:6.96,info:"Modern Cologne — named after her.",wiki:"Born Nov 6, 15 AD. Great-granddaughter of Augustus. Cologne named Colonia Agrippinensis."},{n:"Rome",lat:41.9,lng:12.5,info:"Married uncle Claudius. May have poisoned him. Murdered by Nero.",wiki:"Married Claudius 49 AD. May have poisoned him with mushrooms 54 AD. Nero tried collapsing boat, then sent soldiers. She said: 'Strike here — this bore Nero.'"},{n:"Baiae",lat:40.82,lng:14.07,info:"Nero's failed assassination by collapsing boat.",wiki:"Lead-weighted ceiling collapsed, killing her attendant. Agrippina swam to safety."}],paths:[[50.94,6.96,41.9,12.5,"Brought to Rome as imperial infant"],[41.9,12.5,40.82,14.07,"Nero's failed boat assassination"]],facts:["Cologne named for her","May have poisoned Claudius","Murdered by Nero"]},
{id:"bio5",cat:"biography",name:"Cato the Elder",y1:-234,y2:-149,desc:"Old Roman virtue incarnate. 'Carthage must be destroyed.'",locs:[{n:"Tusculum (born)",lat:41.8,lng:12.71,info:"Farming family.",wiki:"Born 234 BC. Citizen-farmer-soldier ideal."},{n:"Rome",lat:41.9,lng:12.5,info:"Consul 195 BC. Censor 184 BC.",wiki:"Expelled corrupt senators. First Latin prose historian. De Agri Cultura. Ended every speech: 'Carthage must be destroyed.'"},{n:"Carthage",lat:36.85,lng:10.33,info:"Horrified by its recovery.",wiki:"153 BC: held fresh figs in Senate — picked 3 days ago in Carthage."}],paths:[[41.8,12.71,41.9,12.5,"Comes to Rome"],[41.9,12.5,36.85,10.33,"Embassy to Carthage","Saw the city's renewed wealth. Became convinced Rome was never safe while Carthage existed."]],facts:["'Carthage must be destroyed'","First Latin historian","Expelled the corrupt"]},
{id:"bio6",cat:"biography",name:"Josephus",y1:37,y2:100,desc:"Jewish priest turned Roman historian. Sole source for the Temple's destruction.",locs:[{n:"Jerusalem (born)",lat:31.78,lng:35.23,info:"Priestly family. Led rebel forces.",wiki:"Born 37 AD. Appointed rebel commander in Galilee with no military experience."},{n:"Jotapata",lat:32.83,lng:35.29,info:"Surrendered after 47-day siege.",wiki:"Hid in cave with 40 men. Made suicide pact but manipulated order to survive. Prophesied Vespasian would be emperor."},{n:"Rome",lat:41.9,lng:12.5,info:"Lived in Vespasian's house. Wrote his histories.",wiki:"Given citizenship, pension. Wrote Jewish War, Antiquities of the Jews. Without him we'd know almost nothing about the Temple's destruction."}],paths:[[31.78,35.23,32.83,35.29,"Commands rebel forces in Galilee"],[32.83,35.29,31.78,35.23,"Witnesses siege of Jerusalem","Accompanied Titus, urging surrender. Watched the Temple burn."],[31.78,35.23,41.9,12.5,"Taken to Rome as Flavian protégé"]],facts:["Survived suicide pact","Prophesied Vespasian","Sole source for Temple"]},
{id:"bio7",cat:"biography",name:"Scipio Africanus",y1:-236,y2:-183,desc:"Rome's greatest Republican general. Defeated Hannibal at Zama. Died in bitter exile.",locs:[{n:"Rome (born)",lat:41.9,lng:12.5,info:"Patrician family. Survived Cannae at 17.",wiki:"Born ~236 BC to the Cornelii Scipiones, one of Rome's oldest patrician families. At 17, he survived the slaughter at Cannae. Elected to command in Spain at 25 despite having held no magistracy — the Senate was desperate."},{n:"Carthago Nova",lat:37.6,lng:-0.99,info:"Captured in a single day, 209 BC.",wiki:"Scipio discovered that the harbor lagoon was fordable at low tide. While the main force attacked the walls, a strike team waded through the lagoon and scaled the undefended sea walls. The city fell in a single day."},{n:"Zama",lat:36.3,lng:8.55,info:"Defeated Hannibal, 202 BC.",wiki:"The decisive battle of the Second Punic War. Scipio used horns and trumpets to panic Hannibal's 80 war elephants, which stampeded back through Carthaginian lines. Hannibal himself said Scipio was the greatest general who ever lived."},{n:"Liternum",lat:40.9,lng:13.9,info:"Died in voluntary exile ~183 BC.",wiki:"Political enemies led by Cato the Elder accused him of accepting bribes. Bitterly disappointed, he retired to his country estate. His epitaph reportedly read: 'Ungrateful fatherland, you shall not have my bones.'"}],paths:[[41.9,12.5,37.6,-0.99,"Commands in Spain at age 25"],[37.6,-0.99,36.3,8.55,"Invades Africa, defeats Hannibal"],[41.9,12.5,40.9,13.9,"Retires in disgrace to Liternum"]],facts:["Defeated Hannibal at 31","Conquered Spain at 25","Died in bitter exile"]},
{id:"bio8",cat:"biography",name:"Cleopatra VII",y1:-69,y2:-30,desc:"Last pharaoh. Spoke 9 languages. Allied with Caesar and Antony. Died rather than submit.",locs:[{n:"Alexandria (born)",lat:31.2,lng:29.9,info:"Born 69 BC. Ptolemaic dynasty.",wiki:"Born into the Macedonian Greek dynasty that had ruled Egypt since Alexander's death. Only Ptolemaic ruler to learn Egyptian. Also spoke Ethiopian, Hebrew, Aramaic, Arabic, Syriac, Median, and Parthian. Brilliant administrator who restored Egypt's economy."},{n:"Rome",lat:41.9,lng:12.5,info:"Lived here as Caesar's guest, 46-44 BC.",wiki:"Arrived with their son Caesarion. Romans were scandalized. After Caesar's assassination, she fled back to Alexandria."},{n:"Tarsus",lat:36.92,lng:34.89,info:"Met Antony here in 41 BC.",wiki:"Arrived on a golden barge with purple sails and silver oars. Dressed as Aphrodite. Antony was instantly enchanted. Their alliance produced three children and a political partnership that terrified Rome."},{n:"Actium",lat:38.95,lng:20.73,info:"Naval defeat, September 31 BC.",wiki:"Combined fleet of 350 ships met Octavian's 400 under Agrippa. Cleopatra's 60 Egyptian ships fled with the treasury mid-battle. Antony abandoned his fleet to follow. Both committed suicide in Alexandria the following year."}],paths:[[31.2,29.9,41.9,12.5,"Travels to Rome with Caesar"],[41.9,12.5,36.92,34.89,"Returns east, meets Antony at Tarsus"],[36.92,34.89,38.95,20.73,"Combined fleet sails to Actium"],[38.95,20.73,31.2,29.9,"Flees to Alexandria — suicide"]],facts:["Spoke 9 languages","Only Ptolemy to learn Egyptian","Asp bite or poison — death debated"]},
{id:"bio9",cat:"biography",name:"Sulla",y1:-138,y2:-78,desc:"First to march on Rome. Dictator. Proscribed 520 enemies. Then resigned and retired.",locs:[{n:"Rome (born)",lat:41.9,lng:12.5,info:"Impoverished patrician. Rose through cunning.",wiki:"Born 138 BC to an old patrician family fallen on hard times. Lived in a tenement as a young man. Rose through military talent in Africa under Marius. In 88 BC, became the first Roman to march legions against his own city."},{n:"Athens",lat:37.98,lng:23.73,info:"Sacked 86 BC during Mithridatic War.",wiki:"Sulla besieged Athens to punish its alliance with Mithridates VI of Pontus. After capturing the city, he stripped it of treasures but spared the buildings. Defeated Mithridates at the battles of Chaeronea and Orchomenos."},{n:"Colline Gate",lat:41.91,lng:12.5,info:"82 BC: decisive battle at Rome's gates.",wiki:"November 1, 82 BC. Sulla's veterans fought through the night against Samnites and Marians. Victory gave him total control. He then revived the dormant office of dictator and published proscription lists — 520 names of senators and equites to be killed on sight."},{n:"Puteoli",lat:40.82,lng:14.12,info:"Died 78 BC after retiring to his estates.",wiki:"Astonishingly, Sulla resigned the dictatorship after passing constitutional reforms. Retired to his country estate. Died in 78 BC, reportedly of a disease that caused his flesh to be eaten by lice. His epitaph: 'No friend ever served me, no enemy ever wronged me, whom I have not fully repaid.'"}],paths:[[41.9,12.5,37.98,23.73,"Marches east against Mithridates"],[37.98,23.73,41.91,12.5,"Returns to civil war at the Colline Gate","Fought through the night. 50,000 died in the battle."],[41.9,12.5,40.82,14.12,"Resigns dictatorship and retires"]],facts:["First march on Rome","520 proscribed names","Resigned dictatorship voluntarily"]},
{id:"bio10",cat:"biography",name:"Pompey the Great",y1:-106,y2:-48,desc:"Three triumphs. Cleared the pirates. Conquered the East. Murdered on an Egyptian beach.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Three triumphs — matched only by Romulus.",wiki:"Born 106 BC in Picenum. Raised three legions at age 23 from his family estates. Sulla called him 'Magnus' (the Great). Won triumphs over Africa, Spain, and the East. Built Rome's first permanent stone theatre. Formed the First Triumvirate with Caesar and Crassus in 60 BC."},{n:"Mediterranean",lat:36.0,lng:18.0,info:"Cleared pirates in 3 months, 67 BC.",wiki:"Given extraordinary command with 500 ships and 120,000 troops. Swept the Mediterranean clean of pirates in just three months — a nearly bloodless campaign that restored Rome's grain supply."},{n:"Jerusalem",lat:31.78,lng:35.23,info:"Captured 63 BC. Entered the Holy of Holies.",wiki:"Intervened in a Judean civil war. Besieged the Temple Mount for three months. Entered the Holy of Holies — the most sacred room in Judaism — but reportedly touched nothing. Judea became a Roman client state."},{n:"Pelusium",lat:31.05,lng:32.56,info:"Murdered September 28, 48 BC.",wiki:"After defeat at Pharsalus, Pompey fled to Egypt seeking shelter. Ptolemy XIII's advisors decided a dead Pompey was less dangerous than a living one. As Pompey stepped from his boat, they stabbed him. Caesar reportedly wept at his rival's severed head."}],paths:[[41.9,12.5,36.0,18.0,"Clears pirates from the Mediterranean"],[36.0,18.0,31.78,35.23,"Conquers the East, captures Jerusalem"],[41.9,12.5,31.05,32.56,"Flees to Egypt after Pharsalus"]],facts:["Three triumphs","Cleared pirates in 3 months","Murdered on Egyptian beach"]},
{id:"bio11",cat:"biography",name:"Marcus Aurelius",y1:121,y2:180,desc:"The philosopher-king. Meditations. Last of the Five Good Emperors. 14 years at war.",locs:[{n:"Rome (born)",lat:41.9,lng:12.5,info:"Born April 26, 121 AD to a prominent family.",wiki:"Groomed for power from childhood. Hadrian noticed him early; Antoninus Pius adopted him. Co-ruled with Lucius Verus 161-169. Sold palace furniture and imperial jewels rather than raise taxes to fund the Marcomannic Wars. His equestrian statue on the Capitoline survived because medieval Romans thought it was Constantine."},{n:"Carnuntum",lat:48.11,lng:16.86,info:"Headquarters for the Danubian campaigns.",wiki:"Major legionary fortress. Marcus Aurelius spent years here directing operations against Marcomanni and Quadi. Between battles and councils of war, he wrote the private philosophical journal we know as the Meditations."},{n:"Sirmium",lat:44.97,lng:19.61,info:"Wrote large portions of the Meditations here.",wiki:"Important Pannonian base. Books 2-3 of the Meditations are headed 'Written at Sirmium' and 'Among the Quadi, on the river Gran.' Never intended for publication — pure self-examination."},{n:"Vindobona",lat:48.21,lng:16.37,info:"Probable place of death, March 17, 180 AD.",wiki:"Modern Vienna. Most sources say Marcus Aurelius died here. His last recorded words urged his officers: 'Go to the rising sun; I am already setting.' His son Commodus, who succeeded him, undid his legacy."}],paths:[[41.9,12.5,48.11,16.86,"Campaigns on the Danube"],[48.11,16.86,44.97,19.61,"Writes Meditations between battles"],[44.97,19.61,48.21,16.37,"Dies at the frontier, 180 AD"]],facts:["Last of the Five Good Emperors","Meditations: greatest Stoic text","Sold imperial furniture to fund wars"]},
{id:"bio12",cat:"biography",name:"Hannibal Barca",y1:-247,y2:-183,desc:"Carthage's greatest general. Swore hatred of Rome at 9. Crossed the Alps. Poisoned himself in exile.",locs:[{n:"Carthage (born)",lat:36.85,lng:10.33,info:"Born 247 BC. Son of Hamilcar Barca.",wiki:"At age 9, his father Hamilcar made him swear an oath of eternal hatred against Rome at an altar. Raised in the military camps of Iberia. By 26, commanded all Carthaginian forces in Spain."},{n:"Alps",lat:45.0,lng:6.8,info:"Crossed with 37 elephants, autumn 218 BC.",wiki:"One of history's most audacious military feats. Departed with 90,000 infantry, 12,000 cavalry, and 37 war elephants. The brutal 15-day alpine crossing killed thousands. He arrived in Italy with only 26,000 men — and proceeded to terrorize Rome for 15 years."},{n:"Cannae",lat:41.3,lng:16.1,info:"August 216 BC: 50-70,000 Romans killed.",wiki:"The most perfect tactical victory in history. Hannibal let his center bend backward, drawing Romans in, while cavalry completed a double envelopment. 50-70,000 Romans died in a single afternoon — including 80 senators. Still studied at military academies worldwide."},{n:"Zama",lat:36.3,lng:8.55,info:"Defeated by Scipio, 202 BC.",wiki:"Recalled to defend Carthage. Scipio turned his own elephant tactics against him. After defeat, Hannibal became a reformist politician in Carthage, then fled to eastern courts."},{n:"Libyssa",lat:40.72,lng:29.37,info:"Poisoned himself ~183 BC in Bithynia.",wiki:"Pursued relentlessly by Rome even in exile. Finally cornered in Bithynia (modern Turkey), he took poison he had long kept in a ring. 'Let us relieve the Romans of the anxiety they have so long experienced, since they think it tries their patience too much to wait for an old man's death.'"}],paths:[[36.85,10.33,45.0,6.8,"Departs Iberia, crosses the Alps"],[45.0,6.8,41.3,16.1,"Devastates Italy for 15 years"],[41.3,16.1,36.3,8.55,"Recalled to Carthage, defeated at Zama"],[36.3,8.55,40.72,29.37,"Exile and death in Bithynia"]],facts:["Swore hatred of Rome at age 9","37 elephants over the Alps","Poisoned himself in exile"]},
{id:"bio13",cat:"biography",name:"Livia Drusilla",y1:-58,y2:29,desc:"Wife of Augustus for 51 years. Mother of Tiberius. The most powerful woman in Roman history.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Married Augustus 38 BC. Wielded immense influence.",wiki:"Born 58 BC to a noble family. Married Octavian (Augustus) in 38 BC while pregnant with her second son. For 51 years she was his closest advisor. She managed a vast personal fortune and client network. Rumors accused her of poisoning Augustus' heirs to clear the path for her son Tiberius — likely slander from political enemies."},{n:"Nola",lat:40.93,lng:14.53,info:"Augustus died here in her arms, 14 AD.",wiki:"Augustus died at Nola on August 19, 14 AD. Livia was at his side. His last words to her: 'Live mindful of our marriage, Livia, and farewell.' She managed the transition to Tiberius so smoothly that news of Augustus' death and Tiberius' accession were announced simultaneously."},{n:"Prima Porta",lat:42.0,lng:12.4,info:"Her villa — site of the famous Augustus statue.",wiki:"Livia's country villa north of Rome. The famous statue of Augustus in military dress was found here. The villa's underground garden room, painted with exquisite botanical frescoes, survives in the Palazzo Massimo."}],paths:[[41.9,12.5,40.93,14.53,"At Augustus' deathbed in Nola"],[41.9,12.5,42.0,12.4,"Villa at Prima Porta"]],facts:["Married Augustus for 51 years","Deified by Claudius","Rumored poisoner — likely slander"]},
{id:"bio14",cat:"biography",name:"Hadrian",y1:76,y2:138,desc:"Most traveled emperor. Built the Wall, rebuilt the Pantheon. 'Little soul, wandering, gentle guest.'",locs:[{n:"Italica",lat:37.44,lng:-6.04,info:"Born 76 AD in Hispania.",wiki:"Born in Italica to a Romanized Spanish family related to Trajan. Ward of Trajan from age 10 after his father's death. Rose through military and administrative service."},{n:"Rome",lat:41.9,lng:12.5,info:"Rebuilt the Pantheon. Massive tomb became Castel Sant'Angelo.",wiki:"Hadrian's architectural legacy is unmatched among emperors. The Pantheon, the Temple of Venus and Roma, and his mausoleum (Castel Sant'Angelo) transformed the city. He was the first emperor to wear a beard — a tribute to Greek philosophers."},{n:"Athens",lat:37.98,lng:23.73,info:"His beloved city — completed the Temple of Olympian Zeus.",wiki:"Hadrian spent years in Athens. Completed the Temple of Olympian Zeus after 600 years. Built an entire new quarter of the city. Initiated into the Eleusinian Mysteries."},{n:"Tivoli",lat:41.96,lng:12.8,info:"Hadrian's Villa — the most ambitious private building project in Roman history.",wiki:"120 hectares with 30+ buildings recreating places from his travels. Canopus canal from Egypt, Lyceum and Academy from Athens, a maritime theatre for private retreat."},{n:"Egypt",lat:25.7,lng:32.65,info:"Antinous drowned in the Nile, 130 AD.",wiki:"Hadrian's companion Antinous drowned in the Nile in mysterious circumstances. Hadrian's grief was extraordinary — he founded a city, had Antinous deified, and commissioned more statues of him than of any other ancient figure. His final poem: 'Animula vagula blandula' — 'Little soul, wandering, gentle guest.'"}],paths:[[37.44,-6.04,41.9,12.5,"From Hispania to emperor"],[41.9,12.5,37.98,23.73,"Years in Athens"],[41.9,12.5,25.7,32.65,"Travels to Egypt — loses Antinous"]],facts:["Visited every province in person","First bearded emperor","'Little soul, wandering, gentle guest'"]},
{id:"bio15",cat:"biography",name:"Zenobia",y1:240,y2:274,desc:"Warrior queen who seized Rome's eastern provinces — defeated by Aurelian, paraded in golden chains.",locs:[{n:"Palmyra",lat:34.55,lng:38.27,info:"Desert oasis trading city — Zenobia's capital.",wiki:"Palmyra grew wealthy as a caravan city between Rome and Parthia. After her husband Odaenathus was assassinated in 267, Zenobia ruled as regent for her son. She claimed descent from Cleopatra and Dido."},{n:"Antioch",lat:36.2,lng:36.15,info:"Seized by Zenobia's forces.",wiki:"Zenobia's general Zabdas conquered Syria and seized Antioch — Rome's third-largest city. Her empire eventually encompassed Syria, Palestine, Egypt, and much of Anatolia."},{n:"Emesa",lat:34.73,lng:36.72,info:"Modern Homs — decisive battle against Aurelian.",wiki:"Aurelian defeated Zenobia's forces at Emesa in 272. She retreated to Palmyra where Aurelian besieged her. She attempted to flee to Persia but was captured crossing the Euphrates."},{n:"Rome",lat:41.9,lng:12.5,info:"Paraded in Aurelian's triumph in golden chains.",wiki:"Zenobia was displayed in Aurelian's triumph, reportedly weighed down by gold jewelry and chains. Unlike most captives, she was spared. Some sources say she lived out her life as a Roman matron in Tivoli."}],paths:[[34.55,38.27,36.2,36.15,"Conquers Syria and the East"],[36.2,36.15,34.73,36.72,"Aurelian defeats her at Emesa"],[34.55,38.27,41.9,12.5,"Paraded in Rome in golden chains"]],facts:["Claimed descent from Cleopatra","Conquered Egypt, Syria, Anatolia","Spared and lived as Roman matron"]},
{id:"bio16",cat:"biography",name:"Caligula",y1:12,y2:41,desc:"Started well, then descended into legendary cruelty. First emperor to be assassinated.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Emperor 37-41 AD.",wiki:"Born Gaius Julius Caesar Germanicus. 'Caligula' (little boot) was a childhood nickname from soldiers. First six months were promising — recalled exiles, abolished treason trials. After a severe illness, he became erratic: declared himself a god, held conversations with Jupiter, planned to make his horse Incitatus a consul."},{n:"Antium",lat:41.45,lng:12.63,info:"Born here, 12 AD.",wiki:"Modern Anzio, south of Rome. Born to the beloved general Germanicus and Agrippina the Elder. As a small boy, he wore miniature soldier's boots in his father's camp — hence 'little boot.'"},{n:"Baiae",lat:40.82,lng:14.07,info:"Built a pontoon bridge across the Bay of Naples.",wiki:"To refute a prophecy that he had 'no more chance of becoming emperor than of riding a horse across the Bay of Baiae,' Caligula ordered a pontoon bridge of boats stretching 3 miles across the bay and rode across it in triumph."}],paths:[[41.45,12.63,41.9,12.5,"Raised in the imperial court"],[41.9,12.5,40.82,14.07,"Bridge of boats across the Bay"]],facts:["Nickname means 'little boot'","Planned horse as consul","Assassinated by Praetorian Guard"]},
{id:"bio17",cat:"biography",name:"Gaius Marius",y1:-157,y2:-86,desc:"Seven-time consul. New Man from Arpinum. Saved Rome from northern hordes. Reformed the army.",locs:[{n:"Arpinum",lat:41.65,lng:13.61,info:"Born 157 BC — hometown of both Marius and Cicero.",wiki:"A modest town in the hills southeast of Rome. Marius was a novus homo — the first of his family to reach the Senate. His rough manners offended aristocrats but soldiers loved him."},{n:"Aquae Sextiae",lat:43.53,lng:5.45,info:"102 BC: annihilated the Teutones.",wiki:"Modern Aix-en-Provence. Marius destroyed the Teutones in a massive battle — reportedly 100,000 killed or captured. The victory was so complete that the local fields were said to be fertilized by the dead."},{n:"Rome",lat:41.9,lng:12.5,info:"Seven consulships. Proscriptions. Died January 86 BC.",wiki:"Marius' rivalry with Sulla produced Rome's first civil war. After Sulla marched on Rome, Marius fled to Africa. He returned in 87 BC, unleashed a bloodbath against Sulla's supporters, and died of pleurisy just 17 days into his seventh consulship."}],paths:[[41.65,13.61,41.9,12.5,"New Man rises in Rome"],[41.9,12.5,43.53,5.45,"Saves Rome from Germanic invasion"],[43.53,5.45,41.9,12.5,"Returns to political warfare and civil war"]],facts:["Seven-time consul","Army reforms created professional soldiers","Died 17 days into seventh consulship"]},
{id:"bio18",cat:"biography",name:"The Gracchi Brothers",y1:-163,y2:-121,desc:"Tiberius and Gaius — land reform champions. Both murdered. Their deaths began the Republic's violent decline.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Both served as tribunes. Both were murdered.",wiki:"Tiberius Gracchus (tribune 133 BC) proposed redistributing public land to the poor. When the Senate blocked him, he bypassed them — unprecedented. He was beaten to death by senators with chair legs. His younger brother Gaius (tribune 123-122 BC) went further: grain subsidies, road building, jury reform. He too was killed — hunted down by a senatorial mob. 3,000 of his supporters were executed."},{n:"Carthage Colony",lat:36.85,lng:10.33,info:"Gaius proposed a colony here — outraged the Senate.",wiki:"Gaius Gracchus proposed refounding Carthage as a Roman colony (Colonia Junonia). Conservative senators were horrified at settling Roman citizens on the cursed ruins. The colony was used as pretext to move against Gaius."}],paths:[[41.9,12.5,36.85,10.33,"Gaius proposes colony at Carthage"]],facts:["Tiberius: beaten to death with chair legs","Gaius: killed in political crackdown","Their murders began 100 years of civil war"]},
{id:"bio19",cat:"biography",name:"Justinian & Theodora",y1:482,y2:565,desc:"Emperor and former actress — she stiffened his resolve during the Nika riots. Hagia Sophia. Corpus Juris Civilis.",locs:[{n:"Constantinople",lat:41.0,lng:29.0,info:"Ruled jointly 527-548 (Theodora's death).",wiki:"Justinian I (482-565) and his wife Theodora (c. 497-548) formed one of history's most consequential partnerships. Theodora — a former actress and dancer (considered disreputable) — was brilliant, ruthless, and decisive. During the Nika riots of 532, when Justinian prepared to flee, Theodora declared: 'Purple is the noblest shroud.' The revolt was crushed. Together they built the Hagia Sophia, codified Roman law (Corpus Juris Civilis), reconquered North Africa and Italy, and survived the Justinian Plague."},{n:"Ravenna/San Vitale",lat:44.42,lng:12.2,info:"Stunning mosaics show the imperial couple.",wiki:"The mosaics at San Vitale in Ravenna (completed 547 AD) show Justinian and Theodora in imperial splendor — each leading a procession of courtiers and clergy. These are among the greatest surviving artworks of late antiquity. Theodora's panel shows her dripping with jewels and wearing imperial purple."}],paths:[[41.0,29.0,44.42,12.2,"Imperial couple immortalized in Ravenna mosaics"]],facts:["'Purple is the noblest shroud' — Theodora","Corpus Juris Civilis: foundation of European law","Survived the Nika riots and the Plague"]},
{id:"bio20",cat:"biography",name:"Stilicho",y1:359,y2:408,desc:"Half-Vandal general — last great defender of the Western Empire. Defeated Alaric twice. Executed by the emperor he served.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Effectively ruled the Western Empire from here.",wiki:"Flavius Stilicho (359-408 AD) was the son of a Vandal father and a Roman mother. As magister militum (commander-in-chief), he was the real power behind the child emperor Honorius, whose guardian he was. Stilicho defeated Alaric's Goths at Pollentia (402) and Verona (403), and destroyed a massive Gothic-Hun invasion at Faesulae (406). Despite his loyalty and victories, a palace conspiracy accused him of treason. He surrendered peacefully and was executed on August 22, 408."},{n:"Ravenna",lat:44.42,lng:12.2,info:"Honorius ordered Stilicho's execution from here.",wiki:"The court at Ravenna turned against Stilicho — jealous of his power and suspicious of his barbarian heritage. After his execution, a pogrom against barbarian soldiers' families drove 30,000 warriors into Alaric's arms. Within two years, Alaric sacked Rome. The destruction of Stilicho sealed the West's fate."},{n:"Pollentia",lat:44.75,lng:7.97,info:"Stilicho defeated Alaric here on Easter Sunday, 402.",wiki:"On Easter Sunday, April 6, 402 AD, Stilicho attacked Alaric's camp at Pollentia (modern Pollenzo). The timing — attacking on a holy day — was controversial, but the victory saved Italy temporarily. Stilicho captured Alaric's camp including his wife. It was the last great Roman victory in the West."}],paths:[[44.75,7.97,41.9,12.5,"Stilicho defeats Alaric at Pollentia"],[41.9,12.5,44.42,12.2,"Stilicho executed at Ravenna"]],facts:["Half-Vandal: last great Western defender","Defeated Alaric twice","His execution sealed the West's fate"]},
{id:"bio21",cat:"biography",name:"Germanicus",y1:-15,y2:19,desc:"Golden prince — avenged Teutoburg, beloved by the people. Died mysteriously in Antioch. His death convulsed Rome.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Most popular man in Rome — crowds mobbed his funeral.",wiki:"Nero Claudius Germanicus was everything Romans wanted in a leader: handsome, brave, generous, brilliant, and modest. Nephew and adopted son of Tiberius, he was the empire's most beloved figure. When he died in Antioch on October 10, 19 AD — possibly poisoned by the governor Piso on Tiberius' orders — Rome erupted in grief. Crowds hurled stones at temples. His ashes were carried back by his wife Agrippina the Elder in a procession that drew mourners across the empire."},{n:"Teutoburg",lat:52.4,lng:8.13,info:"Germanicus recovered the lost eagles and buried the dead.",wiki:"In 15-16 AD, Germanicus led massive campaigns into Germania to avenge the Teutoburg disaster. He recovered two of three lost eagles, defeated Arminius twice, and found the Teutoburg battlefield — burying the bleached bones of Varus' legions six years after the disaster. Tiberius recalled him before he could finish — perhaps jealous of his popularity."},{n:"Antioch",lat:36.2,lng:36.15,info:"Died here October 10, 19 AD — poisoned?",wiki:"Germanicus died in Antioch at age 33. He believed Piso had poisoned him and cursed him from his deathbed. The trial of Piso in Rome was the sensation of the age — Piso killed himself before a verdict. Modern scholars debate whether Tiberius ordered the murder. Germanicus' children included Caligula and Agrippina the Younger (Nero's mother)."}],paths:[[41.9,12.5,52.4,8.13,"Avenges Teutoburg"],[41.9,12.5,36.2,36.15,"Dies mysteriously in Antioch"]],facts:["Recovered Varus' lost eagles","Died at 33 — possibly poisoned","Father of Caligula, grandfather of Nero"]},
{id:"bio22",cat:"biography",name:"Agrippa",y1:-63,y2:-12,desc:"Augustus' right hand — won Actium, built the Pantheon, married Julia. Greatest general of the early Empire.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Built the original Pantheon, Baths of Agrippa, and the Aqua Virgo.",wiki:"Marcus Vipsanius Agrippa was Augustus' indispensable partner — a military genius and master builder. Of humble origins, he won virtually every battle Augustus needed: Naulochus against Sextus Pompey (36 BC), Actium against Antony (31 BC). In peacetime, he built the first Pantheon (27 BC, later rebuilt by Hadrian), the Baths of Agrippa, and the Aqua Virgo aqueduct. He married Augustus' daughter Julia and was clearly intended as a successor. His death in 12 BC at age 50 left Augustus struggling for an heir."},{n:"Actium",lat:38.95,lng:20.73,info:"31 BC: Agrippa's naval tactics won the decisive battle.",wiki:"At Actium, Agrippa commanded Octavian's fleet against Antony and Cleopatra. His innovative naval tactics — using smaller, faster ships against Antony's floating fortresses — proved decisive. When Cleopatra fled with the Egyptian squadron, Antony followed, and the battle was won. Agrippa had delivered the Mediterranean to Augustus."},{n:"Nimes",lat:43.84,lng:4.36,info:"The Maison Carree may have been built by Agrippa.",wiki:"Agrippa governed Gaul and built infrastructure across the province. The Pont du Gard aqueduct may have been commissioned during his governorship. His mapping project — surveying the entire Roman road system — was displayed after his death in the Porticus Vipsania."}],paths:[[38.95,20.73,41.9,12.5,"Victory at Actium secures the empire"],[41.9,12.5,43.84,4.36,"Agrippa builds infrastructure in Gaul"]],facts:["Won Actium for Augustus","Built the original Pantheon","Died at 50 — succession crisis followed"]},
{id:"bio23",cat:"biography",name:"Cato the Younger",y1:-95,y2:-46,desc:"Republic's last defender — Stoic philosopher-politician. Defied Caesar. Suicide at Utica became the symbol of republican virtue.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Spent his career opposing Caesar, Pompey, and corruption.",wiki:"Marcus Porcius Cato (Cato the Younger, great-grandson of Cato the Elder) was the Roman Republic's most principled — and most obstinate — defender. A devoted Stoic, he walked barefoot, wore rough clothing, and practiced asceticism. He opposed the First Triumvirate, filibustered Caesar's legislation, and fought corruption relentlessly. His moral authority was immense even to those who found him infuriating. Caesar reportedly said that Cato was the only man who genuinely threatened his ambitions."},{n:"Utica",lat:36.95,lng:10.06,info:"46 BC: Cato committed suicide rather than submit to Caesar.",wiki:"After Caesar's victory at Thapsus (46 BC), Cato was trapped at Utica in North Africa. Rather than accept Caesar's pardon (which would have acknowledged Caesar's authority to grant one), he read Plato's Phaedo on the immortality of the soul, then stabbed himself in the abdomen. When doctors stitched the wound, he tore it open with his bare hands. His suicide became the defining act of republican virtue — Dante placed him as guardian of Purgatory."}],paths:[[41.9,12.5,36.95,10.06,"Cato's final stand at Utica"]],facts:["Tore open his wound rather than live under Caesar","Dante placed him as guardian of Purgatory","Caesar: the only man who truly threatened him"]},
{id:"bio24",cat:"biography",name:"Virgil",y1:-70,y2:-19,desc:"Rome's greatest poet — Eclogues, Georgics, Aeneid. 'Arms and the man I sing.' Wanted the Aeneid burned.",locs:[{n:"Mantua",lat:45.16,lng:10.79,info:"Virgil's birthplace — 'Mantua bore me.'",wiki:"Publius Vergilius Maro was born near Mantua in 70 BC to a modest rural family. His Eclogues (pastoral poems, 42-39 BC) caught the attention of Maecenas, Augustus' cultural advisor. The Georgics (on farming, 29 BC) are considered the finest didactic poetry in any language. Then came the Aeneid (19 BC) — an epic linking Rome's destiny to Troy through the hero Aeneas. Virgil died before finishing it and allegedly asked for it to be burned. Augustus overruled the request."},{n:"Rome",lat:41.9,lng:12.5,info:"Central figure of Augustus' cultural program.",wiki:"Virgil was the centerpiece of the Augustan cultural revolution — his Aeneid provided Rome with a national epic to rival Homer. 'Arma virumque cano' (Arms and the man I sing) became the most famous opening in Latin literature. The poem justified Augustus' rule by presenting Rome's history as divinely ordained destiny. Virgil became quasi-sacred in the Middle Ages — Dante chose him as his guide through Hell and Purgatory."},{n:"Naples",lat:40.85,lng:14.27,info:"Virgil's tomb is here — a pilgrimage site for 2,000 years.",wiki:"Virgil's tomb at the entrance to the Grotto of Posilipo in Naples became a site of pilgrimage. In the Middle Ages, Virgil was regarded as a magician and prophet — the Fourth Eclogue, which prophesied a golden age and a divine child, was read as predicting Christ. Petrarch, Boccaccio, and Chaucer all visited the tomb."}],paths:[[45.16,10.79,41.9,12.5,"From Mantua to Rome: Virgil's literary ascent"],[41.9,12.5,40.85,14.27,"Virgil's tomb at Naples"]],facts:["'Arms and the man I sing'","Wanted the Aeneid burned — Augustus refused","Dante's guide through Hell and Purgatory"]},
{id:"bio25",cat:"biography",name:"Ovid",y1:-43,y2:17,desc:"Metamorphoses, Ars Amatoria — exiled by Augustus for 'a poem and an error.' Died in exile on the Black Sea.",locs:[{n:"Sulmo",lat:42.05,lng:13.93,info:"Ovid's birthplace — modern Sulmona, Abruzzo.",wiki:"Publius Ovidius Naso was born in Sulmo (Sulmona) in 43 BC to an old equestrian family. He was trained for law but chose poetry. His Amores (love poems) and Ars Amatoria (Art of Love — essentially a seduction manual) made him the wittiest and most popular poet in Augustan Rome. The Metamorphoses — 250 transformation myths in 15 books — is one of the most influential works in Western literature."},{n:"Rome",lat:41.9,lng:12.5,info:"The literary capital — until exile.",wiki:"Ovid was Rome's most fashionable poet until 8 AD, when Augustus suddenly banished him to Tomis on the Black Sea for 'carmen et error' — a poem and an error. The poem was probably the Ars Amatoria (offensive to Augustus' moral legislation); the error remains history's greatest literary mystery — perhaps involvement in a scandal touching Augustus' granddaughter Julia. Ovid never returned."},{n:"Tomis",lat:44.18,lng:28.63,info:"Modern Constanta, Romania — Ovid's place of exile and death.",wiki:"Ovid spent his last nine years (8-17 AD) in Tomis (modern Constanta, Romania) — a frontier town on the Black Sea that he described as frozen, barbaric, and unbearable. His exile poetry (Tristia, Epistulae ex Ponto) pleads for recall with heartbreaking eloquence. He died there in 17 AD, never pardoned. His influence on Dante, Chaucer, Shakespeare, Titian, and Bernini is immeasurable."}],paths:[[42.05,13.93,41.9,12.5,"From Sulmo to Rome: literary fame"],[41.9,12.5,44.18,28.63,"Exiled to Tomis on the Black Sea"]],facts:["'Carmen et error' — the mystery of his exile","Metamorphoses: one of the most influential works ever","Never pardoned — died in exile"]},
// ECONOMY
{id:"eco1",cat:"economy",name:"Silk Road Trade",y1:-130,y2:300,desc:"Roman gold flowed east for Chinese silk.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Senate tried to ban silk.",wiki:"Pliny: 100 million sesterces drained east annually."},{n:"Antioch",lat:36.2,lng:36.15,info:"Eastern goods hub.",wiki:"Where Silk Road goods entered Roman trading system."},{n:"Palmyra",lat:34.55,lng:38.27,info:"Desert trading hub.",wiki:"Grew rich on trade tariffs. Zenobia's independent empire 272 AD."}],paths:[[41.9,12.5,36.2,36.15,"Gold for eastern goods"],[36.2,36.15,34.55,38.27,"Caravans via Palmyra"]],facts:["100M sesterces/year east","Senate tried to ban silk","Rome to Han China"]},
{id:"eco2",cat:"economy",name:"Egypt: Rome's Breadbasket",y1:-30,y2:400,desc:"Egypt supplied a third of Rome's grain.",locs:[{n:"Alexandria",lat:31.2,lng:29.9,info:"Grain fleets departed each season.",wiki:"Nile flood produced enormous surpluses."},{n:"Rome",lat:41.9,lng:12.5,info:"1 million dependent on grain.",wiki:"200,000 received free grain monthly. Control = power."},{n:"Ostia",lat:41.76,lng:12.29,info:"Rome's port.",wiki:"Claudius and Trajan built enormous harbors."}],paths:[[31.2,29.9,41.76,12.29,"Grain fleets from Alexandria"],[41.76,12.29,41.9,12.5,"Up the Tiber to Rome"]],facts:["1/3 of grain","200,000 free grain","Control = power"]},
{id:"eco3",cat:"economy",name:"The Denarius & Roman Currency",y1:-211,y2:300,desc:"Silver denarius — backbone of the Roman economy for 500 years, then destroyed by debasement.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Roman mint at the Temple of Juno Moneta.",wiki:"The denarius was introduced ~211 BC during the Second Punic War, containing 4.5g of silver. For centuries it was the Mediterranean's most trusted currency. Nero began debasement in 64 AD, reducing silver content. By the 3rd century, the antoninianus replacement was just bronze with a silver wash. The word 'money' derives from Juno Moneta, at whose temple coins were struck."},{n:"Carthago Nova",lat:37.6,lng:-0.99,info:"Richest silver mines in the Roman world.",wiki:"Spain's silver mines were the empire's treasury. At their peak, 40,000 slaves worked the mines of Carthago Nova alone, producing silver that fed the Roman mint. Pliny recorded their staggering output."},{n:"Laurion",lat:37.73,lng:24.05,info:"Greek silver mines exploited by Rome.",wiki:"The famous Athenian silver mines. Rome continued their exploitation after conquering Greece. Combined with Spanish silver, they fueled the denarius system that unified Mediterranean commerce."}],paths:[[41.9,12.5,37.6,-0.99,"Silver from Spanish mines feeds the mint"],[41.9,12.5,37.73,24.05,"Greek silver supplements supply"]],facts:["Introduced ~211 BC","4.5g silver originally","Nero began debasement in 64 AD"]},
{id:"eco4",cat:"economy",name:"Roman Mining",y1:-200,y2:400,desc:"Gold, silver, lead, and copper — hydraulic mining on an industrial scale.",locs:[{n:"Las Médulas",lat:42.47,lng:-6.77,info:"Largest open-cast gold mine in the Roman world.",wiki:"In northwestern Spain, Romans used 'ruina montium' — hydraulic mining that collapsed entire mountains using water pressure. Pliny described the technique: channels carried water from miles away, then released it to shatter rock faces. Las Médulas produced an estimated 5 tons of gold per year. The scarred landscape is now a UNESCO World Heritage Site."},{n:"Sarmizegetusa",lat:45.6,lng:23.3,info:"165 tons of Dacian gold funded Trajan's building program.",wiki:"Trajan's conquest of Dacia in 106 AD was partly motivated by its gold. The 165 tons of gold and 330 tons of silver captured funded Trajan's Forum, Column, and massive public works in Rome."},{n:"Dolaucothi",lat:52.04,lng:-3.94,info:"Only known Roman gold mine in Britain.",wiki:"In Wales, Romans used aqueducts and hushing techniques to extract gold. The mine operated from ~75 AD and shows sophisticated Roman engineering adapted to the wet British climate."}],paths:[[41.9,12.5,42.47,-6.77,"Gold from Spain's ruined mountains"],[41.9,12.5,45.6,23.3,"Dacian gold funds Trajan's Rome"],[41.9,12.5,52.04,-3.94,"Gold extracted from Welsh hills"]],facts:["Las Médulas: largest Roman open-cast mine","165 tons of Dacian gold","Hydraulic mining: ruina montium"]},
{id:"eco5",cat:"economy",name:"Port of Ostia",y1:-400,y2:500,desc:"Rome's gateway to the sea — warehoused grain for a million people.",locs:[{n:"Ostia Antica",lat:41.76,lng:12.29,info:"Population ~100,000 at its peak.",wiki:"Rome's main port at the Tiber mouth. By the 2nd century AD, a bustling city of ~100,000 with apartment blocks, baths, temples, and a theatre. The Square of the Corporations — with mosaics advertising shipping firms from across the Mediterranean — is like an ancient Yellow Pages."},{n:"Portus",lat:41.78,lng:12.26,info:"Trajan's hexagonal harbor: 32 hectares.",wiki:"Claudius built a massive harbor north of Ostia in 42 AD, but it silted up. Trajan solved this with an innovative hexagonal harbor basin of 32 hectares, connected to the Tiber by canal. It could dock hundreds of ships simultaneously."},{n:"Rome",lat:41.9,lng:12.5,info:"Everything Rome consumed came through Ostia.",wiki:"Grain, olive oil, wine, marble, wild animals for the arena — virtually everything entered Rome via Ostia and Portus. The horrea (warehouses) stored enough grain to feed a million Romans."}],paths:[[41.76,12.29,41.9,12.5,"Goods travel up the Tiber to Rome"],[41.78,12.26,41.76,12.29,"Trajan's harbor connects to Ostia"]],facts:["Population ~100,000","Trajan's hexagonal harbor: 32 hectares","Warehoused grain for 1 million"]},
{id:"eco6",cat:"economy",name:"Wine & Olive Oil Trade",y1:-200,y2:400,desc:"Monte Testaccio — a 35m hill of 53 million broken amphorae — testament to Rome's appetite.",locs:[{n:"Monte Testaccio",lat:41.876,lng:12.476,info:"35m hill made entirely of broken oil jars.",wiki:"An artificial hill in Rome made of approximately 53 million broken amphorae — mostly olive oil containers from Spain's Baetica province. Oil amphorae couldn't be reused because the clay absorbed rancid oil. The organized dumping (sherds were stacked, doused in lime) shows Rome's sophisticated waste management."},{n:"Baetica",lat:37.5,lng:-4.5,info:"Spain's olive oil heartland.",wiki:"The Guadalquivir valley in southern Spain was Rome's largest olive oil supplier. Estates produced an estimated 20 million liters annually. Amphorae stamps show a sophisticated system of quality control and taxation."},{n:"Leptis Magna",lat:32.64,lng:14.29,info:"Major olive oil exporter in Africa.",wiki:"Leptis Magna in modern Libya grew wealthy on olive oil exports. Emperor Septimius Severus — born here — ensured African oil competed with Spanish supply. The city's magnificent ruins reflect oil wealth."}],paths:[[37.5,-4.5,41.876,12.476,"Spanish oil shipped to Rome","20 million liters annually from Baetica."],[32.64,14.29,41.876,12.476,"African oil supplements the supply"]],facts:["Monte Testaccio: 53 million amphorae","35m hill of broken oil jars","Spain exported 20 million liters/year"]},
