{id:"cit12",cat:"cities",name:"Ravenna",y1:402,y2:476,desc:"Last western capital — protected by marshes. Stunning late Roman mosaics at San Vitale and Galla Placidia.",locs:[{n:"Ravenna",lat:44.42,lng:12.2,info:"Western capital 402-476 AD.",wiki:"Ravenna replaced Milan as the western capital in 402 AD. Protected by surrounding marshes, it was nearly impregnable. Honorius, Valentinian III, and the last western emperors ruled from here. After the fall of the Western Empire, Theodoric the Ostrogoth made it his capital. The mosaics of San Vitale, Galla Placidia, and Sant'Apollinare Nuovo are among the greatest surviving artworks of late antiquity — shimmering gold and blue compositions that link the Roman and Byzantine worlds. Eight Ravenna buildings are UNESCO World Heritage Sites."}],paths:[],facts:["Protected by marshes — nearly impregnable","Mosaics bridge Roman and Byzantine art","8 UNESCO World Heritage buildings"]},
{id:"cit13",cat:"cities",name:"Palmyra",y1:-41,y2:273,desc:"Desert caravan city on the Silk Road — Temple of Bel, colonnaded avenue, Zenobia's breakaway kingdom.",locs:[{n:"Palmyra",lat:34.55,lng:38.27,info:"UNESCO World Heritage Site in the Syrian desert.",wiki:"Palmyra (Tadmor) sat at the crossroads of caravan routes linking Rome to Persia and India. Under Roman suzerainty from the 1st century AD, it grew fabulously wealthy from trade taxes. The Temple of Bel (32 AD) fused Greco-Roman and Near Eastern architecture. The Grand Colonnade stretched 1.1 km. Under Queen Zenobia (267-272), Palmyra briefly controlled an empire stretching from Egypt to Anatolia before Aurelian reconquered it. UNESCO World Heritage Site, severely damaged in the Syrian civil war."}],paths:[],facts:["Crossroads of Rome-Persia-India trade","Zenobia briefly ruled from Egypt to Anatolia","Grand Colonnade: 1.1 km long"]},
{id:"cit14",cat:"cities",name:"Corinth",y1:-146,y2:400,desc:"Destroyed by Mummius (146 BC), refounded by Caesar (44 BC) — Paul's epistles, and Nero's failed canal.",locs:[{n:"Corinth",lat:37.9,lng:22.9,info:"Major Roman colony controlling the Isthmus.",wiki:"Roman Corinth had two lives. Mummius destroyed the Greek city in 146 BC as punishment for resistance — it lay abandoned for a century. Julius Caesar refounded it as a Roman colony (Colonia Laus Iulia Corinthiensis) in 44 BC. It became the capital of Achaea and one of the wealthiest cities in the eastern empire, controlling trade across the Isthmus. The Apostle Paul spent 18 months here (50-52 AD) and wrote two famous epistles to its fractious Christian community. Nero attempted to cut a canal through the Isthmus in 67 AD using 6,000 Jewish prisoners — the project was abandoned."}],paths:[],facts:["Destroyed 146 BC, refounded by Caesar 44 BC","Paul wrote two epistles here","Nero's canal attempt used 6,000 prisoners"]},
{id:"cit15",cat:"cities",name:"Caesarea Maritima",y1:-22,y2:640,desc:"Herod's artificial harbor with underwater Roman concrete — provincial capital of Judaea. Paul's imprisonment.",locs:[{n:"Caesarea",lat:32.5,lng:34.89,info:"Largest artificial harbor in the ancient world.",wiki:"Herod the Great built Caesarea between 22-10 BC, naming it for Augustus. The artificial harbor (Sebastos) used Roman hydraulic concrete — pozzolana shipped from Italy that hardened underwater. The city had a theatre, hippodrome, palace, aqueduct, and sewage system flushed by the sea. It became the Roman provincial capital of Judaea. Pontius Pilate's name was found here on a dedicatory stone — the only archaeological evidence of his existence. Paul was imprisoned here for two years (58-60 AD) before being sent to Rome. The city hosted the first Gentile baptism (Cornelius) and was the origin of Eusebius' pioneering church history."}],paths:[],facts:["Largest ancient artificial harbor","Pontius Pilate inscription found here","Paul imprisoned for two years"]},
{id:"cit16",cat:"cities",name:"Syracuse",y1:-212,y2:400,desc:"Archimedes' city — fell to Marcellus after a 2-year siege. Cicero found Archimedes' tomb overgrown. Largest Greek city in the West.",locs:[{n:"Syracuse",lat:37.07,lng:15.28,info:"Largest and richest Greek city in the western Mediterranean.",wiki:"Syracuse in Sicily was the largest Greek city in the western Mediterranean — rivaling Athens in power and culture. During the Second Punic War, it allied with Carthage. Rome besieged it for two years (214-212 BC) — delayed by Archimedes' ingenious war machines (catapults, grappling cranes, possibly mirrors). When it fell, Marcellus wept at the destruction. Archimedes was killed by a Roman soldier despite orders to spare him (legend: 'Don't disturb my circles'). Cicero, visiting 75 years later, found Archimedes' tomb overgrown with thorns. Under Rome, Syracuse remained important — its grain fed the capital."}],paths:[],facts:["Archimedes' machines delayed the siege for 2 years","Marcellus wept at the city's destruction","Cicero found Archimedes' tomb overgrown"]},
{id:"cit17",cat:"cities",name:"Baalbek (Heliopolis)",y1:-15,y2:400,desc:"Largest Roman temple complex ever built — columns 19m tall, Trilithon stones weighing 800 tons each.",locs:[{n:"Baalbek",lat:34.01,lng:36.2,info:"UNESCO World Heritage — the most colossal Roman temples.",wiki:"Baalbek (ancient Heliopolis — City of the Sun) in modern Lebanon contains the largest Roman temple complex ever constructed. The Temple of Jupiter Heliopolitanus had 54 columns, each 19 meters tall — only 6 survive, but they are the tallest standing Roman columns in the world. The podium rests on the Trilithon — three stones weighing approximately 800 tons each, among the largest building blocks in history. A fourth stone (the Stone of the Pregnant Woman, 1,000 tons) was quarried but never moved. The adjacent Temple of Bacchus (actually better preserved) is larger than the Parthenon. UNESCO World Heritage Site."}],paths:[],facts:["Largest Roman temple complex ever built","Trilithon stones: 800 tons each","Temple of Bacchus larger than the Parthenon"]},
{id:"cit18",cat:"cities",name:"Petra",y1:-63,y2:400,desc:"Nabataean capital annexed by Trajan — the Treasury carved from sandstone. Water engineering in the desert. UNESCO.",locs:[{n:"Petra",lat:30.33,lng:35.44,info:"UNESCO World Heritage — one of the New Seven Wonders.",wiki:"Petra — 'the rose-red city half as old as time' — was the capital of the Nabataean kingdom from the 4th century BC. The Nabataeans grew wealthy controlling the incense trade from Arabia to the Mediterranean. The Treasury (Al-Khazneh), carved directly from pink sandstone, is one of the most recognized ancient monuments in the world. The city's water engineering was remarkable: channels, dams, and cisterns supported a population of 30,000 in the middle of a desert. Rome annexed the Nabataean kingdom in 106 AD under Trajan. Petra continued to thrive as a Roman city, with a colonnaded main street, theater, and baths added. An earthquake in 363 AD and shifting trade routes led to its decline. It was 'lost' to the Western world until Burckhardt rediscovered it in 1812."}],paths:[],facts:["Treasury carved from living sandstone","Water engineering supported 30,000 in a desert","Rediscovered by Burckhardt in 1812"]},
{id:"cit19",cat:"cities",name:"Pergamon",y1:-133,y2:400,desc:"Great Altar of Zeus, library rivaling Alexandria, parchment invented here. Asclepion healing center. A jewel of Roman Asia.",locs:[{n:"Pergamon",lat:39.12,lng:27.18,info:"Modern Bergama, Turkey — magnificent Hellenistic and Roman ruins.",wiki:"Pergamon (modern Bergama, Turkey) was one of the ancient world's greatest cities. Its library held 200,000 scrolls — second only to Alexandria. When Egypt cut off papyrus exports, Pergamon invented parchment (pergamena) as a writing material. The Great Altar of Zeus (now in Berlin's Pergamon Museum) featured a 113-meter frieze of the Gigantomachy — one of the masterpieces of ancient sculpture. The Asclepion (healing center) attracted patients from across the Mediterranean; Galen trained here. Bequeathed to Rome in 133 BC, it became the capital of the province of Asia."}],paths:[],facts:["Library: 200,000 scrolls — second to Alexandria","Parchment (pergamena) invented here","Galen trained at the Asclepion"]},
{id:"cit20",cat:"cities",name:"Aquileia",y1:-181,y2:452,desc:"Gateway to the eastern Alps — 4th-largest Italian city. Attila razed it. Refugees founded Venice. Stunning mosaics.",locs:[{n:"Aquileia",lat:45.77,lng:13.37,info:"UNESCO World Heritage — gateway city of the Roman northeast.",wiki:"Aquileia was founded in 181 BC as a Latin colony to defend against Celtic and Illyrian incursions. It became Italy's fourth-largest city (after Rome, Milan, and Capua) and the main gateway to the eastern Alps and the Danube frontier. Its amber trade, glass workshops, and port made it enormously wealthy. The 4th-century basilica contains the largest and finest early Christian floor mosaic in the West — 760 m² depicting the story of Jonah, the Good Shepherd, and marine creatures. In 452 AD, Attila's Huns besieged and destroyed Aquileia; refugees fled to the lagoons and — according to tradition — founded Venice. UNESCO World Heritage Site."}],paths:[],facts:["4th-largest Italian city","Largest early Christian floor mosaic in the West","Refugees from Attila founded Venice"]},
// SCIENCE & MEDICINE
{id:"sci1",cat:"science",name:"Galen & Roman Medicine",y1:129,y2:216,desc:"Physician to gladiators and emperors. Four humors theory dominated medicine for 1,300 years.",locs:[{n:"Pergamon",lat:39.12,lng:27.18,info:"Born 129 AD — trained at the famous Asclepion.",wiki:"Galen was born to a wealthy architect in Pergamon. Trained at the city's Asclepion (healing temple) and studied in Smyrna, Corinth, and Alexandria. His early career treating gladiators gave him unmatched knowledge of anatomy and trauma."},{n:"Rome",lat:41.9,lng:12.5,info:"Physician to Marcus Aurelius and three other emperors.",wiki:"Galen moved to Rome in 162 AD and became physician to Marcus Aurelius, Commodus, and Septimius Severus. He wrote 4 million words of surviving medical texts — more than any other ancient author. His four humors theory (blood, phlegm, yellow bile, black bile) dominated Western medicine until the 17th century."},{n:"Alexandria",lat:31.2,lng:29.9,info:"Studied anatomy at the greatest medical school.",wiki:"Alexandria's medical school allowed human dissection — forbidden elsewhere. Galen studied here, building on the work of Herophilus and Erasistratus. His anatomical knowledge, though based largely on animal dissection, remained the standard for 1,300 years."}],paths:[[39.12,27.18,41.9,12.5,"From Pergamon to imperial physician"],[39.12,27.18,31.2,29.9,"Studies at Alexandria"]],facts:["4 million words of surviving texts","Four humors theory: 1,300 years","Physician to gladiators and emperors"]},
{id:"sci2",cat:"science",name:"Ptolemy & the Cosmos",y1:100,y2:170,desc:"Almagest: geocentric model used for 1,400 years. Geography: mapped the known world.",locs:[{n:"Alexandria",lat:31.2,lng:29.9,info:"Lived and worked at the Museum and Library.",wiki:"Claudius Ptolemaeus worked in Alexandria ~100-170 AD. His Almagest (Arabic for 'The Greatest') presented a geocentric model of the universe with mathematical precision sufficient for accurate predictions. It was the standard astronomical text for 1,400 years until Copernicus. His Geography attempted to map the entire known world with coordinates — the first atlas. His Optics studied refraction and vision. He may also have composed the Tetrabiblos on astrology."}],paths:[],facts:["Almagest: standard for 1,400 years","Geography: first coordinate-based atlas","Geocentric model until Copernicus"]},
{id:"sci3",cat:"science",name:"Roman Concrete & Materials Science",y1:-300,y2:400,desc:"Opus caementicium with volcanic ash created self-healing concrete — the Pantheon stands 1,900 years later.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Pantheon dome: largest unreinforced concrete dome ever.",wiki:"Roman concrete (opus caementicium) mixed volcanic pozzolanic ash with lime and seawater. Modern scientists discovered this creates aluminum tobermorite crystals that actually strengthen over time — self-healing concrete. The Pantheon's dome (43.3m span) has stood for 1,900 years without reinforcement. Modern Portland cement structures last 50-100 years."},{n:"Pozzuoli",lat:40.82,lng:14.12,info:"Source of pozzolanic ash — the key ingredient.",wiki:"The volcanic ash from Puteoli (Pozzuoli) near Naples gave pozzolanic cement its name. When mixed with lime and seawater, it created a hydraulic cement that set underwater — enabling harbor construction throughout the Mediterranean."},{n:"Caesarea",lat:32.5,lng:34.89,info:"Herod's harbor — concrete set underwater.",wiki:"King Herod's harbor at Caesarea Maritima used Roman concrete technology to build massive underwater foundations. The concrete was mixed on barges and lowered into the sea in wooden forms. Modern analysis shows it incorporated volcanic ash imported from Italy."}],paths:[[40.82,14.12,41.9,12.5,"Pozzolanic ash: key to Rome's concrete"],[41.9,12.5,32.5,34.89,"Underwater concrete technology reaches Judaea"]],facts:["Self-healing concrete","Pantheon dome: 1,900 years old","Modern cement lasts 50-100 years"]},
{id:"sci4",cat:"science",name:"Cloaca Maxima & Sanitation",y1:-600,y2:400,desc:"World's earliest sewer system — drained the Forum, connected to aqueducts, still partially in use.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Forum Romanum — built over drained marshland.",wiki:"Tradition credits King Tarquinius Priscus (~600 BC) with beginning the Cloaca Maxima to drain the marshy Forum valley. Originally an open channel, it was progressively enclosed. By the 1st century AD, it connected to all 11 aqueducts and served as the backbone of Rome's sewer network. The outflow into the Tiber is still visible. Agrippa famously sailed through it in a boat during his renovation. Parts of the system remain in use after 2,600 years — testimony to Roman engineering."}],paths:[],facts:["Built ~600 BC","Agrippa sailed through it","Still partially in use today"]},
{id:"sci5",cat:"science",name:"Pliny's Natural History",y1:23,y2:79,desc:"37 volumes citing 2,000+ works — the first encyclopedia, covering everything from astronomy to zoology.",locs:[{n:"Comum",lat:45.81,lng:9.08,info:"Born 23 AD — modern Como.",wiki:"Born to an equestrian family. Served in the army in Germania. His nephew Pliny the Younger preserved his legacy and described his death at Vesuvius."},{n:"Rome",lat:41.9,lng:12.5,info:"Wrote the Natural History while advising Vespasian.",wiki:"Pliny read constantly — during meals, in his litter, at the baths. His freedman read aloud while he dictated notes. The Natural History (Naturalis Historia) covers geography, anthropology, zoology, botany, medicine, mineralogy, and art history in 37 books citing 2,000+ sources. It remained the standard reference work for 1,500 years."},{n:"Stabiae",lat:40.72,lng:14.48,info:"Died investigating Vesuvius, 79 AD.",wiki:"As fleet commander at Misenum, Pliny sailed toward Vesuvius to investigate and rescue survivors. Overcome by volcanic gases on the beach at Stabiae. His nephew's letters to Tacitus provide the most detailed ancient account of a volcanic eruption."}],paths:[[45.81,9.08,41.9,12.5,"From Como to Rome"],[41.9,12.5,40.72,14.48,"Fatal investigation of Vesuvius"]],facts:["37 volumes, 2,000+ sources","First encyclopedia","Died investigating Vesuvius"]},
{id:"sci6",cat:"science",name:"Vitruvius & De Architectura",y1:-80,y2:-15,desc:"Only surviving ancient architecture treatise — firmitas, utilitas, venustas shaped building for 2,000 years.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Dedicated to Augustus.",wiki:"Marcus Vitruvius Pollio served as a military engineer under Caesar and Augustus. His De Architectura (Ten Books on Architecture) is the only complete architectural treatise from antiquity. It covers city planning, building materials, temples, public buildings, water supply, astronomy, and machines. His three principles — firmitas (strength), utilitas (functionality), venustas (beauty) — became the foundation of Western architecture. Rediscovered in 1414, it directly inspired Brunelleschi, Alberti, Palladio, and the entire Renaissance."}],paths:[],facts:["Firmitas, utilitas, venustas","Only surviving ancient architecture text","Inspired the entire Renaissance"]},
{id:"sci7",cat:"science",name:"Roman Surveying & Measurement",y1:-300,y2:400,desc:"Groma, libella, and chorobates — precision tools that laid out cities, roads, and empire.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Standardized measurement across the empire.",wiki:"Roman surveyors (agrimensores or gromatici) used the groma — a cross-shaped sighting instrument — to lay out perfectly straight roads, grid-planned cities, and land divisions (centuriation). The libella was a simple level; the chorobates a 20-foot leveling bench used for aqueduct gradients. Standard units: the Roman foot (29.6 cm), pace (5 feet), mile (1,000 paces = 1,480m), and iugerum (land measure)."},{n:"Pompeii",lat:40.75,lng:14.49,info:"Groma found in surveyor's workshop.",wiki:"An intact groma was found in a surveyor's workshop in Pompeii — one of the few surviving Roman surveying instruments. The city's grid plan demonstrates the precision these tools could achieve."},{n:"Orange",lat:44.14,lng:4.81,info:"Marble cadastral map — largest surviving Roman survey.",wiki:"Three large marble fragments at Orange (Arausio) in France preserve part of a Roman cadastral survey — a detailed map of land division showing plots, roads, and waterways. The most extensive surviving example of Roman centuriation mapping."}],paths:[[41.9,12.5,40.75,14.49,"Surveyor's tools found at Pompeii"],[41.9,12.5,44.14,4.81,"Cadastral surveys in Gaul"]],facts:["Groma: cross-staff sighting tool","Roman mile: 1,000 paces (1,480m)","Centuriation grid visible from space"]},
{id:"sci8",cat:"science",name:"Hero of Alexandria",y1:10,y2:70,desc:"Aeolipile (steam engine), automatons, vending machines — genius 1,800 years ahead of his time.",locs:[{n:"Alexandria",lat:31.2,lng:29.9,info:"Worked at the Museum of Alexandria.",wiki:"Hero (Heron) of Alexandria was a mathematician and engineer who invented devices astonishingly ahead of their time. The aeolipile was the first known steam-powered device — a spinning sphere driven by steam jets. He built the first vending machine (coin-operated holy water dispenser), automatic doors for temples, a wind-powered organ, and a programmable cart driven by falling weights and strings. His Metrica contained formulas for calculating areas and volumes. None of his inventions were developed industrially — slavery made labor-saving devices economically unnecessary."}],paths:[],facts:["Aeolipile: first steam device","First vending machine","Slavery made labor-saving machines unnecessary"]},
{id:"sci9",cat:"science",name:"Frontinus & Rome's Water Supply",y1:40,y2:103,desc:"De Aquaeductu: the engineering manual that kept a million Romans hydrated.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Water commissioner (curator aquarum) under Nerva.",wiki:"Sextus Julius Frontinus served as governor of Britain, consul three times, and curator aquarum (water commissioner) from 97 AD. His De Aquaeductu Urbis Romae is the most detailed surviving account of Roman hydraulic engineering. He documented Rome's 9 aqueducts (11 by later counts), their sources, lengths, capacities, and maintenance. He calculated total daily flow at nearly 1 million cubic meters — more per capita than many modern cities. He exposed widespread illegal tapping and water theft by corrupt officials."}],paths:[],facts:["9 aqueducts documented","~1 million m3/day","Exposed widespread water theft"]},
{id:"sci10",cat:"science",name:"Roman Glassmaking",y1:-50,y2:400,desc:"Syrian glassblowing revolutionized production — glass went from luxury to everyday commodity.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Glass vessels became affordable for ordinary Romans.",wiki:"Glassblowing was invented in Syria around 50 BC and spread rapidly through the Roman world. Before this, glass was a luxury formed by slow casting. Blowing allowed mass production — prices dropped 90%. By the 1st century AD, glass tableware, storage jars, and even window panes were common. Roman glassmakers achieved extraordinary artistry: the Portland Vase (cameo glass), cage cups (diatretum — glass carved into a freestanding cage), and millefiori techniques."},{n:"Sidon",lat:33.56,lng:35.37,info:"Birthplace of glassblowing.",wiki:"Modern Saida, Lebanon. Syrian glassblowers revolutionized the craft around 50 BC. The technique spread through the Mediterranean within decades. Sidon remained a premium glass center throughout the Roman period."},{n:"Colonia Agrippina",lat:50.94,lng:6.96,info:"Modern Cologne — major glass production center.",wiki:"Cologne became the premier glass-producing center north of the Alps. Rhineland workshops produced the famous snake-thread glass, cage cups, and engraved vessels. Glass fragments are among the most common finds at Roman sites across northern Europe."}],paths:[[33.56,35.37,41.9,12.5,"Glassblowing spreads from Syria to Rome"],[41.9,12.5,50.94,6.96,"Glass production reaches the Rhineland"]],facts:["Glassblowing invented ~50 BC in Syria","Prices dropped 90%","Portland Vase: masterpiece of cameo glass"]},
{id:"sci11",cat:"science",name:"The Julian Calendar",y1:-46,y2:1582,desc:"Caesar's reform with Sosigenes — 365.25-day year, leap years. Used for 1,600 years until the Gregorian correction.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Introduced January 1, 45 BC.",wiki:"Julius Caesar, as Pontifex Maximus, reformed the chaotic Roman calendar in 46 BC with help from the Alexandrian astronomer Sosigenes. The old lunar calendar had drifted so far that winter festivals fell in autumn. Caesar's solar calendar had 365 days with a leap day every 4 years — averaging 365.25 days. The actual solar year is 365.2422 days, so the Julian Calendar gained about 11 minutes per year. By 1582, it was 10 days off, prompting Pope Gregory XIII's reform. July was renamed for Julius Caesar himself."},{n:"Alexandria",lat:31.2,lng:29.9,info:"Sosigenes, the astronomer who designed the reform, came from here.",wiki:"Sosigenes of Alexandria provided the astronomical expertise for Caesar's reform, drawing on centuries of Egyptian and Greek solar observation. Alexandria's Great Library had accumulated precise astronomical records that made the 365.25-day calculation possible."}],paths:[[31.2,29.9,41.9,12.5,"Alexandrian astronomy reforms the Roman calendar"]],facts:["365.25-day year with leap years","Used for 1,600 years","July named for Julius Caesar"]},
{id:"sci12",cat:"science",name:"Celsus & De Medicina",y1:25,y2:35,desc:"Only surviving Roman medical encyclopedia — the four signs of inflammation and sophisticated surgical techniques.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Written during the reign of Tiberius.",wiki:"Aulus Cornelius Celsus wrote De Medicina around 25-35 AD as part of a larger encyclopedia. It's the only surviving Roman medical textbook and the best source for ancient medical practice. Celsus defined the four classic signs of inflammation — rubor (redness), tumor (swelling), calor (heat), and dolor (pain) — still taught in medical schools today. He described surgical operations for cataracts, hernias, bladder stones, and tonsils with remarkable precision. The work was rediscovered in 1443 and was among the first medical texts printed (1478)."}],paths:[],facts:["Four signs of inflammation: rubor, tumor, calor, dolor","Described cataract and hernia surgery","Among the first medical texts ever printed (1478)"]},
{id:"sci13",cat:"science",name:"Roman Agricultural Science",y1:-160,y2:65,desc:"Cato, Varro, Columella — scientific farming treatises covering crop rotation, estate management, and animal husbandry.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Center of agricultural knowledge compilation.",wiki:"Three major Roman agricultural treatises survive. Cato the Elder's De Agri Cultura (c. 160 BC) — the oldest surviving Latin prose work — is a practical handbook for estate management, including recipes for wine and bread. Varro's Res Rusticae (37 BC) is more systematic, covering farm layout, livestock, and even poultry. Columella's De Re Rustica (c. 65 AD) — 12 books — is the most comprehensive: soil types, crop rotation, viticulture, arboriculture, animal husbandry, and fish farming. Together, they document a sophisticated agricultural science."},{n:"Gades",lat:36.53,lng:-6.3,info:"Columella's birthplace — modern Cadiz.",wiki:"Lucius Junius Moderatus Columella was born in Gades (Cadiz), Spain. He served in the military in Syria before retiring to farm in Italy. His De Re Rustica is the most detailed agricultural manual from antiquity — including a book on gardening written in hexameter verse."}],paths:[[36.53,-6.3,41.9,12.5,"From Gades to Rome: Columella's agricultural knowledge"]],facts:["Cato: oldest surviving Latin prose work","Columella: 12 books on every aspect of farming","Varro: even covered poultry management"]},
{id:"sci14",cat:"science",name:"Dioscorides & Pharmacology",y1:40,y2:90,desc:"De Materia Medica: 600 plants, 1,000+ medicines — the standard pharmacological reference for 1,500 years.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Dioscorides served as a Roman military physician.",wiki:"Pedanius Dioscorides served as a physician with Roman armies, collecting plant specimens across the Mediterranean. His De Materia Medica (c. 70 AD) catalogs about 600 plants and over 1,000 medicinal preparations. It was the world's most influential pharmacological text for 1,500 years — used by Arab, Byzantine, and European physicians into the 17th century. He described the medicinal uses of opium, willow bark (aspirin precursor), and aloe vera."},{n:"Anazarbus",lat:37.25,lng:35.9,info:"Dioscorides' birthplace in Cilicia (modern Turkey).",wiki:"Anazarbus (modern Anavarza, Turkey) was Dioscorides' birthplace. A Greek-speaking city in Roman Cilicia, it produced one of antiquity's most influential scientists. His empirical approach — testing remedies personally and recording observations — anticipated modern pharmacology."}],paths:[[37.25,35.9,41.9,12.5,"From Cilicia to military service: Dioscorides' botanical journeys"]],facts:["600 plants and 1,000+ medicines cataloged","Standard reference for 1,500 years","Described opium, willow bark (aspirin precursor), aloe vera"]},
{id:"sci15",cat:"science",name:"Roman Mapmaking",y1:-12,y2:400,desc:"Agrippa's world map, the Forma Urbis Romae (marble plan of Rome), and the Tabula Peutingeriana.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Center of Roman cartographic efforts.",wiki:"Marcus Vipsanius Agrippa (Augustus' right-hand man) created a monumental world map displayed in the Porticus Vipsania after his death in 12 BC — measuring the known world from road surveys. The Forma Urbis Romae, commissioned by Septimius Severus around 203 AD, was a massive marble plan of Rome (18 x 13 meters) mounted on a temple wall — 1,186 fragments survive, showing every room of every building. The Tabula Peutingeriana — a medieval copy of a Roman original — is a 6.75-meter scroll showing the entire Roman road network from Britain to India, with distances, rest stops, and major cities."}],paths:[],facts:["Agrippa's world map: first comprehensive Roman atlas","Forma Urbis: marble plan showing every building in Rome","Tabula Peutingeriana: 6.75m scroll of all Roman roads"]},
{id:"sci16",cat:"science",name:"Roman Surgery & Surgical Instruments",y1:-100,y2:400,desc:"Cataract couching, trepanning, amputation — 200+ instrument types found. Better than medieval surgery.",locs:[{n:"Pompeii",lat:40.75,lng:14.49,info:"House of the Surgeon: 40+ instruments found.",wiki:"Roman surgical practice was remarkably sophisticated. Over 200 types of surgical instruments have been identified — scalpels, forceps, bone levers, specula, catheters, and trepanning tools. The House of the Surgeon at Pompeii yielded 40+ instruments. Celsus describes cataract couching (pushing the clouded lens aside with a needle), lithotomy (bladder stone removal), hernia repair, and plastic surgery for circumcision reversal. Galen performed brain surgery and eye operations."},{n:"Rimini",lat:44.06,lng:12.57,info:"Domus del Chirurgo: over 150 instruments found — the richest find.",wiki:"The Domus del Chirurgo (House of the Surgeon) at Rimini (Ariminum) yielded over 150 surgical instruments — the largest collection ever found at a single Roman site. The instruments suggest the doctor practiced general surgery, ophthalmology, orthopedics, and gynecology. The quality of craftsmanship rivals modern equivalents."},{n:"Rome",lat:41.9,lng:12.5,info:"Military and civilian surgeons practiced across the city.",wiki:"Rome had both military surgeons (attached to legions) and civilian practitioners. Archagathus — the first Greek surgeon in Rome (219 BC) — was initially called 'the Healer' but was renamed 'the Butcher' after too many amputations. By the Empire, surgery was sophisticated enough that it was not surpassed until the 18th century."}],paths:[[40.75,14.49,44.06,12.57,"Surgical knowledge across Italy"]],facts:["200+ instrument types identified","Celsus described cataract and hernia surgery","Not surpassed until the 18th century"]},
{id:"sci17",cat:"science",name:"Roman Metallurgy",y1:-500,y2:400,desc:"Steel weapons, lead pipes, bronze statuary — Greenland ice cores show Roman lead pollution peaked in the 1st century AD.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Massive demand for metals drove mining across the empire.",wiki:"Roman metallurgy was the most advanced in the ancient world. Iron was smelted in shaft furnaces reaching 1,200°C — not enough to fully melt iron, but sufficient to produce steel (carburized iron) for weapons and tools. Bronze casting produced large statues: the Marcus Aurelius equestrian statue is a masterpiece. Lead was used extensively for pipes, coffins, and as a sweetener (lead acetate in wine). Greenland ice cores show that atmospheric lead pollution peaked during the Roman period — not surpassed until the Industrial Revolution."},{n:"Rio Tinto",lat:37.69,lng:-6.6,info:"Massive Roman mining complex in Spain.",wiki:"Rio Tinto in Spain was one of the largest mining operations in the Roman world. Copper, gold, and silver were extracted using water-powered stamp mills and Archimedean screws for drainage. Slag heaps from Roman operations contain millions of tons of waste. The pollution was so severe that 2,000-year-old slag still contaminates local rivers."}],paths:[[41.9,12.5,37.69,-6.6,"Spanish metals flow to Rome"]],facts:["Greenland ice cores show Roman lead pollution peak","Steel weapons produced by carburization","Rio Tinto slag still pollutes rivers today"]},
{id:"sci18",cat:"science",name:"Soranus & Women's Medicine",y1:98,y2:138,desc:"Gynecology and obstetrics — described contraception, pregnancy, childbirth. Most advanced ancient text on women's health.",locs:[{n:"Ephesus",lat:37.94,lng:27.34,info:"Soranus' birthplace — a center of medical learning.",wiki:"Soranus of Ephesus (fl. 98-138 AD) wrote the most comprehensive ancient text on gynecology and obstetrics. His Gynecology covers menstruation, conception, pregnancy, difficult births, newborn care, and gynecological diseases. He described contraceptive methods (pessaries, barrier methods, timing), criteria for selecting a wet nurse, and techniques for turning breech babies. He rejected common superstitions and insisted on rational, empirical medicine."},{n:"Rome",lat:41.9,lng:12.5,info:"Soranus practiced medicine in Rome.",wiki:"Soranus practiced in Rome under Trajan and Hadrian. He belonged to the Methodist school of medicine (which focused on the body's states of tension and relaxation). His work influenced Muscio's Latin abridgement, which remained the standard obstetric text in medieval Europe. His description of infant care was not improved upon for centuries."}],paths:[[37.94,27.34,41.9,12.5,"From Ephesus to Rome"]],facts:["Most advanced ancient text on women's health","Described contraception and obstetric techniques","Standard reference into the medieval period"]},
{id:"sci19",cat:"science",name:"Roman Astronomy & Timekeeping",y1:-200,y2:400,desc:"Sundials, water clocks, Manilius' Astronomica — Augustus' great sundial on the Campus Martius used an Egyptian obelisk.",locs:[{n:"Rome/Campus Martius",lat:41.9,lng:12.47,info:"Augustus' Solarium: an obelisk as gnomon for a giant sundial.",wiki:"Roman timekeeping relied on sundials (horologia solaria) and water clocks (clepsydrae). Augustus erected an enormous sundial on the Campus Martius using a 30-meter Egyptian obelisk (from Heliopolis) as the gnomon — its shadow tracked the hours and seasons across a pavement of bronze inlays. The Romans divided daylight into 12 hours regardless of season, so 'hours' varied in length throughout the year. Manilius' Astronomica (c. 10 AD) was the first Latin poem on astrology and astronomy."},{n:"Alexandria",lat:31.2,lng:29.9,info:"Source of astronomical knowledge that Rome adopted.",wiki:"Roman astronomical knowledge came primarily from Greek and Egyptian sources via Alexandria. Ptolemy's Almagest (c. 150 AD) — written in Roman Egypt — presented the geocentric model that dominated astronomy for 1,400 years. Roman practical astronomy focused on the calendar (Julian reform), agricultural timing, navigation, and astrology — which was enormously popular; emperors kept court astrologers."}],paths:[[31.2,29.9,41.9,12.47,"Alexandrian astronomy reaches Rome"]],facts:["Augustus' sundial: 30m obelisk as gnomon","Roman 'hours' varied by season","Ptolemy's geocentric model lasted 1,400 years"]},
{id:"sci20",cat:"science",name:"Roman Veterinary Medicine",y1:-200,y2:400,desc:"Vegetius' Mulomedicina — the army depended on healthy horses and mules. Livestock management was a science.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Veterinary care was essential for the military and agriculture.",wiki:"Roman veterinary medicine (ars veterinaria — the term itself comes from Latin veterinae, 'beasts of burden') was a practical science driven by military and agricultural needs. Vegetius Renatus (4th-5th century AD) wrote the Mulomedicina (also called Digesta Artis Mulomedicinae) — the most comprehensive ancient veterinary text. It covers horse diseases, surgical procedures, drug treatments, and stable management. Columella's agricultural treatise devotes extensive sections to livestock health. The Roman army employed veterinary specialists (medici veterinarii) — a healthy cavalry depended on healthy horses."}],paths:[],facts:["'Veterinary' comes from Latin veterinae","Vegetius: most comprehensive ancient veterinary text","Roman army employed specialist veterinary doctors"]},
// DAILY LIFE & SOCIETY
{id:"dlf1",cat:"daily",name:"The Roman House: Domus & Insulae",y1:-200,y2:400,desc:"Wealthy lived in atrium-centered domus. Poor crammed into 5-7 story insulae prone to fire.",locs:[{n:"Pompeii",lat:40.75,lng:14.49,info:"House of the Faun — largest domus in Pompeii.",wiki:"The wealthy Roman domus was organized around an atrium (open-roofed hall that collected rainwater) and peristyle (columned garden). The House of the Faun in Pompeii covered an entire city block with 40 rooms, two atria, and the famous Alexander Mosaic. Rooms were lavishly painted with frescoes."},{n:"Ostia",lat:41.76,lng:12.29,info:"Best-preserved insulae (apartment blocks).",wiki:"Most Romans lived in insulae — apartment blocks of 5-7 stories housing hundreds of tenants. Ground floors had shops; upper floors were cheaper and more dangerous. No running water above ground floor. Fires were constant — Juvenal joked that by the time you woke, your third-floor neighbor was already on fire. Augustus limited height to 70 Roman feet (~20m)."}],paths:[[40.75,14.49,41.76,12.29,"Domus luxury vs insulae reality"]],facts:["Insulae: 5-7 stories","Augustus limited building height","House of the Faun: 40 rooms"]},
{id:"dlf2",cat:"daily",name:"Roman Food & Dining",y1:-200,y2:400,desc:"Garum on everything, three-course dinners reclined on couches, wine mixed with water.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Cena (dinner) was the main meal — eaten reclining.",wiki:"Romans ate three meals: ientaculum (breakfast — bread and cheese), prandium (lunch — cold leftovers), and cena (dinner — the main event). Wealthy Romans reclined on couches (triclinium) for dinner. A formal cena had three courses: gustatio (appetizers), mensa prima (main), and mensa secunda (dessert). Wine was always mixed with water — drinking it neat was considered barbaric."},{n:"Pompeii",lat:40.75,lng:14.49,info:"Thermopolia: ancient fast-food counters.",wiki:"Over 150 thermopolia (hot-food counters) have been found in Pompeii — the ancient equivalent of fast food. They served hot stews, lentils, and wine to workers who had no kitchen. Recent excavations found a thermopolium with food still in the pots: duck, goat, fish, and snails."}],paths:[],facts:["Garum (fermented fish sauce) on everything","Wine always mixed with water","150+ thermopolia in Pompeii"]},
{id:"dlf3",cat:"daily",name:"The Toga & Roman Fashion",y1:-509,y2:400,desc:"The toga = citizenship. 6 meters of draped wool. Tyrian purple worth more than gold.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Toga wearing was a citizen's right and duty.",wiki:"The toga was the quintessential Roman garment — 6 meters of semicircular wool draped without pins or stitches. It was heavy, hot, and impractical, which was the point: only a citizen of leisure needed to wear one. The toga praetexta (with purple border) was worn by magistrates and freeborn boys. The toga candida (whitened with chalk) was worn by political candidates — origin of 'candidate.'"},{n:"Tyre",lat:33.27,lng:35.2,info:"Source of Tyrian purple dye — worth more than gold.",wiki:"Tyrian purple was extracted from murex sea snails — 12,000 snails produced 1.5g of dye. A pound of purple-dyed wool cost more than a pound of gold. Only emperors could wear the toga picta (solid purple). Wearing unauthorized purple was treason."}],paths:[[33.27,35.2,41.9,12.5,"Tyrian purple: from Phoenicia to the emperor"]],facts:["6 meters of draped wool","12,000 snails = 1.5g of dye","Unauthorized purple = treason"]},
{id:"dlf4",cat:"daily",name:"Women in Rome",y1:-753,y2:476,desc:"Citizens but couldn't vote. Cornelia was the ideal matron. Fulvia commanded armies.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Legal status improved over centuries.",wiki:"Roman women were citizens but could not vote, hold office, or serve in the army. Early Republic: women were under perpetual male guardianship (tutela). By the late Republic, loopholes let wealthy women manage property, run businesses, and wield political influence. Cornelia, mother of the Gracchi, embodied the ideal matron — she called her sons 'my jewels.' Fulvia (wife of Antony) raised troops and commanded armies. Livia governed alongside Augustus for 51 years. Freedwomen and slaves had far fewer rights."}],paths:[],facts:["Citizens but couldn't vote","Cornelia: 'These are my jewels' (her sons)","Fulvia commanded armies"]},
{id:"dlf5",cat:"daily",name:"Roman Education & Literacy",y1:-240,y2:400,desc:"Three tiers: ludus, grammaticus, rhetor. Greek tutors. Literacy crucial for politics and trade.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Education was private — no state schools.",wiki:"Roman education had three tiers. The ludus (ages 7-12): reading, writing, arithmetic. The grammaticus (12-15): literature, grammar, Greek. The rhetor (15+): rhetoric, public speaking, law. Teachers were often Greek slaves or freedmen. Girls could attend the ludus but rarely went further. Boys of the elite studied philosophy in Athens. Literacy rates debated — perhaps 15-20% overall, much higher in cities."},{n:"Ephesus",lat:37.94,lng:27.34,info:"Library of Celsus held 12,000 scrolls.",wiki:"The Library of Celsus at Ephesus, built ~117 AD, held 12,000 scrolls. Its elegant facade (restored) is one of the most photographed Roman ruins. Libraries were status symbols for cities across the empire."},{n:"Athens",lat:37.98,lng:23.73,info:"Elite Romans studied philosophy here.",wiki:"Athens remained the intellectual capital. Young elite Romans — Cicero, Horace, Brutus — studied at the Academy, Lyceum, and Stoa. Marcus Aurelius endowed four chairs of philosophy (Platonic, Aristotelian, Stoic, Epicurean) in 176 AD."}],paths:[[41.9,12.5,37.94,27.34,"Libraries spread across the empire"],[41.9,12.5,37.98,23.73,"Elite youth study in Athens"]],facts:["Three tiers: ludus, grammaticus, rhetor","Teachers often Greek slaves","~15-20% literacy rate"]},
{id:"dlf6",cat:"daily",name:"Roman Baths & Social Life",y1:-200,y2:537,desc:"900+ bathhouses in 4th-century Rome — the social hub for exercise, business, gossip, and relaxation.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Baths of Diocletian: largest thermae, 3,000 bathers.",wiki:"By the 4th century, Rome had over 900 bathhouses ranging from small neighborhood balnea to massive imperial thermae. The Baths of Diocletian (completed 306 AD) accommodated 3,000 bathers simultaneously. A typical visit followed a circuit: undress in the apodyterium, exercise in the palaestra, sweat in the laconicum (sauna), bathe in the caldarium (hot), tepidarium (warm), and frigidarium (cold). Admission was cheap — sometimes free. Baths were where Romans socialized, conducted business, and displayed status. They operated until the Goths cut Rome's aqueducts in 537."},{n:"Bath",lat:51.38,lng:-2.36,info:"Aquae Sulis — sacred hot springs in Britain.",wiki:"Modern Bath, England. Natural hot springs dedicated to the goddess Sulis Minerva. The Roman complex included a temple, bathing suite, and sacred spring that produced 1.2 million liters of 46°C water daily. The gilded bronze head of Minerva and thousands of curse tablets thrown into the spring survive."}],paths:[[41.9,12.5,51.38,-2.36,"Bathing culture reaches the frontiers"]],facts:["900+ bathhouses in 4th-century Rome","Baths of Diocletian: 3,000 bathers","Goths cut the aqueducts in 537"]},
{id:"dlf7",cat:"daily",name:"Slavery in Daily Life",y1:-300,y2:400,desc:"One in three people in Italy were enslaved — from mine slaves who lived months to Greek tutors who ran households.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"2-3 million slaves in Italy alone.",wiki:"Slavery was fundamental to Roman society. Wealthy households had hundreds of slaves serving as cooks, cleaners, tutors, secretaries, doctors, and entertainers. Urban slaves could accumulate a peculium (personal fund) and buy freedom. Freed slaves (liberti) could become wealthy — some became richer than senators. But conditions varied enormously: mine slaves at Laurion or Carthago Nova rarely survived more than a few months."},{n:"Delos",lat:37.4,lng:25.27,info:"Largest slave market — 10,000 sold per day at peak.",wiki:"The island of Delos was the Mediterranean's largest slave market. At its peak in the 2nd-1st centuries BC, ancient sources claim 10,000 slaves could be bought and sold in a single day. Slaves came from war, piracy, debt, and breeding."},{n:"Laurion",lat:37.73,lng:24.05,info:"Silver mines worked by tens of thousands of slaves.",wiki:"The Laurion silver mines in Attica employed up to 30,000 slaves in horrific conditions. Tunnel heights as low as 1 meter. Similar conditions existed in Spanish mines. Life expectancy in the mines was measured in months."}],paths:[[37.4,25.27,41.9,12.5,"Slave trade from Delos to Rome"],[41.9,12.5,37.73,24.05,"Slaves sent to the mines"]],facts:["1 in 3 people in Italy enslaved","10,000/day at Delos","Freedmen could become wealthier than senators"]},
{id:"dlf8",cat:"daily",name:"Roman Marriage & Family",y1:-500,y2:400,desc:"Patria potestas: father's absolute power over life and death. Confarreatio, dowry, and easy divorce.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"The family (familia) was the basic unit of Roman society.",wiki:"The Roman paterfamilias held patria potestas — absolute legal power over his children, including (in theory) the right of life and death. Marriage forms ranged from the elaborate confarreatio (bread-sharing ceremony for patricians, presided by the Pontifex Maximus) to the informal usus (cohabitation for a year). Dowry (dos) passed from the bride's family to the husband. By the late Republic, divorce was easy and frequent — either party could initiate it. Augustus' moral legislation (Lex Julia, 18 BC) tried to encourage marriage and childbearing with penalties for the unmarried and rewards for large families."}],paths:[],facts:["Patria potestas: father's absolute power","Augustus penalized the unmarried","Divorce was easy by late Republic"]},
{id:"dlf9",cat:"daily",name:"Gladiators & the Arena",y1:-264,y2:404,desc:"Murmillo, retiarius, secutor — trained fighters, not just death. Many survived long careers.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Colosseum: 50,000 spectators for gladiatorial combat.",wiki:"Gladiatorial combat began as funeral rites in 264 BC and grew into a massive entertainment industry. Gladiators were trained in specialized types: the murmillo (heavy infantry with fish-crest helmet), retiarius (net and trident), secutor (pursuer), thraex (curved sword). Training took place in ludi (schools) under a lanista. Contrary to popular belief, most fights were not to the death — trained gladiators were expensive investments. Gravestones show fighters with careers of 30+ bouts. Some became celebrities with fan followings. The games were banned by Honorius in 404 AD."},{n:"Pompeii",lat:40.75,lng:14.49,info:"Amphitheatre: oldest surviving stone amphitheatre (70 BC).",wiki:"Pompeii's amphitheatre, built ~70 BC, is the oldest known stone amphitheatre. Graffiti names popular fighters and their records. Barracks nearby housed gladiators — 63 skeletons were found, including a richly jeweled woman."},{n:"Capua",lat:41.1,lng:14.2,info:"Greatest gladiator school — where Spartacus trained.",wiki:"Capua was home to the most famous gladiator school. Spartacus escaped from Lentulus Batiatus' ludus here in 73 BC with 70 fellow gladiators, sparking the largest slave revolt in Roman history."}],paths:[[41.1,14.2,41.9,12.5,"Gladiator culture spreads from Campania to Rome"],[41.9,12.5,40.75,14.49,"Gladiatorial combat across the empire"]],facts:["Most fights not to the death","Murmillo, retiarius, secutor types","Banned 404 AD by Honorius"]},
{id:"dlf11",cat:"daily",name:"Roman Children & Childhood",y1:-200,y2:400,desc:"Bulla amulet, naming day, 50% infant mortality — childhood was brief and perilous.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Children's lives governed by strict ritual and high mortality.",wiki:"Roman childhood was shaped by high mortality — roughly 50% of children died before age 10. A newborn was placed at the father's feet; if he raised it (tollere), it lived. Exposure of unwanted infants was legal. The dies lustricus (naming day, 8th day for girls, 9th for boys) marked social acceptance. Children wore the bulla — a gold or leather amulet against evil spirits. Boys assumed the toga virilis at 14-16, marking manhood. Girls typically married at 12-14. Despite the brevity, archaeological evidence shows children played with dolls, toy chariots, and pet animals."},{n:"Pompeii",lat:40.75,lng:14.49,info:"Children's toys and graffiti preserved here.",wiki:"Pompeii has yielded touching evidence of childhood: a child's cradle, bronze bells, marble game pieces, and graffiti by children learning to write. One scrawl reads 'Gaius was here' — a boy's version of the universal impulse to leave a mark. Plaster casts include children caught in the eruption."}],paths:[],facts:["~50% infant mortality before age 10","Bulla amulet worn until manhood","Girls married at 12-14, boys at 14-16"]},
{id:"dlf12",cat:"daily",name:"Death & Funerary Practices",y1:-753,y2:400,desc:"Cremation gave way to inhumation — funeral processions, ancestor masks, catacombs, and tombs lining the Via Appia.",locs:[{n:"Rome/Via Appia",lat:41.85,lng:12.52,info:"Lined with tombs for miles outside the city walls.",wiki:"Roman law forbade burial within the city walls, so tombs lined the roads outside — most famously the Via Appia. Republican and early Imperial Romans practiced cremation; ashes were placed in urns in columbaria (niche-tombs). From the 2nd century AD, inhumation in sarcophagi became dominant. Aristocratic funerals featured professional mourners, musicians, and actors wearing ancestor masks (imagines) — creating a procession of the family's entire history. The Christian catacombs beneath Rome contain over 6 million burials in 600 km of tunnels."},{n:"Rome/Catacombs",lat:41.86,lng:12.51,info:"Christian catacombs: 600 km of tunnels, 6 million burials.",wiki:"The catacombs of Rome are vast underground cemeteries, mostly Christian, dating from the 2nd-5th centuries AD. Over 40 catacombs have been discovered. The Catacomb of San Callisto alone held 16 popes. Wall paintings depict biblical scenes and early Christian symbols. Contrary to popular belief, the catacombs were not hiding places during persecutions — they were known to the authorities."}],paths:[],facts:["Cremation (Republic) to inhumation (Empire)","Ancestor masks worn in funeral processions","600 km of catacombs, 6 million burials"]},
{id:"dlf13",cat:"daily",name:"Roman Games & Leisure",y1:-300,y2:400,desc:"Dice, board games, ball games, gambling — baths as entertainment centers. Romans played hard.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Gambling was technically illegal but universal.",wiki:"Romans were passionate about games and leisure. Dice (tesserae) and knucklebones (tali) were everywhere — gambling was technically illegal but universally practiced. Board games included ludus latrunculorum (strategy, similar to chess), tabula (like backgammon), and ludus duodecim scriptorum (twelve-line game). Ball games (trigon — three-player catch, harpastum — violent rugby-like game) were played in palaestrae. Baths served as entertainment complexes with gardens, libraries, lecture halls, and snack bars. On public holidays — which numbered 135 days per year by the 4th century — the state provided chariot races, gladiatorial games, and theater."},{n:"Pompeii",lat:40.75,lng:14.49,info:"Game boards scratched into streets and tavern counters.",wiki:"Pompeii preserves game boards scratched into pavement, tavern counters, and forum steps. Dice, game pieces, and playing-board graffiti appear throughout the city. One graffito reads: 'I won 855 sestertii without cheating' — probably a lie."}],paths:[],facts:["135 public holidays per year by the 4th century","Ludus latrunculorum: Roman chess","Gambling illegal but universally practiced"]},
{id:"dlf14",cat:"daily",name:"Roman Crime & Punishment",y1:-500,y2:400,desc:"Vigiles as fire-police, crucifixion, exile, damnatio ad bestias — no prisons; punishment was immediate.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Vigiles patrolled the streets at night.",wiki:"Rome had no police force until Augustus created the vigiles (7,000 freedmen) in 6 AD — primarily a fire brigade that also handled nighttime disorder. Daytime security fell to the urban cohorts. Roman criminal law was class-based: honestiores (upper classes) faced exile or fines; humiliores (lower classes) faced execution, forced labor in mines, or condemnation to the beasts (damnatio ad bestias). Crucifixion was reserved for slaves and non-citizens. Rome had no long-term prisons — the Tullianum (Mamertine Prison) was a holding cell for execution. Punishment was public, exemplary, and immediate."}],paths:[],facts:["Vigiles: 7,000-strong fire brigade and night watch","No long-term prisons — punishment was immediate","Crucifixion for slaves and non-citizens only"]},
{id:"dlf16",cat:"daily",name:"Roman Patronage & the Salutatio",y1:-200,y2:400,desc:"Clients visited patrons each dawn for the morning greeting — sportula cash handout. Martial complained bitterly. Social glue of Rome.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Every morning, clients thronged patrons' doorways.",wiki:"The salutatio (morning greeting) was one of Rome's most distinctive social rituals. Before dawn, clients (clientes) donned their togas and walked — sometimes across the entire city — to their patron's house. They waited in the vestibule until admitted to greet the patron formally: 'Ave, domine' (Hail, master). In return, they received the sportula — originally a basket of food, later a cash dole of 6.25 sestertii (about a day's basic expenses). Martial's epigrams are filled with bitter humor about this system: the humiliation of waiting in the cold, the stingy patron, the inedible dinner invitation. Yet the system worked: it bound rich and poor, powerful and weak, into a web of mutual obligation that sustained Rome's social order for centuries."}],paths:[],facts:["Sportula: 6.25 sestertii daily handout","Clients donned togas and walked before dawn","Martial: bitter chronicler of the client's life"]},
{id:"dlf17",cat:"daily",name:"Roman Pets & Animals",y1:-200,y2:400,desc:"Dogs, cats, birds, exotic pets — 'Cave canem' mosaics. Romans loved their animals as much as any modern society.",locs:[{n:"Pompeii",lat:40.75,lng:14.49,info:"'Cave canem' mosaics and dog skeletons found here.",wiki:"Romans kept a wide variety of pets. Dogs were most popular — the Molossian (mastiff type) for guarding, the Laconian (greyhound type) for hunting, and small lapdogs (catelli) as companions. The famous 'Cave canem' (Beware of the dog) mosaic at Pompeii's House of the Tragic Poet shows a chained black dog. Cats were valued as mousers. Wealthy Romans kept exotic pets: parrots taught to speak Latin, monkeys dressed in clothes, pet eels (Crassus allegedly wept when his died), and even tame deer. Pliny the Younger described wild dolphins that befriended swimmers."},{n:"Rome",lat:41.9,lng:12.5,info:"Exotic animal trade supplied both pets and arena.",wiki:"Rome's animal trade was enormous — supplying both the pet market and the arena. North Africa provided lions, leopards, and elephants. India sent tigers and parrots. Spain supplied horses. The trade depleted wildlife across three continents. By the 4th century, Hippo (North Africa) had no hippos left, and Numidia's lions were extinct."}],paths:[],facts:["'Cave canem': most famous Roman mosaic","Crassus allegedly wept for his pet eel","Animal trade depleted wildlife across three continents"]},
{id:"dlf18",cat:"daily",name:"Chariot Racing & the Factions",y1:-600,y2:549,desc:"Blues, Greens, Reds, Whites — 250,000 at Circus Maximus. Drivers were superstars. Nika riots started over factions.",locs:[{n:"Rome/Circus Maximus",lat:41.886,lng:12.485,info:"250,000 spectators — Rome's largest entertainment venue.",wiki:"Chariot racing was Rome's most popular entertainment — far surpassing gladiatorial combat. The Circus Maximus held 250,000 spectators (five times the Colosseum). Four factions — Blues, Greens, Reds, and Whites — competed with fanatical followings. Successful charioteers became incredibly wealthy: Gaius Appuleius Diocles (2nd century AD) earned 35,863,120 sestertii in his career — the highest-paid athlete in history adjusted for economy. Races were 7 laps around the spina (central barrier), at lethal speed. Crashes (naufragia — shipwrecks) were common and often fatal."},{n:"Constantinople/Hippodrome",lat:41.006,lng:28.975,info:"Factions became political parties — the Nika riots (532 AD).",wiki:"In Constantinople, chariot factions evolved into quasi-political parties. Blues and Greens had their own neighborhoods, leaders, and political agendas. In 532 AD, both factions united against Justinian in the Nika riots — 30,000 were killed. Chariot racing continued at the Hippodrome until 1204."}],paths:[[41.886,12.485,41.006,28.975,"Racing culture from Rome to Constantinople"]],facts:["Diocles: highest-paid athlete in history","250,000 spectators at Circus Maximus","Factions evolved into political parties"]},
{id:"dlf19",cat:"daily",name:"Roman Graffiti & Street Life",y1:-200,y2:79,desc:"11,000+ graffiti at Pompeii — election slogans, love poems, insults, ads. 'I wonder, O wall, that you have not fallen in ruins.'",locs:[{n:"Pompeii",lat:40.75,lng:14.49,info:"11,000+ graffiti — the voice of ordinary Romans.",wiki:"Pompeii preserves over 11,000 graffiti and dipinti (painted inscriptions) — the largest collection from the ancient world. They include: election slogans ('Vote for Vatia — all the drunks support him'), love declarations ('Successus the weaver loves Iris, the barmaid'), sexual boasts, philosophical musings, literary quotations (Virgil's opening line appears 9 times), obscene drawings, gladiator fan art, arithmetic practice, and the poignant 'I wonder, O wall, that you have not fallen in ruins, since you must bear the tedious scribblings of so many writers.' They are the authentic voice of ordinary Romans — unfiltered by literary convention."}],paths:[],facts:["11,000+ graffiti at Pompeii","'Vote for Vatia — all the drunks support him'","Virgil's opening line appears 9 times"]},
{id:"dlf20",cat:"daily",name:"Roman Holidays & the Calendar",y1:-753,y2:400,desc:"135 public holidays by the 4th century — Lupercalia, Parentalia, Saturnalia. Religion, entertainment, and politics merged.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Romans had more holidays than any modern nation.",wiki:"By the 4th century AD, the Roman calendar contained 135 public holidays (dies festi) — more than one in three days. Major festivals included: Lupercalia (February 15 — half-naked young men ran through the streets striking women with goatskin thongs for fertility), Parentalia (February 13-21 — nine days honoring the dead), Floralia (April 28-May 3 — spring festival with theatrical performances and flower-strewn streets), Ludi Romani (September — 15 days of games honoring Jupiter), and Saturnalia (December 17-23 — role reversals, gift-giving, feasting). Public holidays combined religious ritual, entertainment (chariot racing, gladiatorial games, theater), and political display (magistrates sponsored games to win votes). Juvenal's famous complaint: the Roman people cared only for 'bread and circuses' (panem et circenses)."}],paths:[],facts:["135 public holidays by the 4th century","Lupercalia: goatskin thongs for fertility","'Bread and circuses' — Juvenal's famous complaint"]},
{id:"dlf15",cat:"daily",name:"Freedmen & Social Mobility",y1:-200,y2:400,desc:"Manumission, Trimalchio's excess, imperial freedmen running the bureaucracy — social mobility in a slave society.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"Freedmen were crucial to Roman economic and political life.",wiki:"Roman slavery was uniquely characterized by manumission — the freeing of slaves was common, expected, and legally formalized. Freed slaves (liberti) became Roman citizens (with some restrictions). Some amassed extraordinary wealth: Petronius' fictional Trimalchio symbolized the nouveau-riche freedman. Real freedmen like Narcissus and Pallas — Claudius' secretaries — were among the wealthiest people in the empire and effectively ran the imperial bureaucracy. Their children faced no restrictions and could enter the Senate. The Roman system created remarkable social mobility within a fundamentally hierarchical society."},{n:"Pompeii",lat:40.75,lng:14.49,info:"Freedmen's tombs and businesses prominent here.",wiki:"Pompeii's evidence of freedmen is rich: the Tomb of the Augustales (freedmen priests of the imperial cult), the House of the Vettii (wealthy freedmen brothers with luxurious frescoes), and numerous shops and bakeries run by liberti. Eumachia, a freedmen-descended priestess, built the largest building on the Forum."}],paths:[],facts:["Manumission: slaves could buy or earn freedom","Freedmen ran the imperial bureaucracy","Their children could enter the Senate"]},
{id:"dlf10",cat:"daily",name:"Travel & the Cursus Publicus",y1:-200,y2:400,desc:"Imperial post system, mansiones every 25 miles, and the Tabula Peutingeriana road map.",locs:[{n:"Rome",lat:41.9,lng:12.5,info:"All roads led here — 90,000 km of highways.",wiki:"The Roman road network totaled ~400,000 km, with ~90,000 km of paved highways. Augustus established the cursus publicus — an imperial postal and transport system with relay stations (mutationes) every 10-15 miles for horse changes and mansiones (rest stops with lodging) every 25 miles. A courier could cover 80 km/day; urgent dispatches up to 250 km/day using relays. Civilians traveled by foot, cart, litter, or ship. Sea travel was faster but seasonal — Mare Clausum (closed sea) from November to March."},{n:"Ostia",lat:41.76,lng:12.29,info:"Rome's port — gateway to sea travel.",wiki:"Most long-distance travel was by ship. Rome to Alexandria took 10-14 days with favorable winds. Ostia and Portus were the main embarkation points. The Tabula Peutingeriana — a medieval copy of a Roman road map — shows the entire network with distances and rest stops, stretching from Britain to India."}],paths:[[41.9,12.5,41.76,12.29,"Roads and sea routes connect the empire"]],facts:["Cursus publicus: 80 km/day by courier","Mansiones every 25 miles","Tabula Peutingeriana: Roman road map"]}
