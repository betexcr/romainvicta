<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06060f"/>
      <stop offset="50%" stop-color="#0a0a18"/>
      <stop offset="100%" stop-color="#06060f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#06060f"/>
      <stop offset="100%" stop-color="#06060f"/>
    </radialGradient>
    <linearGradient id="goldLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06060f"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#06060f"/>
    </linearGradient>
    <linearGradient id="redAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06060f"/>
      <stop offset="50%" stop-color="#9B2335"/>
      <stop offset="100%" stop-color="#06060f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)" opacity="0.5"/>

  <!-- Border -->
  <rect x="20" y="20" width="1160" height="590" rx="4" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.15"/>
  <rect x="30" y="30" width="1140" height="570" rx="2" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.08"/>

  <!-- Decorative corner elements -->
  <g stroke="#C9A84C" stroke-width="1" fill="none" opacity="0.3">
    <path d="M40 60 L40 40 L60 40"/>
    <path d="M1160 60 L1160 40 L1140 40"/>
    <path d="M40 570 L40 590 L60 590"/>
    <path d="M1160 570 L1160 590 L1140 590"/>
  </g>

  <!-- Large laurel wreath left -->
  <g fill="none" stroke="#C9A84C" stroke-width="1.8" stroke-linecap="round" opacity="0.5">
    <path d="M340 420 C330 370, 320 320, 330 270 C340 220, 365 185, 400 160"/>
    <ellipse cx="332" cy="370" rx="12" ry="22" transform="rotate(-18 332 370)" fill="#C9A84C" opacity="0.15" stroke="#C9A84C"/>
    <ellipse cx="326" cy="330" rx="11" ry="20" transform="rotate(-8 326 330)" fill="#C9A84C" opacity="0.15" stroke="#C9A84C"/>
    <ellipse cx="330" cy="290" rx="10" ry="18" transform="rotate(5 330 290)" fill="#C9A84C" opacity="0.15" stroke="#C9A84C"/>
    <ellipse cx="342" cy="250" rx="10" ry="16" transform="rotate(15 342 250)" fill="#C9A84C" opacity="0.15" stroke="#C9A84C"/>
    <ellipse cx="358" cy="215" rx="9" ry="14" transform="rotate(25 358 215)" fill="#C9A84C" opacity="0.15" stroke="#C9A84C"/>
    <ellipse cx="380" cy="185" rx="8" ry="12" transform="rotate(35 380 185)" fill="#C9A84C" opacity="0.15" stroke="#C9A84C"/>
  </g>

  <!-- Large laurel wreath right -->
  <g fill="none" stroke="#C9A84C" stroke-width="1.8" stroke-linecap="round" opacity="0.5">
    <path d="M860 420 C870 370, 880 320, 870 270 C860 220, 835 185, 800 160"/>
    <ellipse cx="868" cy="370" rx="12" ry="22" transform="rotate(18 868 370)" fill="#C9A84C" opacity="0.15" stroke="#C9A84C"/>
    <ellipse cx="874" cy="330" rx="11" ry="20" transform="rotate(8 874 330)" fill="#C9A84C" opacity="0.15" stroke="#C9A84C"/>
    <ellipse cx="870" cy="290" rx="10" ry="18" transform="rotate(-5 870 290)" fill="#C9A84C" opacity="0.15" stroke="#C9A84C"/>
    <ellipse cx="858" cy="250" rx="10" ry="16" transform="rotate(-15 858 250)" fill="#C9A84C" opacity="0.15" stroke="#C9A84C"/>
    <ellipse cx="842" cy="215" rx="9" ry="14" transform="rotate(-25 842 215)" fill="#C9A84C" opacity="0.15" stroke="#C9A84C"/>
    <ellipse cx="820" cy="185" rx="8" ry="12" transform="rotate(-35 820 185)" fill="#C9A84C" opacity="0.15" stroke="#C9A84C"/>
  </g>

  <!-- Top decorative line -->
  <rect x="350" y="140" width="500" height="1" fill="url(#goldLine)" opacity="0.6"/>

  <!-- Title -->
  <text x="600" y="230" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="62" font-weight="700" fill="#C9A84C" letter-spacing="12">IMPERIVM</text>
  <text x="600" y="295" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="52" font-weight="700" fill="#C9A84C" letter-spacing="16">ROMANVM</text>

  <!-- Middle decorative line -->
  <rect x="400" y="320" width="400" height="1.5" fill="url(#redAccent)" opacity="0.8"/>

  <!-- Subtitle -->
  <text x="600" y="370" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="18" fill="#E8DCC8" letter-spacing="4" opacity="0.8">AN INTERACTIVE ATLAS OF THE ROMAN WORLD</text>

  <!-- Description -->
  <text x="600" y="415" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="14" fill="#7A7265" letter-spacing="2">EXPLORE 1,200 YEARS OF HISTORY &#x2022; CAMPAIGNS &#x2022; FIGURES &#x2022; ENGINEERING</text>

  <!-- Bottom decorative elements -->
  <rect x="350" y="450" width="500" height="1" fill="url(#goldLine)" opacity="0.4"/>

  <!-- SPQR -->
  <text x="600" y="500" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="22" font-weight="700" fill="#C9A84C" letter-spacing="8" opacity="0.4">S &#x00B7; P &#x00B7; Q &#x00B7; R</text>

  <!-- Date range -->
  <text x="600" y="540" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="13" fill="#7A7265" letter-spacing="6" opacity="0.5">753 BC &#x2014; 476 AD</text>
</svg>
