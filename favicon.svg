<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#06060f"/>
  <!-- Laurel wreath left -->
  <g fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round">
    <path d="M18 44 C16 38, 14 32, 16 26 C18 20, 22 16, 26 14" />
    <ellipse cx="16" cy="36" rx="3" ry="5" transform="rotate(-20 16 36)" fill="#C9A84C" opacity="0.3" stroke="#C9A84C"/>
    <ellipse cx="15" cy="30" rx="2.5" ry="4.5" transform="rotate(-10 15 30)" fill="#C9A84C" opacity="0.3" stroke="#C9A84C"/>
    <ellipse cx="17" cy="24" rx="2.5" ry="4" transform="rotate(5 17 24)" fill="#C9A84C" opacity="0.3" stroke="#C9A84C"/>
    <ellipse cx="21" cy="19" rx="2.5" ry="3.5" transform="rotate(20 21 19)" fill="#C9A84C" opacity="0.3" stroke="#C9A84C"/>
    <ellipse cx="25" cy="15" rx="2" ry="3" transform="rotate(35 25 15)" fill="#C9A84C" opacity="0.3" stroke="#C9A84C"/>
  </g>
  <!-- Laurel wreath right -->
  <g fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round">
    <path d="M46 44 C48 38, 50 32, 48 26 C46 20, 42 16, 38 14" />
    <ellipse cx="48" cy="36" rx="3" ry="5" transform="rotate(20 48 36)" fill="#C9A84C" opacity="0.3" stroke="#C9A84C"/>
    <ellipse cx="49" cy="30" rx="2.5" ry="4.5" transform="rotate(10 49 30)" fill="#C9A84C" opacity="0.3" stroke="#C9A84C"/>
    <ellipse cx="47" cy="24" rx="2.5" ry="4" transform="rotate(-5 47 24)" fill="#C9A84C" opacity="0.3" stroke="#C9A84C"/>
    <ellipse cx="43" cy="19" rx="2.5" ry="3.5" transform="rotate(-20 43 19)" fill="#C9A84C" opacity="0.3" stroke="#C9A84C"/>
    <ellipse cx="39" cy="15" rx="2" ry="3" transform="rotate(-35 39 15)" fill="#C9A84C" opacity="0.3" stroke="#C9A84C"/>
  </g>
  <!-- SPQR text -->
  <text x="32" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="700" fill="#C9A84C" letter-spacing="1">SPQR</text>
  <!-- Bottom ribbon -->
  <line x1="22" y1="46" x2="42" y2="46" stroke="#9B2335" stroke-width="1.5" stroke-linecap="round"/>
