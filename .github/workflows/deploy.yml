name: Deploy to Surge

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Surge
        run: npm install -g surge

      - name: Deploy to Surge
        run: surge . romainvicta.surge.sh --token ${{ secrets.SURGE_TOKEN }}
